<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>NEON VORTEX — MyPanel</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Rajdhani:wght@500;700&display=swap" rel="stylesheet">
<style>
  *{margin:0;padding:0;box-sizing:border-box;}
  html,body{width:100%;height:100%;overflow:hidden;background:#05070a;font-family:'Rajdhani',sans-serif;}
  #c{display:block;width:100%;height:100%;touch-action:none;}

  .ui{position:fixed;inset:0;pointer-events:none;z-index:5;}
  .topbar{position:absolute;top:18px;left:0;right:0;display:flex;justify-content:space-between;align-items:flex-start;padding:0 22px;}
  .back{pointer-events:auto;color:#7fe9ff;text-decoration:none;font-family:'Orbitron',sans-serif;font-size:11px;letter-spacing:2px;border:1px solid rgba(0,229,255,.35);padding:8px 14px;border-radius:3px;background:rgba(0,10,14,.5);transition:all .2s;}
  .back:hover{background:rgba(0,229,255,.12);}

  .scorebox{text-align:center;}
  .score{font-family:'Orbitron',sans-serif;font-size:42px;font-weight:900;color:#fff;text-shadow:0 0 18px currentColor,0 0 40px currentColor;line-height:1;letter-spacing:1px;}
  .best{font-size:12px;letter-spacing:3px;color:rgba(255,255,255,.45);margin-top:4px;font-weight:600;}
  .combo{position:absolute;top:84px;left:50%;transform:translateX(-50%);font-family:'Orbitron',sans-serif;font-size:13px;letter-spacing:3px;font-weight:700;opacity:0;transition:opacity .2s,transform .2s;text-shadow:0 0 12px currentColor;}
  .combo.show{opacity:1;}

  .center-ui{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;flex-direction:column;text-align:center;}
  .panel{pointer-events:auto;}
  .logo{font-family:'Orbitron',sans-serif;font-weight:900;font-size:clamp(40px,9vw,78px);letter-spacing:2px;line-height:1;background:linear-gradient(90deg,#00e5ff,#ff2bd6,#00ff87);background-size:300% 100%;-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;animation:hueShift 4s linear infinite;filter:drop-shadow(0 0 24px rgba(0,229,255,.45));}
  @keyframes hueShift{0%{background-position:0% 0}100%{background-position:300% 0}}
  .tagline{margin-top:10px;color:rgba(255,255,255,.55);font-size:14px;letter-spacing:4px;font-weight:600;text-transform:uppercase;}
  .startbtn{margin-top:38px;pointer-events:auto;padding:16px 46px;font-family:'Orbitron',sans-serif;font-size:14px;font-weight:700;letter-spacing:3px;color:#05070a;background:linear-gradient(90deg,#00e5ff,#00ff87);border:none;border-radius:3px;cursor:pointer;box-shadow:0 0 30px rgba(0,229,255,.5);transition:transform .15s,box-shadow .15s;clip-path:polygon(0 0,calc(100% - 14px) 0,100% 100%,14px 100%);}
  .startbtn:hover{transform:scale(1.05);box-shadow:0 0 46px rgba(0,229,255,.75);}
  .startbtn:active{transform:scale(.97);}
  .hint{margin-top:22px;color:rgba(255,255,255,.35);font-size:12px;letter-spacing:2px;}
  .hint b{color:rgba(0,229,255,.7);}

  .gameover .logo2{font-family:'Orbitron',sans-serif;font-weight:900;font-size:clamp(32px,7vw,56px);color:#ff2b6d;text-shadow:0 0 30px rgba(255,43,109,.7);letter-spacing:2px;}
  .finalscore{font-family:'Orbitron',sans-serif;font-size:64px;font-weight:900;color:#fff;margin:16px 0 4px;text-shadow:0 0 24px rgba(0,229,255,.6);}
  .newbest{color:#ffd23f;font-size:13px;letter-spacing:3px;font-weight:700;text-shadow:0 0 12px rgba(255,210,63,.6);margin-bottom:8px;height:18px;}
  .bestrow{color:rgba(255,255,255,.5);font-size:13px;letter-spacing:2px;margin-bottom:30px;}

  .hidden{display:none!important;}

  .progress-wrap{position:absolute;bottom:26px;left:50%;transform:translateX(-50%);width:min(420px,70vw);}
  .progress-bar{height:3px;width:100%;background:rgba(255,255,255,.08);border-radius:2px;overflow:hidden;}
  .progress-fill{height:100%;width:0%;background:linear-gradient(90deg,#00e5ff,#ff2bd6);transition:width .3s;}
  .progress-label{text-align:center;font-size:10px;letter-spacing:3px;color:rgba(255,255,255,.4);margin-top:6px;}
</style>
</head>
<body>

<canvas id="c"></canvas>

<div class="ui">
  <div class="topbar">
    <a class="back" href="javascript:history.back()">‹ ZURÜCK</a>
    <div class="scorebox">
      <div class="score" id="liveScore" style="color:#00e5ff;">0</div>
      <div class="best" id="liveBest">BEST 0</div>
    </div>
    <div style="width:78px;"></div>
  </div>

  <div class="combo" id="comboTag">COMBO x2</div>

  <div class="center-ui">
    <div class="panel" id="startPanel">
      <div class="logo">NEON VORTEX</div>
      <div class="tagline">Überlebe den Sog</div>
      <button class="startbtn" id="startBtn">▶ START</button>
      <div class="hint">Steuerung: <b>◀ A</b> / <b>D ▶</b> &nbsp;oder&nbsp; <b>Tippen links/rechts</b></div>
    </div>

    <div class="panel gameover hidden" id="overPanel">
      <div class="logo2">VERSOGEN</div>
      <div class="finalscore" id="finalScore">0</div>
      <div class="newbest" id="newBestTag"></div>
      <div class="bestrow">BESTWERT: <span id="bestVal">0</span></div>
      <button class="startbtn" id="retryBtn">↻ NOCHMAL</button>
    </div>
  </div>

  <div class="progress-wrap hidden" id="progWrap">
    <div class="progress-bar"><div class="progress-fill" id="progFill"></div></div>
    <div class="progress-label" id="progLabel">STUFE 1</div>
  </div>
</div>

<script>
/* ============================================================
   NEON VORTEX — minimalist high-juice reflex dodger
   Canvas 2D only (no WebGL) — kept deliberately light on the
   GPU: trail via translucent fillRect instead of blur filters,
   small pooled particle counts, sparing use of shadowBlur.
============================================================ */
const canvas=document.getElementById('c');
const ctx=canvas.getContext('2d');
let W,H,cx,cy;
function resize(){
  W=canvas.width=window.innerWidth*Math.min(devicePixelRatio||1,1);
  H=canvas.height=window.innerHeight*Math.min(devicePixelRatio||1,1);
  canvas.style.width=window.innerWidth+'px';
  canvas.style.height=window.innerHeight+'px';
  ctx.setTransform(Math.min(devicePixelRatio||1,1),0,0,Math.min(devicePixelRatio||1,1),0,0);
  cx=window.innerWidth/2;cy=window.innerHeight/2;
}
window.addEventListener('resize',resize);
resize();

/* ---------- state ---------- */
const STORAGE_KEY='vortexHighscore';
let best=parseInt(localStorage.getItem(STORAGE_KEY)||'0',10);
document.getElementById('liveBest').textContent='BEST '+best;
document.getElementById('bestVal').textContent=best;

let state='menu'; // menu | playing | dead
let playerAngle=-Math.PI/2;
let playerVel=0;
let playerRadius=64;
let pulsePhase=0;
let elapsed=0;
let score=0;
let combo=1;
let lastPassTime=0;
let walls=[];
let particles=[];
let shakeMag=0;
let hue=190;
let spawnTimer=0;
let difficulty=0; // 0..1 ramps over time
let keyLeft=false,keyRight=false;
let touchDir=0;

const PLAYER_R_VISUAL=9;
const RING_TOL=14;

function rand(a,b){return a+Math.random()*(b-a);}
function norm(a){a%=Math.PI*2;if(a<0)a+=Math.PI*2;return a;}
function angDiff(a,b){let d=norm(a-b);if(d>Math.PI)d-=Math.PI*2;return d;}

/* ---------- wall pattern generator ---------- */
function spawnWall(){
  const maxR=Math.max(window.innerWidth,window.innerHeight)*0.62;
  const baseGap=Math.max(0.95-difficulty*0.42,0.5); // radians, shrinks with difficulty
  const pattern=Math.random();
  const speed=210+difficulty*230;
  const huev=hue;
  if(pattern<0.55){
    // single gap ring
    walls.push({r:maxR,gapCenter:rand(0,Math.PI*2),gapW:baseGap,speed,hue:huev,passed:false,type:1});
  }else if(pattern<0.85){
    // double gap ring (two openings)
    const g1=rand(0,Math.PI*2);
    let g2=g1+Math.PI+rand(-0.5,0.5);
    walls.push({r:maxR,gapCenter:g1,gapW:baseGap*0.8,gapCenter2:g2,gapW2:baseGap*0.8,speed,hue:huev,passed:false,type:2});
  }else{
    // spinner: gap center drifts as it approaches
    walls.push({r:maxR,gapCenter:rand(0,Math.PI*2),gapW:baseGap*0.9,speed:speed*0.95,hue:huev,passed:false,type:3,spin:rand(-1.6,1.6)});
  }
}

/* ---------- particles ---------- */
function burst(x,y,color,n,spd){
  for(let i=0;i<n;i++){
    const a=Math.random()*Math.PI*2;
    const s=rand(spd*0.3,spd);
    particles.push({x,y,vx:Math.cos(a)*s,vy:Math.sin(a)*s,life:1,decay:rand(.9,1.6),color,size:rand(1.5,3.5)});
  }
}
function updateParticles(dt){
  for(let i=particles.length-1;i>=0;i--){
    const p=particles[i];
    p.x+=p.vx*dt;p.y+=p.vy*dt;
    p.vx*=0.96;p.vy*=0.96;
    p.life-=p.decay*dt;
    if(p.life<=0)particles.splice(i,1);
  }
  if(particles.length>90)particles.splice(0,particles.length-90);
}
function drawParticles(){
  particles.forEach(p=>{
    ctx.globalAlpha=Math.max(p.life,0);
    ctx.fillStyle=p.color;
    ctx.beginPath();ctx.arc(p.x,p.y,p.size,0,Math.PI*2);ctx.fill();
  });
  ctx.globalAlpha=1;
}

/* ---------- input ---------- */
window.addEventListener('keydown',e=>{
  if(e.code==='ArrowLeft'||e.code==='KeyA')keyLeft=true;
  if(e.code==='ArrowRight'||e.code==='KeyD')keyRight=true;
  if(e.code==='Space'){
    if(state==='menu')startGame();
    else if(state==='dead')startGame();
  }
});
window.addEventListener('keyup',e=>{
  if(e.code==='ArrowLeft'||e.code==='KeyA')keyLeft=false;
  if(e.code==='ArrowRight'||e.code==='KeyD')keyRight=false;
});
function pointerDown(clientX){
  touchDir=clientX<window.innerWidth/2?-1:1;
}
canvas.addEventListener('pointerdown',e=>{pointerDown(e.clientX);});
canvas.addEventListener('pointerup',()=>{touchDir=0;});
canvas.addEventListener('pointercancel',()=>{touchDir=0;});
canvas.addEventListener('pointerleave',()=>{touchDir=0;});

document.getElementById('startBtn').addEventListener('click',startGame);
document.getElementById('retryBtn').addEventListener('click',startGame);

function startGame(){
  state='playing';
  playerAngle=-Math.PI/2;playerVel=0;
  elapsed=0;score=0;combo=1;lastPassTime=0;
  walls=[];particles=[];spawnTimer=0;difficulty=0;shakeMag=0;hue=190;
  document.getElementById('startPanel').classList.add('hidden');
  document.getElementById('overPanel').classList.add('hidden');
  document.getElementById('progWrap').classList.remove('hidden');
  updateHud();
}

function die(){
  state='dead';
  burst(cx+Math.cos(playerAngle)*playerRadius,cy+Math.sin(playerAngle)*playerRadius,'#ff2b6d',46,260);
  shakeMag=18;
  const finalScore=Math.floor(score);

  // Auto-save to shared MyPanel highscores — only if new personal best
  try{
    const profRaw=localStorage.getItem('mpProfile');
    const prof=profRaw?JSON.parse(profRaw):null;
    const player=(prof?prof.username:localStorage.getItem('username')||'MYPANEL USER').toUpperCase();
    const all=JSON.parse(localStorage.getItem('highscores')||'[]');
    const prevBest=all.filter(s=>s.player===player&&s.game==='Neon Vortex').sort((a,b)=>b.score-a.score);
    if(prevBest.length===0||finalScore>prevBest[0].score){
      const filtered=all.filter(s=>!(s.player===player&&s.game==='Neon Vortex'));
      filtered.push({player,game:'Neon Vortex',score:finalScore,date:new Date().toLocaleDateString('de-DE')});
      filtered.sort((a,b)=>b.score-a.score);
      localStorage.setItem('highscores',JSON.stringify(filtered.slice(0,50)));
    }
  }catch(e){}

  document.getElementById('finalScore').textContent=finalScore;
  let isNew=false;
  if(finalScore>best){
    best=finalScore;
    localStorage.setItem(STORAGE_KEY,String(best));
    isNew=true;
  }
  document.getElementById('bestVal').textContent=best;
  document.getElementById('newBestTag').textContent=isNew?'★ NEUER BESTWERT ★':'';
  document.getElementById('liveBest').textContent='BEST '+best;
  setTimeout(()=>{
    document.getElementById('overPanel').classList.remove('hidden');
  },650);
  document.getElementById('progWrap').classList.add('hidden');
}

function updateHud(){
  document.getElementById('liveScore').textContent=Math.floor(score);
  const lvl=Math.min(Math.floor(difficulty*10)+1,10);
  document.getElementById('progFill').style.width=(difficulty*100)+'%';
  document.getElementById('progLabel').textContent='STUFE '+lvl;
}

let comboShowTimer=0;
function showCombo(c){
  const el=document.getElementById('comboTag');
  el.textContent='COMBO x'+c;
  el.style.color=`hsl(${hue},90%,65%)`;
  el.classList.add('show');
  comboShowTimer=1.1;
}

/* ---------- main loop ---------- */
let lastT=performance.now();
function loop(t){
  const dt=Math.min((t-lastT)/1000,0.034);
  lastT=t;
  update(dt);
  render(dt);
  requestAnimationFrame(loop);
}
requestAnimationFrame(loop);

function update(dt){
  pulsePhase+=dt;
  hue+=dt*14;if(hue>360)hue-=360;
  if(comboShowTimer>0){
    comboShowTimer-=dt;
    if(comboShowTimer<=0)document.getElementById('comboTag').classList.remove('show');
  }
  if(shakeMag>0)shakeMag=Math.max(0,shakeMag-dt*40);

  if(state!=='playing'){updateParticles(dt);return;}

  elapsed+=dt;
  score+=dt*12*combo*0.18+dt*4; // base score growth
  difficulty=Math.min(elapsed/45,1);
  updateHud();

  // input -> rotation
  let dir=0;
  if(keyLeft)dir-=1;
  if(keyRight)dir+=1;
  if(touchDir!==0)dir=touchDir;
  const targetVel=dir*4.4;
  playerVel+=(targetVel-playerVel)*Math.min(dt*10,1);
  playerAngle+=playerVel*dt;
  playerAngle=norm(playerAngle);

  // spawn walls
  spawnTimer-=dt;
  const spawnInterval=Math.max(1.15-difficulty*0.7,0.46);
  if(spawnTimer<=0){
    spawnWall();
    spawnTimer=spawnInterval;
  }

  // update walls
  for(let i=walls.length-1;i>=0;i--){
    const w=walls[i];
    w.r-=w.speed*dt;
    if(w.type===3)w.gapCenter=norm(w.gapCenter+w.spin*dt);

    // collision band
    if(!w.passed && w.r<playerRadius+RING_TOL && w.r>playerRadius-RING_TOL){
      let safe=false;
      if(w.type===1||w.type===3){
        safe=Math.abs(angDiff(playerAngle,w.gapCenter))<w.gapW/2;
      }else if(w.type===2){
        safe=Math.abs(angDiff(playerAngle,w.gapCenter))<w.gapW/2 || Math.abs(angDiff(playerAngle,w.gapCenter2))<w.gapW2/2;
      }
      if(!safe){
        die();
        return;
      }
    }
    if(!w.passed && w.r<playerRadius-RING_TOL){
      w.passed=true;
      const now=elapsed;
      if(now-lastPassTime<1.4){combo=Math.min(combo+1,9);}else{combo=1;}
      lastPassTime=now;
      score+=10*combo;
      if(combo>=2)showCombo(combo);
      shakeMag=Math.max(shakeMag,combo>=4?6:2.5);
    }
    if(w.r<-40)walls.splice(i,1);
  }

  updateParticles(dt);
}

/* ---------- rendering ---------- */
function drawBackground(){
  // trail effect: translucent fill instead of full clear -> cheap motion blur
  ctx.fillStyle='rgba(5,7,10,0.32)';
  ctx.fillRect(0,0,window.innerWidth,window.innerHeight);

  // pulsing concentric hex rings (cosmetic only)
  const pulse=1+Math.sin(pulsePhase*2.1)*0.02;
  ctx.save();
  ctx.translate(cx,cy);
  ctx.globalAlpha=0.16;
  for(let i=1;i<=4;i++){
    ctx.beginPath();
    const r=i*70*pulse;
    for(let s=0;s<=6;s++){
      const a=s/6*Math.PI*2+pulsePhase*0.05;
      const x=Math.cos(a)*r,y=Math.sin(a)*r;
      if(s===0)ctx.moveTo(x,y);else ctx.lineTo(x,y);
    }
    ctx.strokeStyle=`hsl(${hue},80%,55%)`;
    ctx.lineWidth=1;
    ctx.stroke();
  }
  ctx.restore();
  ctx.globalAlpha=1;
}

function drawCore(){
  ctx.save();
  ctx.translate(cx,cy);
  const r=14+Math.sin(pulsePhase*3)*2.5;
  const grad=ctx.createRadialGradient(0,0,0,0,0,r*3);
  grad.addColorStop(0,`hsla(${hue},100%,65%,0.9)`);
  grad.addColorStop(1,'hsla(0,0%,0%,0)');
  ctx.fillStyle=grad;
  ctx.beginPath();ctx.arc(0,0,r*3,0,Math.PI*2);ctx.fill();
  ctx.fillStyle=`hsl(${hue},100%,70%)`;
  ctx.beginPath();ctx.arc(0,0,r*0.4,0,Math.PI*2);ctx.fill();
  ctx.restore();
}

function drawWalls(){
  ctx.save();
  ctx.translate(cx,cy);
  walls.forEach(w=>{
    if(w.r<10||w.r>Math.max(window.innerWidth,window.innerHeight))return;
    const col=`hsl(${w.hue},85%,58%)`;
    const colGlow=`hsla(${w.hue},90%,65%,0.35)`;
    const arcSeg=(a0,a1)=>{
      // cheap "glow": one wide translucent stroke under a thin bright one — no shadowBlur
      ctx.beginPath();
      ctx.arc(0,0,w.r,a0,a1,false);
      ctx.lineWidth=26;
      ctx.strokeStyle=colGlow;
      ctx.stroke();
      ctx.beginPath();
      ctx.arc(0,0,w.r,a0,a1,false);
      ctx.lineWidth=10;
      ctx.strokeStyle=col;
      ctx.stroke();
    };
    if(w.type===2){
      // two real gaps -> two solid wall arcs between them (g2 is always g1+~PI, so raw order holds)
      arcSeg(w.gapCenter+w.gapW/2, w.gapCenter2-w.gapW2/2);
      arcSeg(w.gapCenter2+w.gapW2/2, w.gapCenter+Math.PI*2-w.gapW/2);
    }else{
      arcSeg(w.gapCenter+w.gapW/2, w.gapCenter-w.gapW/2+Math.PI*2);
    }
  });
  ctx.restore();
}

function drawPlayer(){
  if(state==='dead')return;
  ctx.save();
  ctx.translate(cx,cy);
  ctx.rotate(playerAngle);
  ctx.translate(playerRadius,0);
  ctx.rotate(Math.PI/2);
  // cheap glow: soft translucent circle behind the shape instead of shadowBlur
  ctx.fillStyle=`hsla(${hue},100%,65%,0.35)`;
  ctx.beginPath();ctx.arc(0,2,PLAYER_R_VISUAL*1.9,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='#ffffff';
  ctx.beginPath();
  ctx.moveTo(0,-PLAYER_R_VISUAL);
  ctx.lineTo(PLAYER_R_VISUAL*0.78,PLAYER_R_VISUAL*0.85);
  ctx.lineTo(-PLAYER_R_VISUAL*0.78,PLAYER_R_VISUAL*0.85);
  ctx.closePath();
  ctx.fill();
  ctx.restore();

  // thin trail dot
  if(state==='playing'&&Math.random()<0.6){
    particles.push({
      x:cx+Math.cos(playerAngle)*playerRadius,
      y:cy+Math.sin(playerAngle)*playerRadius,
      vx:0,vy:0,life:1,decay:3.2,color:`hsl(${hue},90%,65%)`,size:2.2
    });
  }
}

function render(){
  ctx.save();
  if(shakeMag>0){
    ctx.translate(rand(-shakeMag,shakeMag),rand(-shakeMag,shakeMag));
  }
  drawBackground();
  drawWalls();
  drawParticles();
  drawCore();
  drawPlayer();
  ctx.restore();
}
</script>
<!-- ANNOUNCEMENT SYSTEM -->
<div id="annBanner" style="display:none;position:fixed;bottom:0;left:0;right:0;z-index:99999;pointer-events:none;">
  <div style="background:rgba(0,0,0,.85);padding:18px 40px 22px;text-align:center;border-top:3px solid #00e5ff;">
    <span style="font-family:Arial,sans-serif;font-size:clamp(16px,3vw,30px);font-weight:900;color:#fff;text-shadow:0 0 20px rgba(0,229,255,.8);letter-spacing:2px;">📢 <span id="annBannerText"></span></span>
  </div>
</div>
<script>
(function(){
  const DB_URL='https://mypanel-41c90-default-rtdb.europe-west1.firebasedatabase.app/announcement.json';
  function showAnn(text){
    const b=document.getElementById('annBanner');
    const t=document.getElementById('annBannerText');
    if(!b||!t||!text)return;
    t.textContent=text;b.style.display='block';
    setTimeout(()=>{b.style.display='none';},10000);
  }
  fetch(DB_URL).then(r=>r.json()).then(d=>{if(d&&d.text)showAnn(d.text);}).catch(()=>{});
})();
</script>
</body>
</html>
