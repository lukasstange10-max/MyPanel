<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>Memory NEXT LEVEL</title>

<style>
:root{
--main:#6366f1;
--bg:#0f172a;
--text:#fff;
}

body{
margin:0;
font-family:Segoe UI;
background:linear-gradient(135deg,#0f172a,#020617);
color:var(--text);
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

/* SCREENS */
.screen{
display:none;
flex-direction:column;
align-items:center;
text-align:center;
width:100%;
max-width:1000px;
}

.active{display:flex;}

h1{
font-size:60px;
margin-bottom:10px;
}

/* ACTIVE DIFF TEXT */
.selected{
margin-top:10px;
font-size:22px;
color:#facc15;
font-weight:bold;
}

/* BUTTON */
button{
padding:15px 30px;
border:none;
border-radius:14px;
background:linear-gradient(135deg,var(--main),#4f46e5);
color:white;
font-weight:900;
cursor:pointer;
margin:8px;
transition:0.2s;
}

button:hover{
transform:scale(1.08);
}

/* ACTIVE BUTTON */
.activeBtn{
background:linear-gradient(135deg,#facc15,#f59e0b);
color:black;
}

/* BOARD */
.board{
background:rgba(255,255,255,0.05);
padding:20px;
border-radius:16px;
margin-bottom:20px;
}

/* GRID */
.grid{
display:grid;
gap:10px;
}

.card{
width:80px;
height:80px;
perspective:1000px;
cursor:pointer;
}

.inner{
width:100%;
height:100%;
transform-style:preserve-3d;
transition:transform 0.4s;
}

.card.flip .inner{
transform:rotateY(180deg);
}

.front,.back{
position:absolute;
width:100%;
height:100%;
border-radius:12px;
display:flex;
align-items:center;
justify-content:center;
font-size:26px;
backface-visibility:hidden;
}

.front{
background:linear-gradient(135deg,var(--main),#4f46e5);
}

.back{
background:#22c55e;
transform:rotateY(180deg);
}

.card.match .back{
background:#facc15;
}

/* WIN */
.win{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.9);
display:none;
flex-direction:column;
align-items:center;
justify-content:center;
}
</style>
</head>

<body>

<!-- START -->
<div class="screen active" id="start">
<h1>🧠 Memory</h1>

<div class="board" id="board"></div>

<div>
<button onclick="setDiff(4,this)">Easy</button>
<button onclick="setDiff(6,this)">Medium</button>
<button onclick="setDiff(8,this)">Hard</button>
</div>

<div class="selected" id="diffText">Schwierigkeit: Easy</div>

<button onclick="toName()">▶ Start</button>
</div>

<!-- NAME -->
<div class="screen" id="name">
<h1>👤 Dein Name</h1>
<input id="player" placeholder="Name">
<button onclick="startGame()">Start</button>
</div>

<!-- GAME -->
<div class="screen" id="game">
<div>Züge: <b id="moves">0</b> | Zeit: <b id="time">0</b>s</div>
<div class="grid" id="grid"></div>
</div>

<!-- WIN -->
<div class="win" id="win">
<h2>🎉 Gewonnen!</h2>
<div id="result"></div>
<button onclick="restart()">Nochmal</button>
</div>

<script>
let size=4;
const emojis=["🍎","🍌","🍇","🍉","🍓","🍍","🥝","🍒","🥑","🍑","🍋","🍊","🍈","🍏","🍐","🍅"];

let cards=[],flipped=[],moves=0,matches=0,time=0,timer;

/* DIFF */
function setDiff(s,btn){
size=s;

/* BUTTON HIGHLIGHT */
document.querySelectorAll("button").forEach(b=>b.classList.remove("activeBtn"));
btn.classList.add("activeBtn");

/* TEXT */
let name = s===4 ? "Easy" : s===6 ? "Medium" : "Hard";
document.getElementById("diffText").innerText="Schwierigkeit: "+name;
}

/* SCREEN */
function show(id){
document.querySelectorAll(".screen").forEach(s=>s.classList.remove("active"));
document.getElementById(id).classList.add("active");
}

function toName(){ show("name"); }

/* START */
function startGame(){
const name=document.getElementById("player").value.trim();
if(!name){alert("Name eingeben!");return;}

show("game");

moves=0;matches=0;time=0;flipped=[];
document.getElementById("moves").innerText=0;
document.getElementById("time").innerText=0;

timer=setInterval(()=>{
time++;
document.getElementById("time").innerText=time;
},1000);

let total=size*size/2;
let selected=emojis.slice(0,total);
cards=[...selected,...selected].sort(()=>Math.random()-0.5);

const grid=document.getElementById("grid");
grid.style.gridTemplateColumns=`repeat(${size},80px)`;
grid.innerHTML="";

cards.forEach(e=>{
const card=document.createElement("div");
card.className="card";

card.innerHTML=`
<div class="inner">
<div class="front">?</div>
<div class="back">${e}</div>
</div>`;

card.onclick=()=>flip(card,e);
grid.appendChild(card);
});
}

/* FLIP */
function flip(card,emoji){
if(card.classList.contains("flip")||flipped.length===2)return;

card.classList.add("flip");
flipped.push({card,emoji});

if(flipped.length===2){
moves++;
document.getElementById("moves").innerText=moves;
setTimeout(check,400);
}
}

/* CHECK */
function check(){
const[a,b]=flipped;

if(a.emoji===b.emoji){
a.card.classList.add("match");
b.card.classList.add("match");
matches++;

if(matches===cards.length/2) win();
}else{
a.card.classList.remove("flip");
b.card.classList.remove("flip");
}

flipped=[];
}

/* WIN */
function win(){
clearInterval(timer);

const name=document.getElementById("player").value;
saveScore(name,time);

// Auto-save to MyPanel highscores — score = 10000 / time (schneller = höher), only if new personal best
try{
  const profRaw=localStorage.getItem('mpProfile');
  const prof=profRaw?JSON.parse(profRaw):null;
  const player=(prof?prof.username:localStorage.getItem('username')||'MYPANEL USER').toUpperCase();
  const mscore=Math.max(1,Math.floor(10000/time));
  const all=JSON.parse(localStorage.getItem('highscores')||'[]');
  const prevBest=all.filter(s=>s.player===player&&s.game==='Memory').sort((a,b)=>b.score-a.score);
  if(prevBest.length===0||mscore>prevBest[0].score){
    const filtered=all.filter(s=>!(s.player===player&&s.game==='Memory'));
    filtered.push({player,game:'Memory',score:mscore,date:new Date().toLocaleDateString('de-DE')});
    filtered.sort((a,b)=>b.score-a.score);
    localStorage.setItem('highscores',JSON.stringify(filtered.slice(0,50)));
  }
}catch(e){}

document.getElementById("result").innerText=`${name} - ${time}s`;
document.getElementById("win").style.display="flex";

renderBoard();
}

/* RESTART */
function restart(){
document.getElementById("win").style.display="none";
show("start");
renderBoard();
}

/* STORAGE (TOP 4) */
function saveScore(name,time){
let data=JSON.parse(localStorage.getItem("memoryGlobal")||"[]");
data.push({name,time});
data.sort((a,b)=>a.time-b.time);
data=data.slice(0,4); // 🔥 NUR TOP 4
localStorage.setItem("memoryGlobal",JSON.stringify(data));
}

/* BOARD */
function renderBoard(){
let data=JSON.parse(localStorage.getItem("memoryGlobal")||"[]");

document.getElementById("board").innerHTML=
"<b>🏆 Rekorde</b><br><br>"+
(data.length
? data.map((s,i)=>`#${i+1} ${s.name} - ${s.time}s`).join("<br>")
: "Noch keine Rekorde");
}

/* INIT */
renderBoard();
</script>

<!-- ANNOUNCEMENT SYSTEM -->
<div id="annBanner" style="display:none;position:fixed;bottom:0;left:0;right:0;z-index:99999;pointer-events:none;">
  <div style="background:rgba(0,0,0,.85);padding:18px 40px 22px;text-align:center;border-top:3px solid #00e5ff;animation:annIn .4s cubic-bezier(.22,.61,.36,1) both;">
    <span style="font-family:Arial,sans-serif;font-size:clamp(16px,3vw,30px);font-weight:900;color:#fff;text-shadow:0 0 20px rgba(0,229,255,.8);letter-spacing:2px;">📢 <span id="annBannerText"></span></span>
  </div>
</div>
<style>@keyframes annIn{from{transform:translateY(100%);opacity:0;}to{transform:translateY(0);opacity:1;}}</style>
<script>
(function(){
  const DB_URL='https://mypanel-41c90-default-rtdb.europe-west1.firebasedatabase.app';
  let lastText='',annTimer=null;
  function showAnn(text){
    if(!text||text===lastText)return;
    lastText=text;
    const b=document.getElementById('annBanner');
    const t=document.getElementById('annBannerText');
    if(!b||!t)return;
    t.textContent=text;
    b.style.display='block';
    clearTimeout(annTimer);
    annTimer=setTimeout(()=>{b.style.display='none';},10000);
  }
  function poll(){
    fetch(DB_URL+'/announcement.json?t='+Date.now())
      .then(r=>r.json())
      .then(d=>{if(d&&d.text)showAnn(d.text);})
      .catch(()=>{});
  }
  // Poll every 5 seconds for new announcements
  poll();
  setInterval(poll,5000);
})();
</script>
</body>
</html>
