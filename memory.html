<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>Memory NEXT LEVEL</title>

<style>
:root{
--main:#6366f1;
--bg:#0f172a;
--text:#fff;
}

body{
margin:0;
font-family:Segoe UI;
background:radial-gradient(circle at 25% 15%,#1e1b4b,#020617 60%);
color:var(--text);
display:flex;
justify-content:center;
align-items:center;
height:100vh;
overflow:hidden;
}

/* SCREENS */
.screen{
display:none;
flex-direction:column;
align-items:center;
text-align:center;
width:100%;
max-width:1000px;
padding:0 12px;
}

.active{display:flex;}

h1{
font-size:clamp(36px,7vw,60px);
margin-bottom:10px;
background:linear-gradient(90deg,#f472b6,#facc15,#22d3ee,#f472b6);
background-size:300% auto;
-webkit-background-clip:text;
background-clip:text;
color:transparent;
animation:hueFlow 6s linear infinite;
}
@keyframes hueFlow{to{background-position:300% center;}}

/* ACTIVE DIFF TEXT */
.selected{
margin-top:10px;
font-size:22px;
color:#facc15;
font-weight:bold;
}

/* BUTTON */
button{
padding:15px 30px;
border:none;
border-radius:14px;
background:linear-gradient(135deg,var(--main),#4f46e5);
color:white;
font-weight:900;
cursor:pointer;
margin:8px;
transition:0.2s;
box-shadow:0 8px 20px rgba(79,70,229,.35);
}

button:hover{
transform:scale(1.08) translateY(-2px);
}
button:active{transform:scale(.97);}

/* ACTIVE BUTTON */
.activeBtn{
background:linear-gradient(135deg,#facc15,#f59e0b);
color:black;
}

/* INPUT */
input{
padding:14px 18px;
border-radius:14px;
border:1px solid rgba(255,255,255,.15);
background:rgba(255,255,255,.07);
color:#fff;
font-size:18px;
outline:none;
text-align:center;
margin-bottom:10px;
backdrop-filter:blur(6px);
}
input:focus{border-color:#facc15;box-shadow:0 0 0 3px rgba(250,204,21,.2);}
input::placeholder{color:rgba(255,255,255,.4);}

/* BOARD */
.board{
background:rgba(255,255,255,.06);
padding:20px 26px;
border-radius:18px;
margin-bottom:20px;
border:1px solid rgba(255,255,255,.08);
box-shadow:0 15px 40px rgba(0,0,0,.35);
display:flex;
gap:26px;
flex-wrap:wrap;
justify-content:center;
}
.board .col{min-width:150px;}
.board .col h3{font-size:15px;margin-bottom:6px;color:#facc15;letter-spacing:1px;}
.board .col div{font-size:13px;opacity:.9;line-height:1.7;}

/* GAME STATS */
.gstats{
display:flex;gap:22px;justify-content:center;margin-bottom:14px;
font-size:18px;font-weight:700;flex-wrap:wrap;
}
.gstats span b{color:#facc15;}

/* GRID */
.grid{
display:grid;
gap:10px;
justify-content:center;
}

.card{
width:var(--cs,80px);
height:var(--cs,80px);
perspective:1000px;
cursor:pointer;
}

.inner{
width:100%;
height:100%;
transform-style:preserve-3d;
transition:transform 0.4s;
}

.card.flip .inner{
transform:rotateY(180deg);
}

.card.shake .inner{animation:shakeCard .35s;}
@keyframes shakeCard{20%{transform:translateX(-6px) rotateY(180deg);}40%{transform:translateX(6px) rotateY(180deg);}60%{transform:translateX(-4px) rotateY(180deg);}80%{transform:translateX(4px) rotateY(180deg);}}

.front,.back{
position:absolute;
width:100%;
height:100%;
border-radius:calc(var(--cs,80px)*0.15);
display:flex;
align-items:center;
justify-content:center;
font-size:calc(var(--cs,80px)*0.34);
backface-visibility:hidden;
box-shadow:0 6px 16px rgba(0,0,0,.3);
}

.front{
background:linear-gradient(135deg,var(--main),#4f46e5);
font-weight:900;
color:rgba(255,255,255,.9);
}

.back{
background:linear-gradient(135deg,#22c55e,#15803d);
transform:rotateY(180deg);
}

.card.match .inner{animation:matchPulse .5s ease;}
@keyframes matchPulse{0%{transform:rotateY(180deg) scale(1);}50%{transform:rotateY(180deg) scale(1.15);}100%{transform:rotateY(180deg) scale(1);}}

.card.match .back{
background:linear-gradient(135deg,#facc15,#f59e0b);
box-shadow:0 0 22px rgba(250,204,21,.55);
}

/* STARS */
.stars{font-size:40px;margin:10px 0;letter-spacing:6px;}
.stars .off{opacity:.2;}

/* WIN */
.win{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.88);
display:none;
flex-direction:column;
align-items:center;
justify-content:center;
overflow:hidden;
}

/* CONFETTI */
.confetti{
position:fixed;
top:-20px;
width:9px;height:14px;
border-radius:2px;
pointer-events:none;
animation:confettiFall linear forwards;
z-index:99998;
}
@keyframes confettiFall{
0%{transform:translateY(0) rotate(0deg);opacity:1;}
100%{transform:translateY(110vh) rotate(720deg);opacity:.3;}
}
</style>
</head>

<body>

<!-- START -->
<div class="screen active" id="start">
<h1>🧠 Memory</h1>

<div class="board" id="board"></div>

<div>
<button onclick="setDiff(4,this)">Easy</button>
<button onclick="setDiff(6,this)">Medium</button>
<button onclick="setDiff(8,this)">Hard</button>
</div>

<div class="selected" id="diffText">Schwierigkeit: Easy</div>

<button onclick="toName()">▶ Start</button>
</div>

<!-- NAME -->
<div class="screen" id="name">
<h1>👤 Dein Name</h1>
<input id="player" placeholder="Name">
<button onclick="startGame()">Start</button>
</div>

<!-- GAME -->
<div class="screen" id="game">
<div class="gstats">
<span>Züge: <b id="moves">0</b></span>
<span>Zeit: <b id="time">0</b>s</span>
</div>
<div class="grid" id="grid"></div>
</div>

<!-- WIN -->
<div class="win" id="win">
<h2>🎉 Gewonnen!</h2>
<div class="stars" id="starsLine"></div>
<div id="result"></div>
<div>
<button onclick="replaySame()">🔁 Nochmal (gleiche Stufe)</button>
<button onclick="restart()">⬅ Neue Runde</button>
</div>
</div>

<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database-compat.js"></script>

let rdb=null;
try{
  if(typeof firebase!=='undefined'){
    firebase.initializeApp({
      apiKey:"AIzaSyDqVPdgGhRx6v__sx7pCe5mOre8XT7xRLg",

      databaseURL:"https://mypanel-41c90-default-rtdb.europe-west1.firebasedatabase.app",
      projectId:"mypanel-41c90",

    });
    rdb=firebase.apps&&firebase.apps.length?firebase.database():null;
  }
}catch(e){rdb=null;}

function getMyName(){
  try{const p=JSON.parse(localStorage.getItem('mpProfile')||'null');return p?p.username:'SPIELER';}catch(e){return 'SPIELER';}

<script>
let size=4;
const emojis=["🍎","🍌","🍇","🍉","🍓","🍍","🥝","🍒","🥑","🍑","🍋","🍊","🍈","🍏","🍐","🍅"];

let cards=[],flipped=[],moves=0,matches=0,time=0,timer;
let lastName='',lastSize=4;

/* ===== SOUND ===== */
let actx=null;
function sfx(freq,dur,type,vol){
  try{
    if(!actx)actx=new(window.AudioContext||window.webkitAudioContext)();
    const o=actx.createOscillator(),g=actx.createGain();
    o.type=type||'square';o.frequency.value=freq;
    g.gain.setValueAtTime(0,actx.currentTime);
    g.gain.linearRampToValueAtTime(vol||0.12,actx.currentTime+0.01);
    g.gain.exponentialRampToValueAtTime(0.001,actx.currentTime+dur);
    o.connect(g);g.connect(actx.destination);
    o.start();o.stop(actx.currentTime+dur);
  }catch(e){}
}
function sndFlip(){sfx(500,0.08,'triangle',0.09);}
function sndMatch(){[0,0.09].forEach((t,i)=>setTimeout(()=>sfx(700+i*220,0.14,'triangle',0.12),t*1000));}
function sndMismatch(){sfx(160,0.18,'sawtooth',0.1);}
function sndWin(){[0,0.12,0.24,0.36,0.48].forEach((t,i)=>setTimeout(()=>sfx(520+i*140,0.16,'triangle',0.13),t*1000));}

/* ===== KONFETTI ===== */
function confettiBurst(){
  const colors=['#facc15','#f472b6','#22d3ee','#a855f7','#22c55e','#ef4444'];
  for(let i=0;i<70;i++){
    const c=document.createElement('div');
    c.className='confetti';
    c.style.left=Math.random()*100+'vw';
    c.style.background=colors[Math.floor(Math.random()*colors.length)];
    c.style.animationDuration=(2+Math.random()*1.8)+'s';
    c.style.animationDelay=(Math.random()*0.4)+'s';
    document.body.appendChild(c);
    setTimeout(()=>c.remove(),4200);
  }
}

/* ===== ZUSCHAUER-MODUS ===== */
const _urlParams=new URLSearchParams(location.search);
const spectateName=_urlParams.get('spectate');
let isSpectator=false;

function startSpectate(name){
  isSpectator=true;
  show('game');

  const banner=document.createElement('div');
  banner.id='spectateBanner';
  banner.style.cssText='position:fixed;top:16px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,.75);border:1px solid #22d3ee;padding:8px 22px;border-radius:20px;font-family:Segoe UI;font-size:12px;font-weight:900;letter-spacing:2px;color:#22d3ee;z-index:9999;box-shadow:0 0 20px rgba(34,211,238,.35);';
  banner.textContent='👁️ ZUSCHAUER-MODUS · '+name.toUpperCase();
  document.body.appendChild(banner);

  if(!rdb){banner.textContent='⚠ FIREBASE NICHT VERBUNDEN';banner.style.borderColor='#ff2b6d';banner.style.color='#ff2b6d';return;}

  try{
    const key=getMyName().replace(/[.#$\/\[\]]/g,'_');
    const specRef=rdb.ref('liveGames/'+name+'/spectators/'+key);
    specRef.set(true);
    specRef.onDisconnect().remove();
  }catch(e){}

  const ref=rdb.ref('liveGames/'+name);
  ref.on('value',snap=>{
    if(!snap.exists()){
      banner.textContent='⏹ KEIN LIVE-SPIEL GEFUNDEN';
      banner.style.borderColor='#ff2b6d';banner.style.color='#ff2b6d';
      return;
    }
    const d=snap.val();
    size=d.size||4;moves=d.moves||0;time=d.time||0;
    document.getElementById('moves').innerText=moves;
    document.getElementById('time').innerText=time;
    renderSpectatorGrid(d.cards||[],d.flippedIdx||[],d.matchedIdx||[]);
  });
}
if(spectateName)startSpectate(spectateName);

function renderSpectatorGrid(cardsArr,flippedIdx,matchedIdx){
  const grid=document.getElementById('grid');
  const availW=Math.min(window.innerWidth*0.92,700);
  const cs=Math.floor(Math.min(80,(availW-(size-1)*10)/size));
  grid.style.setProperty('--cs',cs+'px');
  grid.style.gridTemplateColumns=`repeat(${size},${cs}px)`;
  grid.innerHTML='';
  cardsArr.forEach((e,i)=>{
    const card=document.createElement('div');
    const isUp=flippedIdx.includes(i)||matchedIdx.includes(i);
    card.className='card'+(isUp?' flip':'')+(matchedIdx.includes(i)?' match':'');
    card.innerHTML=`<div class="inner"><div class="front">?</div><div class="back">${e}</div></div>`;
    grid.appendChild(card);
  });
}

/* Eigenen Live-Zustand periodisch senden, damit Freunde zuschauen können */
let lastLiveSync=0;
function syncLiveState(){
  if(isSpectator||!rdb)return;
  const now=Date.now();
  if(now-lastLiveSync<200)return;
  lastLiveSync=now;
  try{
    const cardEls=[...document.getElementById('grid').children];
    const flippedIdx=[];
    const matchedIdx=[];
    cardEls.forEach((c,i)=>{
      if(c.classList.contains('match'))matchedIdx.push(i);
      else if(c.classList.contains('flip'))flippedIdx.push(i);
    });
    rdb.ref('liveGames/'+getMyName()).set({
      size,cards,flippedIdx,matchedIdx,moves,time,ts:now
    });
  }catch(e){}
}
function clearLiveState(){
  if(isSpectator||!rdb)return;
  try{rdb.ref('liveGames/'+getMyName()).remove();}catch(e){}
}
window.addEventListener('beforeunload',clearLiveState);

/* DIFF */
function setDiff(s,btn){
size=s;

/* BUTTON HIGHLIGHT */
document.querySelectorAll("button").forEach(b=>b.classList.remove("activeBtn"));
btn.classList.add("activeBtn");

/* TEXT */
let name = s===4 ? "Easy" : s===6 ? "Medium" : "Hard";
document.getElementById("diffText").innerText="Schwierigkeit: "+name;
}

/* SCREEN */
function show(id){
document.querySelectorAll(".screen").forEach(s=>s.classList.remove("active"));
document.getElementById(id).classList.add("active");
}

function toName(){ show("name"); }

/* START */
function startGame(){
const name=document.getElementById("player").value.trim();
if(!name){alert("Name eingeben!");return;}
lastName=name;lastSize=size;

show("game");

moves=0;matches=0;time=0;flipped=[];
document.getElementById("moves").innerText=0;
document.getElementById("time").innerText=0;

clearInterval(timer);
timer=setInterval(()=>{
time++;
document.getElementById("time").innerText=time;
},1000);

let total=size*size/2;
let selected=emojis.slice(0,total);
cards=[...selected,...selected].sort(()=>Math.random()-0.5);

const grid=document.getElementById("grid");

/* Responsive Kartengröße: passt sich Bildschirmbreite & Gridgröße an */
const availW=Math.min(window.innerWidth*0.92,700);
const cs=Math.floor(Math.min(80,(availW-(size-1)*10)/size));
grid.style.setProperty('--cs',cs+'px');
grid.style.gridTemplateColumns=`repeat(${size},${cs}px)`;
grid.innerHTML="";

cards.forEach(e=>{
const card=document.createElement("div");
card.className="card";

card.innerHTML=`
<div class="inner">
<div class="front">?</div>
<div class="back">${e}</div>
</div>`;

card.onclick=()=>flip(card,e);
grid.appendChild(card);
});
}

/* FLIP */
function flip(card,emoji){
if(card.classList.contains("flip")||flipped.length===2)return;

card.classList.add("flip");
sndFlip();
flipped.push({card,emoji});
syncLiveState();

if(flipped.length===2){
moves++;
document.getElementById("moves").innerText=moves;
setTimeout(check,400);
}
}

/* CHECK */
function check(){
const[a,b]=flipped;

if(a.emoji===b.emoji){
a.card.classList.add("match");
b.card.classList.add("match");
matches++;
sndMatch();

if(matches===cards.length/2) win();
}else{
sndMismatch();
a.card.classList.add("shake");
b.card.classList.add("shake");
setTimeout(()=>{
a.card.classList.remove("flip","shake");
b.card.classList.remove("flip","shake");
},350);
}

flipped=[];
}

/* Schwierigkeitsname aus Gridgröße */
function diffKey(s){return s===4?'easy':s===6?'medium':'hard';}
function diffLabel(s){return s===4?'Easy':s===6?'Medium':'Hard';}
function diffWeight(s){return s===4?1:s===6?1.5:2;} // härtere Stufe = mehr Punkte im globalen Highscore

/* STERNE — je effizienter (weniger Züge), desto mehr Sterne */
function starsForMoves(mvs,totalPairs){
if(mvs<=totalPairs*1.5) return 3;
if(mvs<=totalPairs*2.2) return 2;
return 1;
}

/* WIN */
function win(){
clearInterval(timer);
clearLiveState();
sndWin();
confettiBurst();

const name=document.getElementById("player").value||lastName;
const totalPairs=cards.length/2;
const stars=starsForMoves(moves,totalPairs);

saveScore(name,time,size);

// An MyPanel-Highscoresystem übergeben (nutzt automatisch den XP-Multiplikator + Notification)
try{
  const mscore=Math.max(1,Math.floor(10000/time*diffWeight(size)));
  if(typeof window.autoSaveScore==='function'){
    window.autoSaveScore('Memory',mscore);
  }
}catch(e){}

document.getElementById("starsLine").innerHTML=
  [1,2,3].map(i=>`<span class="${i<=stars?'on':'off'}">⭐</span>`).join('');

document.getElementById("result").innerText=`${name} · ${diffLabel(size)} · ${moves} Züge · ${time}s`;
document.getElementById("win").style.display="flex";

renderBoard();
}

/* Nochmal gleiche Schwierigkeit — direkt ohne Menü */
function replaySame(){
document.getElementById("win").style.display="none";
size=lastSize;
document.getElementById("player").value=lastName;
startGame();
}

/* RESTART */
function restart(){
document.getElementById("win").style.display="none";
show("start");
renderBoard();
}

/* STORAGE (Top 3 PRO SCHWIERIGKEIT) */
function saveScore(name,time,s){
const key='memoryGlobalByDiff';
let data=JSON.parse(localStorage.getItem(key)||'{"easy":[],"medium":[],"hard":[]}');
const dk=diffKey(s);
if(!data[dk])data[dk]=[];
data[dk].push({name,time});
data[dk].sort((a,b)=>a.time-b.time);
data[dk]=data[dk].slice(0,3);
localStorage.setItem(key,JSON.stringify(data));
}

/* BOARD — getrennt nach Schwierigkeit */
function renderBoard(){
const data=JSON.parse(localStorage.getItem('memoryGlobalByDiff')||'{"easy":[],"medium":[],"hard":[]}');
const cols=[['easy','🟢 Easy'],['medium','🟠 Medium'],['hard','🔴 Hard']].map(([k,label])=>{
const list=data[k]||[];
const rows=list.length
  ?list.map((s,i)=>`<div>#${i+1} ${s.name} — ${s.time}s</div>`).join('')
  :'<div style="opacity:.5;">Noch keine Rekorde</div>';
return `<div class="col"><h3>${label}</h3>${rows}</div>`;
}).join('');

document.getElementById("board").innerHTML=`<div style="width:100%;font-size:15px;margin-bottom:10px;">🏆 <b>Rekorde</b></div><div style="display:flex;gap:26px;flex-wrap:wrap;justify-content:center;">${cols}</div>`;
}

/* INIT */
renderBoard();
</script>

<!-- ANNOUNCEMENT SYSTEM -->
<style>
#annBanner{display:none;position:fixed;top:0;left:0;right:0;z-index:99999;pointer-events:none;}
#annBanner .aInner{position:relative;background:linear-gradient(135deg,rgba(0,5,15,.96),rgba(0,10,25,.98));padding:18px 60px 22px;text-align:center;border-bottom:3px solid #00e5ff;animation:annSD .5s cubic-bezier(.22,.61,.36,1) both;overflow:hidden;}
#annBanner .aInner::before{content:'';position:absolute;inset:0;background:linear-gradient(90deg,transparent,rgba(0,229,255,.05),transparent);animation:annSW 2s linear infinite;}
@keyframes annSD{from{transform:translateY(-100%);opacity:0;}to{transform:translateY(0);opacity:1;}}
@keyframes annSW{from{transform:translateX(-100%);}to{transform:translateX(100%);}}
.ann-c{position:absolute;width:16px;height:16px;}.ann-c.tl{top:5px;left:8px;border-top:2px solid #00e5ff;border-left:2px solid #00e5ff;}.ann-c.tr{top:5px;right:8px;border-top:2px solid #00e5ff;border-right:2px solid #00e5ff;}.ann-c.bl{bottom:5px;left:8px;border-bottom:2px solid #00ff87;border-left:2px solid #00ff87;}.ann-c.br{bottom:5px;right:8px;border-bottom:2px solid #00ff87;border-right:2px solid #00ff87;}
</style>
<div id="annBanner">
  <div class="aInner">
    <div class="ann-c tl"></div><div class="ann-c tr"></div><div class="ann-c bl"></div><div class="ann-c br"></div>
    <div style="font-family:'Orbitron',sans-serif;font-size:9px;color:rgba(0,229,255,.7);letter-spacing:4px;margin-bottom:5px;">// GLOBAL ANNOUNCEMENT</div>
    <div style="font-family:'Orbitron',sans-serif;font-size:clamp(14px,2.5vw,26px);font-weight:900;color:#fff;text-shadow:0 0 30px rgba(0,229,255,.9);letter-spacing:2px;">📢 <span id="annBannerText"></span></div>
  </div>
</div>
<script>
(function(){
  const DB='https://mypanel-41c90-default-rtdb.europe-west1.firebasedatabase.app';
  let lastTs=0,t=null;
  function sound(){try{const ac=new(window.AudioContext||window.webkitAudioContext)();[[0,.08,880,.15],[.1,.08,1100,.1],[.2,.12,660,.12],[.35,.2,880,.08]].forEach(([st,dur,freq,vol])=>{const o=ac.createOscillator(),g=ac.createGain();o.frequency.value=freq;o.type='sine';g.gain.setValueAtTime(0,ac.currentTime+st);g.gain.linearRampToValueAtTime(vol,ac.currentTime+st+.02);g.gain.exponentialRampToValueAtTime(.001,ac.currentTime+st+dur);o.connect(g);g.connect(ac.destination);o.start(ac.currentTime+st);o.stop(ac.currentTime+st+dur);});setTimeout(()=>ac.close(),800);}catch(e){}}
  function show(txt){
    const b=document.getElementById('annBanner'),el=document.getElementById('annBannerText');
    if(!b||!el)return;
    el.textContent=txt;b.style.display='block';
    const inner=b.querySelector('.aInner');
    if(inner){inner.style.animation='none';void inner.offsetWidth;inner.style.animation='';}
    sound();clearTimeout(t);t=setTimeout(()=>b.style.display='none',10000);
  }
  function poll(){fetch(DB+'/announcement.json?t='+Date.now()).then(r=>r.json()).then(d=>{if(d&&d.text){const ts=d.timestamp||d.text;if(ts!==lastTs){lastTs=ts;show(d.text);}}}).catch(()=>{});}
  setTimeout(poll,1000);setInterval(poll,3000);
})();
</script>


<!-- XP MULTIPLIER -->
<script>
(function(){
  const orig=window.autoSaveScore;
  window.autoSaveScore=function(gameName,score){
    const mult=parseFloat(localStorage.getItem('mpXpMultiplier')||'1');
    const boosted=Math.floor(score*mult);
    if(mult>1){
      // Show notification
      const n=document.createElement('div');
      n.style.cssText='position:fixed;top:20px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,.85);border:1px solid #ffd23f;border-radius:6px;padding:10px 20px;font-family:Orbitron,sans-serif;font-size:13px;font-weight:900;color:#ffd23f;letter-spacing:2px;z-index:99999;pointer-events:none;';
      n.textContent='🎉 '+mult+'x XP! '+Math.floor(score)+' → '+boosted+' PUNKTE!';
      document.body.appendChild(n);
      setTimeout(()=>n.remove(),2500);
    }
    if(orig) orig(gameName,boosted);
    else {
      // Fallback: save directly to localStorage
      try{
        const pr=JSON.parse(localStorage.getItem('mpProfile')||'null');
        const pn=(pr?pr.username:'MYPANEL USER').toUpperCase();
        const all=JSON.parse(localStorage.getItem('highscores')||'[]');
        const prev=all.filter(x=>x.player===pn&&x.game===gameName).sort((a,b)=>b.score-a.score);
        const best=prev.length>0?Math.max(prev[0].score,boosted):boosted;
        const f=all.filter(x=>!(x.player===pn&&x.game===gameName));
        f.push({player:pn,game:gameName,score:best,date:new Date().toLocaleDateString('de-DE')});
        localStorage.setItem('highscores',JSON.stringify(f.sort((a,b)=>b.score-a.score).slice(0,50)));
      }catch(e){}
    }
  };
})();
</script>
</body>
</html>
