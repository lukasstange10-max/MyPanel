<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>Wordle — MyPanel</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{background:#030608;color:#d0f0ee;font-family:'Rajdhani',sans-serif;display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;overflow:hidden;}
body::before{content:"";position:fixed;inset:0;background-image:linear-gradient(rgba(0,229,255,.04) 1px,transparent 1px),linear-gradient(90deg,rgba(0,229,255,.04) 1px,transparent 1px);background-size:60px 60px;z-index:-1;}

h1{font-family:'Orbitron',sans-serif;font-size:28px;font-weight:900;color:#00e5ff;letter-spacing:6px;text-shadow:0 0 20px rgba(0,229,255,.5);margin-bottom:6px;}
.subtitle{font-family:'Share Tech Mono',monospace;font-size:10px;letter-spacing:4px;color:rgba(0,229,255,.4);margin-bottom:24px;}

#message{font-family:'Share Tech Mono',monospace;font-size:12px;letter-spacing:3px;color:#00ff87;text-shadow:0 0 8px #00ff87;height:20px;margin-bottom:14px;text-align:center;}

/* board */
#board{display:grid;grid-template-rows:repeat(6,1fr);gap:6px;margin-bottom:20px;}
.row{display:grid;grid-template-columns:repeat(5,1fr);gap:6px;}
.cell{width:56px;height:56px;border:1px solid rgba(0,229,255,.2);border-radius:4px;display:flex;align-items:center;justify-content:center;font-family:'Orbitron',sans-serif;font-size:22px;font-weight:900;color:#d0f0ee;transition:transform .1s,border-color .2s;position:relative;background:rgba(0,0,0,.4);}
.cell.filled{border-color:rgba(0,229,255,.5);animation:pop .1s ease;}
@keyframes pop{0%{transform:scale(1)}50%{transform:scale(1.15)}100%{transform:scale(1)}}
.cell.correct{background:rgba(0,255,135,.15);border-color:#00ff87;color:#00ff87;box-shadow:0 0 12px rgba(0,255,135,.3);animation:flip .4s ease forwards;}
.cell.present{background:rgba(255,196,0,.15);border-color:#ffc400;color:#ffc400;box-shadow:0 0 12px rgba(255,196,0,.3);animation:flip .4s ease forwards;}
.cell.absent{background:rgba(255,255,255,.03);border-color:rgba(255,255,255,.1);color:rgba(208,240,238,.3);animation:flip .4s ease forwards;}
@keyframes flip{0%{transform:rotateX(0)}50%{transform:rotateX(-90deg)}100%{transform:rotateX(0)}}
.cell.shake{animation:shake .4s ease;}
@keyframes shake{0%,100%{transform:translateX(0)}20%{transform:translateX(-6px)}40%{transform:translateX(6px)}60%{transform:translateX(-4px)}80%{transform:translateX(4px)}}

/* keyboard */
#keyboard{display:flex;flex-direction:column;gap:6px;align-items:center;}
.krow{display:flex;gap:5px;}
.key{min-width:36px;height:44px;padding:0 6px;border:1px solid rgba(0,229,255,.2);border-radius:3px;background:rgba(0,229,255,.05);color:#d0f0ee;font-family:'Orbitron',sans-serif;font-size:12px;font-weight:700;cursor:pointer;transition:.15s;display:flex;align-items:center;justify-content:center;letter-spacing:1px;}
.key:hover{border-color:rgba(0,229,255,.5);background:rgba(0,229,255,.1);}
.key.wide{min-width:58px;font-size:10px;}
.key.correct{background:rgba(0,255,135,.2);border-color:#00ff87;color:#00ff87;}
.key.present{background:rgba(255,196,0,.2);border-color:#ffc400;color:#ffc400;}
.key.absent{background:rgba(255,255,255,.03);border-color:rgba(255,255,255,.08);color:rgba(208,240,238,.2);}

#playAgain{display:none;margin-top:16px;padding:12px 28px;border:1px solid #00e5ff;border-radius:3px;background:rgba(0,229,255,.08);color:#00e5ff;font-family:'Orbitron',sans-serif;font-size:12px;font-weight:700;letter-spacing:3px;cursor:pointer;transition:.2s;}
#playAgain:hover{background:rgba(0,229,255,.2);}
</style>
</head>
<body>

<h1>WORDLE</h1>
<div class="subtitle">// ERRATE DAS WORT IN 6 VERSUCHEN //</div>
<div id="message"></div>

<div id="board"></div>
<div id="keyboard"></div>
<button id="playAgain" onclick="initGame()">▶ NOCHMAL SPIELEN</button>

<script>
const WORDS=['KATZE','HUNDE','BLUME','STERN','GRUEN','WASSER','FEUER','LICHT','DUNKEL','MUSIK','NACHT','MORGEN','VOGEL','TISCH','BODEN','RAUCH','STAHL','CYBER','NEON','WELLE','KRAFT','TRAUM','PFEIL','GLANZ','STURM','FLUSS','BERGE','STEIN','WOLKE','BLITZ','FROST','GLAUB','KREUZ','SCHAF','FISCH','BAUCH','ASCHE','KLANG','PREIS','REICH'];
const ROWS=6,COLS=5;
let secret='',guesses=[],current='',gameOver=false,currentRow=0;
let revealDelay=false;

function initGame(){
  secret=WORDS[Math.floor(Math.random()*WORDS.length)].toUpperCase();
  // ensure 5 letters
  if(secret.length!==5){secret=WORDS[0];}
  guesses=[];current='';gameOver=false;currentRow=0;revealDelay=false;
  document.getElementById('message').textContent='';
  document.getElementById('playAgain').style.display='none';
  renderBoard();renderKeyboard();
}

function renderBoard(){
  const board=document.getElementById('board');
  board.innerHTML='';
  for(let r=0;r<ROWS;r++){
    const row=document.createElement('div');row.className='row';row.id='row-'+r;
    for(let c=0;c<COLS;c++){
      const cell=document.createElement('div');cell.className='cell';cell.id=`cell-${r}-${c}`;
      row.appendChild(cell);
    }
    board.appendChild(row);
  }
  // fill submitted guesses
  guesses.forEach((g,r)=>revealRow(r,g,true));
  // fill current input
  for(let c=0;c<current.length;c++){
    const cell=document.getElementById(`cell-${currentRow}-${c}`);
    if(cell){cell.textContent=current[c];cell.classList.add('filled');}
  }
}

function revealRow(r,guess,instant){
  const result=scoreGuess(guess);
  result.forEach((res,c)=>{
    const cell=document.getElementById(`cell-${r}-${c}`);
    if(!cell)return;
    cell.textContent=guess[c];
    const delay=instant?0:c*150;
    setTimeout(()=>{cell.classList.remove('filled');cell.classList.add(res);},delay);
  });
  if(!instant){
    const totalDelay=COLS*150+200;
    setTimeout(()=>{updateKeyboard(guess,result);},totalDelay);
  } else {
    updateKeyboard(guess,result);
  }
}

function scoreGuess(guess){
  const result=Array(COLS).fill('absent');
  const secretArr=secret.split('');
  const guessArr=guess.split('');
  // correct pass
  guessArr.forEach((l,i)=>{if(l===secretArr[i]){result[i]='correct';secretArr[i]=null;guessArr[i]=null;}});
  // present pass
  guessArr.forEach((l,i)=>{
    if(l===null)return;
    const si=secretArr.indexOf(l);
    if(si!==-1){result[i]='present';secretArr[si]=null;}
  });
  return result;
}

function renderKeyboard(){
  const rows=['QWERTZUIOP','ASDFGHJKL','YXCVBNM'];
  const kb=document.getElementById('keyboard');
  kb.innerHTML='';
  rows.forEach((row,ri)=>{
    const krow=document.createElement('div');krow.className='krow';
    if(ri===2){
      const enter=document.createElement('button');enter.className='key wide';enter.textContent='ENTER';enter.onclick=()=>submitGuess();krow.appendChild(enter);
    }
    row.split('').forEach(l=>{
      const k=document.createElement('button');k.className='key';k.textContent=l;k.id='key-'+l;k.onclick=()=>addLetter(l);krow.appendChild(k);
    });
    if(ri===2){
      const del=document.createElement('button');del.className='key wide';del.textContent='⌫';del.onclick=()=>deleteLetter();krow.appendChild(del);
    }
    kb.appendChild(krow);
  });
}

function updateKeyboard(guess,result){
  const priority={correct:3,present:2,absent:1};
  guess.split('').forEach((l,i)=>{
    const k=document.getElementById('key-'+l);
    if(!k)return;
    const cur=k.dataset.state||'';
    if((priority[result[i]]||0)>(priority[cur]||0)){k.className='key '+result[i];k.dataset.state=result[i];}
  });
}

function addLetter(l){
  if(gameOver||revealDelay||current.length>=COLS)return;
  current+=l;
  const cell=document.getElementById(`cell-${currentRow}-${current.length-1}`);
  if(cell){cell.textContent=l;cell.classList.add('filled');}
}

function deleteLetter(){
  if(gameOver||revealDelay||current.length===0)return;
  const cell=document.getElementById(`cell-${currentRow}-${current.length-1}`);
  if(cell){cell.textContent='';cell.classList.remove('filled');}
  current=current.slice(0,-1);
}

function submitGuess(){
  if(gameOver||revealDelay)return;
  if(current.length<COLS){shakeRow(currentRow);setMsg('⚠ WORT ZU KURZ');return;}
  revealDelay=true;
  guesses.push(current);
  revealRow(currentRow,current,false);
  const isWin=current===secret;
  const totalDelay=COLS*150+400;
  setTimeout(()=>{
    revealDelay=false;
    if(isWin){
      const msgs=['PERFEKT!','BRILLIANT!','AWESOME!','NEON PRO!','GUT GEMACHT!','YESSS!'];
      setMsg(msgs[Math.min(currentRow,msgs.length-1)]);
      gameOver=true;document.getElementById('playAgain').style.display='block';
      // Auto-save to MyPanel — score = attempts used (fewer attempts = higher score displayed as 7-attempts)
      try{
        const profRaw=localStorage.getItem('mpProfile');
        const prof=profRaw?JSON.parse(profRaw):null;
        const player=(prof?prof.username:localStorage.getItem('username')||'MYPANEL USER').toUpperCase();
        const all=JSON.parse(localStorage.getItem('highscores')||'[]');
        // Score: each win adds points, fewer guesses = more points (max 600 for 1 guess, min 100 for 6 guesses)
        const pts=(ROWS-currentRow)*100+100;
        const prev=all.filter(s=>s.player===player&&s.game==='Wordle').sort((a,b)=>b.score-a.score);
        const newScore=(prev.length>0?prev[0].score:0)+pts;
        const filtered=all.filter(s=>!(s.player===player&&s.game==='Wordle'));
        filtered.push({player,game:'Wordle',score:newScore,date:new Date().toLocaleDateString('de-DE')});
        filtered.sort((a,b)=>b.score-a.score);
        localStorage.setItem('highscores',JSON.stringify(filtered.slice(0,50)));
      }catch(e){}
    } else if(guesses.length>=ROWS){
      setMsg('// '+secret+' //');
      gameOver=true;document.getElementById('playAgain').style.display='block';
    }
    currentRow++;current='';
  },totalDelay);
}

function shakeRow(r){
  for(let c=0;c<COLS;c++){
    const cell=document.getElementById(`cell-${r}-${c}`);
    if(cell){cell.classList.add('shake');setTimeout(()=>cell.classList.remove('shake'),400);}
  }
}

function setMsg(m){
  const el=document.getElementById('message');el.textContent=m;
  setTimeout(()=>{if(el.textContent===m&&!gameOver)el.textContent='';},2000);
}

document.addEventListener('keydown',e=>{
  if(e.key==='Enter'){submitGuess();}
  else if(e.key==='Backspace'){deleteLetter();}
  else if(/^[a-zA-ZäöüÄÖÜ]$/.test(e.key)){addLetter(e.key.toUpperCase());}
});

initGame();
</script>
<!-- ANNOUNCEMENT SYSTEM -->
<style>
#annBanner{display:none;position:fixed;top:0;left:0;right:0;z-index:99999;pointer-events:none;}
#annBanner .aInner{position:relative;background:linear-gradient(135deg,rgba(0,5,15,.96),rgba(0,10,25,.98));padding:18px 60px 22px;text-align:center;border-bottom:3px solid #00e5ff;animation:annSD .5s cubic-bezier(.22,.61,.36,1) both;overflow:hidden;}
#annBanner .aInner::before{content:'';position:absolute;inset:0;background:linear-gradient(90deg,transparent,rgba(0,229,255,.05),transparent);animation:annSW 2s linear infinite;}
@keyframes annSD{from{transform:translateY(-100%);opacity:0;}to{transform:translateY(0);opacity:1;}}
@keyframes annSW{from{transform:translateX(-100%);}to{transform:translateX(100%);}}
.ann-c{position:absolute;width:16px;height:16px;}.ann-c.tl{top:5px;left:8px;border-top:2px solid #00e5ff;border-left:2px solid #00e5ff;}.ann-c.tr{top:5px;right:8px;border-top:2px solid #00e5ff;border-right:2px solid #00e5ff;}.ann-c.bl{bottom:5px;left:8px;border-bottom:2px solid #00ff87;border-left:2px solid #00ff87;}.ann-c.br{bottom:5px;right:8px;border-bottom:2px solid #00ff87;border-right:2px solid #00ff87;}
</style>
<div id="annBanner">
  <div class="aInner">
    <div class="ann-c tl"></div><div class="ann-c tr"></div><div class="ann-c bl"></div><div class="ann-c br"></div>
    <div style="font-family:'Orbitron',sans-serif;font-size:9px;color:rgba(0,229,255,.7);letter-spacing:4px;margin-bottom:5px;">// GLOBAL ANNOUNCEMENT</div>
    <div style="font-family:'Orbitron',sans-serif;font-size:clamp(14px,2.5vw,26px);font-weight:900;color:#fff;text-shadow:0 0 30px rgba(0,229,255,.9);letter-spacing:2px;">📢 <span id="annBannerText"></span></div>
  </div>
</div>
<script>
(function(){
  const DB='https://mypanel-41c90-default-rtdb.europe-west1.firebasedatabase.app';
  let lastTs=0,t=null;
  function sound(){try{const ac=new(window.AudioContext||window.webkitAudioContext)();[[0,.08,880,.15],[.1,.08,1100,.1],[.2,.12,660,.12],[.35,.2,880,.08]].forEach(([st,dur,freq,vol])=>{const o=ac.createOscillator(),g=ac.createGain();o.frequency.value=freq;o.type='sine';g.gain.setValueAtTime(0,ac.currentTime+st);g.gain.linearRampToValueAtTime(vol,ac.currentTime+st+.02);g.gain.exponentialRampToValueAtTime(.001,ac.currentTime+st+dur);o.connect(g);g.connect(ac.destination);o.start(ac.currentTime+st);o.stop(ac.currentTime+st+dur);});setTimeout(()=>ac.close(),800);}catch(e){}}
  function show(txt){
    const b=document.getElementById('annBanner'),el=document.getElementById('annBannerText');
    if(!b||!el)return;
    el.textContent=txt;b.style.display='block';
    const inner=b.querySelector('.aInner');
    if(inner){inner.style.animation='none';void inner.offsetWidth;inner.style.animation='';}
    sound();clearTimeout(t);t=setTimeout(()=>b.style.display='none',10000);
  }
  function poll(){fetch(DB+'/announcement.json?t='+Date.now()).then(r=>r.json()).then(d=>{if(d&&d.text){const ts=d.timestamp||d.text;if(ts!==lastTs){lastTs=ts;show(d.text);}}}).catch(()=>{});}
  setTimeout(poll,1000);setInterval(poll,3000);
})();
</script>


<!-- XP MULTIPLIER -->
<script>
(function(){
  const orig=window.autoSaveScore;
  window.autoSaveScore=function(gameName,score){
    const mult=parseFloat(localStorage.getItem('mpXpMultiplier')||'1');
    const boosted=Math.floor(score*mult);
    if(mult>1){
      // Show notification
      const n=document.createElement('div');
      n.style.cssText='position:fixed;top:20px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,.85);border:1px solid #ffd23f;border-radius:6px;padding:10px 20px;font-family:Orbitron,sans-serif;font-size:13px;font-weight:900;color:#ffd23f;letter-spacing:2px;z-index:99999;pointer-events:none;';
      n.textContent='🎉 '+mult+'x XP! '+Math.floor(score)+' → '+boosted+' PUNKTE!';
      document.body.appendChild(n);
      setTimeout(()=>n.remove(),2500);
    }
    if(orig) orig(gameName,boosted);
    else {
      // Fallback: save directly to localStorage
      try{
        const pr=JSON.parse(localStorage.getItem('mpProfile')||'null');
        const pn=(pr?pr.username:'MYPANEL USER').toUpperCase();
        const all=JSON.parse(localStorage.getItem('highscores')||'[]');
        const prev=all.filter(x=>x.player===pn&&x.game===gameName).sort((a,b)=>b.score-a.score);
        const best=prev.length>0?Math.max(prev[0].score,boosted):boosted;
        const f=all.filter(x=>!(x.player===pn&&x.game===gameName));
        f.push({player:pn,game:gameName,score:best,date:new Date().toLocaleDateString('de-DE')});
        localStorage.setItem('highscores',JSON.stringify(f.sort((a,b)=>b.score-a.score).slice(0,50)));
      }catch(e){}
    }
  };
})();
</script>
</body>
</html>
