<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Flappy Neon — MyPanel</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{width:100%;height:100%;overflow:hidden;background:#050a14;font-family:'Orbitron',sans-serif;touch-action:none;}
canvas{display:block;position:fixed;inset:0;width:100%!important;height:100%!important;}

/* OVERLAYS */
.screen{position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:10;gap:16px;background:rgba(5,10,20,.88);backdrop-filter:blur(12px);}
.screen.hidden{display:none;}
.screen h1{font-size:clamp(28px,6vw,52px);font-weight:900;letter-spacing:4px;text-align:center;}
.screen .sub{font-size:clamp(10px,2vw,13px);color:rgba(255,255,255,.4);letter-spacing:3px;text-align:center;}
.nbtn{padding:13px 36px;border:2px solid currentColor;border-radius:8px;background:transparent;font-family:'Orbitron',sans-serif;font-size:13px;font-weight:900;letter-spacing:3px;cursor:pointer;transition:.2s;min-width:180px;text-align:center;}
.nbtn:active{transform:scale(.96);}
.nbtn.cyan{color:#00e5ff;border-color:#00e5ff;}
.nbtn.cyan:hover{background:rgba(0,229,255,.12);}
.nbtn.gold{color:#ffd23f;border-color:#ffd23f;}
.nbtn.gold:hover{background:rgba(255,210,63,.12);}
.nbtn.pink{color:#ff2b6d;border-color:#ff2b6d;}
.nbtn.pink:hover{background:rgba(255,43,109,.12);}
.nbtn.gray{color:rgba(255,255,255,.4);border-color:rgba(255,255,255,.2);font-size:11px;}

/* STATS ROW */
.statrow{display:flex;gap:28px;align-items:center;}
.stat{text-align:center;}
.stat .val{font-size:clamp(18px,4vw,28px);font-weight:900;}
.stat .lbl{font-size:9px;color:rgba(255,255,255,.4);letter-spacing:3px;margin-top:2px;}

/* SHOP */
#shopGrid{display:grid;grid-template-columns:1fr 1fr;gap:12px;width:min(500px,90vw);max-height:55vh;overflow-y:auto;padding:4px;}
.shopCard{background:rgba(255,255,255,.05);border:2px solid rgba(255,255,255,.1);border-radius:10px;padding:14px;text-align:center;cursor:pointer;transition:.2s;position:relative;}
.shopCard:hover,.shopCard:active{border-color:#00e5ff;background:rgba(0,229,255,.08);}
.shopCard.owned{border-color:#00ff87;cursor:default;}
.shopCard.owned:hover{background:rgba(0,255,135,.05);}
.shopCard.active-skin{border-color:#ffd23f!important;background:rgba(255,210,63,.08)!important;}
.shopCard .icon{font-size:clamp(28px,6vw,40px);margin-bottom:6px;}
.shopCard .name{font-size:clamp(9px,1.8vw,11px);font-weight:700;letter-spacing:2px;margin-bottom:4px;}
.shopCard .price{font-size:clamp(10px,2vw,12px);color:#ffd23f;}
.shopCard .owned-tag{font-size:9px;color:#00ff87;letter-spacing:2px;}
.shopCard .active-tag{font-size:9px;color:#ffd23f;letter-spacing:2px;}
.shopTabs{display:flex;gap:8px;margin-bottom:12px;}
.shopTab{padding:8px 18px;border:1px solid rgba(255,255,255,.2);border-radius:6px;background:transparent;color:rgba(255,255,255,.5);font-family:'Orbitron',sans-serif;font-size:10px;letter-spacing:2px;cursor:pointer;transition:.2s;}
.shopTab.active{border-color:#00e5ff;color:#00e5ff;background:rgba(0,229,255,.1);}

/* HUD */
#hud{position:fixed;top:0;left:0;right:0;padding:12px 20px;display:flex;justify-content:space-between;align-items:center;z-index:5;pointer-events:none;}
#hudScore{font-size:clamp(20px,5vw,36px);font-weight:900;color:#fff;text-shadow:0 0 20px rgba(0,229,255,.8);}
#hudCoins{font-size:13px;color:#ffd23f;letter-spacing:2px;}
#powerBadge{font-size:11px;padding:5px 12px;border:1px solid #00ff87;border-radius:20px;color:#00ff87;letter-spacing:2px;background:rgba(0,255,135,.1);display:none;}

/* SCORE POP */
#scorePop{position:fixed;top:20%;left:50%;transform:translateX(-50%);font-size:clamp(60px,15vw,100px);font-weight:900;pointer-events:none;z-index:6;opacity:0;transition:none;}

/* Announcement */
#annBanner{display:none;position:fixed;top:0;left:0;right:0;z-index:99999;pointer-events:none;}
#annBanner .aInner{background:linear-gradient(135deg,rgba(0,5,15,.97),rgba(0,10,25,.99));padding:14px 50px 18px;text-align:center;border-bottom:2px solid #00e5ff;animation:annSD .5s cubic-bezier(.22,.61,.36,1) both;}
@keyframes annSD{from{transform:translateY(-100%)}to{transform:translateY(0)}}
</style>
</head>
<body>

<canvas id="c"></canvas>

<!-- HUD (in-game) -->
<div id="hud" class="hidden">
  <div id="hudScore">0</div>
  <div style="display:flex;flex-direction:column;align-items:flex-end;gap:4px;">
    <div id="hudCoins">💰 <span id="hudCoinVal">0</span></div>
    <div id="powerBadge">⚡ AKTIV</div>
  </div>
</div>

<!-- SCORE POP -->
<div id="scorePop"></div>

<!-- MAIN MENU -->
<div class="screen" id="menuScreen">
  <h1 style="color:#00e5ff;text-shadow:0 0 30px #00e5ff;">🐦 FLAPPY<br>NEON</h1>
  <div class="sub">TIPPE ÜBERALL UM ZU FLIEGEN</div>
  <div class="statrow">
    <div class="stat"><div class="val" id="menuHs" style="color:#ffd23f;">0</div><div class="lbl">HIGHSCORE</div></div>
    <div class="stat"><div class="val" id="menuCoins" style="color:#ffd23f;">0</div><div class="lbl">💰 COINS</div></div>
  </div>
  <button class="nbtn cyan" onclick="startGame()">▶ SPIELEN</button>
  <button class="nbtn gold" onclick="showShop()">🛒 SHOP</button>
</div>

<!-- GAME OVER -->
<div class="screen hidden" id="gameoverScreen">
  <h1 style="color:#ff2b6d;text-shadow:0 0 30px #ff2b6d;">GAME<br>OVER</h1>
  <div class="statrow">
    <div class="stat"><div class="val" id="goScore" style="color:#00e5ff;">0</div><div class="lbl">PUNKTE</div></div>
    <div class="stat"><div class="val" id="goHs" style="color:#ffd23f;">0</div><div class="lbl">HIGHSCORE</div></div>
    <div class="stat"><div class="val" id="goCoins" style="color:#ffd23f;">+0</div><div class="lbl">COINS</div></div>
  </div>
  <div id="newHsBadge" class="hidden" style="font-size:12px;color:#ffd23f;letter-spacing:3px;">🏆 NEUER HIGHSCORE!</div>
  <button class="nbtn cyan" onclick="startGame()">🔄 NOCHMAL</button>
  <button class="nbtn gray" onclick="showMenu()">← MENÜ</button>
</div>

<!-- SHOP -->
<div class="screen hidden" id="shopScreen">
  <h1 style="color:#ffd23f;font-size:clamp(22px,5vw,36px);">🛒 SHOP</h1>
  <div style="font-size:13px;color:#ffd23f;letter-spacing:2px;margin-bottom:4px;">💰 <span id="shopCoins">0</span> COINS</div>
  <div class="shopTabs">
    <button class="shopTab active" id="tabSkins" onclick="switchTab('skins')">🐦 SKINS</button>
    <button class="shopTab" id="tabPowerups" onclick="switchTab('powerups')">⚡ POWER-UPS</button>
  </div>
  <div id="shopGrid"></div>
  <button class="nbtn gray" onclick="showMenu()">← ZURÜCK</button>
</div>

<div id="annBanner"><div class="aInner">
  <div style="font-size:9px;color:rgba(0,229,255,.7);letter-spacing:4px;margin-bottom:4px;">// GLOBAL ANNOUNCEMENT</div>
  <div style="font-size:clamp(13px,2.5vw,22px);font-weight:900;color:#fff;text-shadow:0 0 20px rgba(0,229,255,.8);">📢 <span id="annText"></span></div>
</div></div>

<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database-compat.js"></script>
<script>

try{
  if(typeof firebase!=='undefined'){
    firebase.initializeApp({
      apiKey:"AIzaSyDqVPdgGhRx6v__sx7pCe5mOre8XT7xRLg",
      authDomain:"mypanel-41c90.firebaseapp.com",
      databaseURL:"https://mypanel-41c90-default-rtdb.europe-west1.firebasedatabase.app",
      projectId:"mypanel-41c90",
      storageBucket:"mypanel-41c90.firebasestorage.app",

    rdb=firebase.apps&&firebase.apps.length?firebase.database():null;
  }
}catch(e){rdb=null;}

<script>
const canvas=document.getElementById('c');
const ctx=canvas.getContext('2d');
let W,H;
function resize(){W=canvas.width=window.innerWidth;H=canvas.height=window.innerHeight;}
resize();window.addEventListener('resize',()=>{resize();});

// ===== DATA =====
const SKINS={
  default:{name:'CLASSIC',icon:'🐦',color:'#facc15',eye:'#000',cost:0},
  cyber:  {name:'CYBER',  icon:'🤖',color:'#00e5ff',eye:'#fff',cost:200},
  fire:   {name:'FIRE',   icon:'🔥',color:'#ff5500',eye:'#fff',cost:350},
  ghost:  {name:'GHOST',  icon:'👻',color:'rgba(200,220,255,.85)',eye:'#4488ff',cost:500},
  dragon: {name:'DRAGON', icon:'🐉',color:'#9b59b6',eye:'#ffd23f',cost:800},
  gold:   {name:'GOLD',   icon:'⭐',color:'#ffd23f',eye:'#000',cost:1200},
};
const POWERUPS={
  shield:{name:'SCHILD',icon:'🛡️',desc:'1 Treffer überstehen',cost:150,type:'use'},
  slow:  {name:'ZEITLUPE',icon:'⏱️',desc:'30s Zeitlupe',cost:200,type:'use'},
  magnet:{name:'MAGNET',icon:'🧲',desc:'Coins anziehen',cost:180,type:'use'},
  double:{name:'2X COINS',icon:'💰',desc:'Doppelte Coins',cost:250,type:'use'},
};

let coins=+localStorage.getItem('fn_coins')||0;
let high=+localStorage.getItem('fn_high')||0;
let owned=JSON.parse(localStorage.getItem('fn_owned')||'["default"]');
let activeSkin=localStorage.getItem('fn_skin')||'default';
let inventory=JSON.parse(localStorage.getItem('fn_inv')||'{}');
let shopTab='skins';

function getMyName(){
  try{const p=JSON.parse(localStorage.getItem('mpProfile')||'null');return p?p.username:'SPIELER';}catch(e){return 'SPIELER';}
}

function save(){
  localStorage.setItem('fn_coins',coins);
  localStorage.setItem('fn_high',high);
  localStorage.setItem('fn_owned',JSON.stringify(owned));
  localStorage.setItem('fn_skin',activeSkin);
  localStorage.setItem('fn_inv',JSON.stringify(inventory));
}

// ===== GAME STATE =====
let bird,pipes,coinItems,particles,gameState,score,frameCoins,raf;
let activePower=null,powerTimer=0;
let shieldHp=0,slowActive=false,magnetActive=false,doubleActive=false;
let bgStars=[];

/* ===== ZUSCHAUER-MODUS ===== */
const _urlParams=new URLSearchParams(location.search);
const spectateName=_urlParams.get('spectate');
let isSpectator=false;

function startSpectate(name){
  isSpectator=true;
  document.getElementById('menuScreen').classList.add('hidden');
  document.getElementById('hud').classList.remove('hidden');
  pipes=[];coinItems=[];particles=[];
  bird={x:W*0.2,y:H*0.45,vy:0,rot:0,skin:SKINS.default};

  const banner=document.createElement('div');
  banner.id='spectateBanner';
  banner.style.cssText='position:fixed;top:16px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,.75);border:1px solid #00e5ff;padding:8px 22px;border-radius:20px;font-family:Orbitron,sans-serif;font-size:11px;letter-spacing:2px;color:#00e5ff;z-index:9999;box-shadow:0 0 20px rgba(0,229,255,.3);';
  banner.textContent='👁️ ZUSCHAUER-MODUS · '+name.toUpperCase();
  document.body.appendChild(banner);

  if(!rdb){banner.textContent='⚠ FIREBASE NICHT VERBUNDEN';banner.style.borderColor='#ff2b6d';banner.style.color='#ff2b6d';return;}

  try{
    const key=getMyName().replace(/[.#$\/\[\]]/g,'_');
    const specRef=rdb.ref('liveGames/'+name+'/spectators/'+key);
    specRef.set(true);
    specRef.onDisconnect().remove();
  }catch(e){}

  const ref=rdb.ref('liveGames/'+name);
  ref.on('value',snap=>{
    if(!snap.exists()){
      banner.textContent='⏹ KEIN LIVE-SPIEL GEFUNDEN';
      banner.style.borderColor='#ff2b6d';banner.style.color='#ff2b6d';
      return;
    }
    const d=snap.val();
    bird.y=d.birdY;bird.rot=d.birdRot||0;
    pipes=d.pipes||[];
    score=d.score||0;
    document.getElementById('hudScore').textContent=score;
  });

  gameState='spectating';
  spectatorLoop();
}
if(spectateName)startSpectate(spectateName);

function spectatorLoop(){
  if(gameState!=='spectating')return;
  W=canvas.width;H=canvas.height;
  ctx.clearRect(0,0,W,H);
  drawBg();
  const PR=W*0.038,PW=PR*2.4;
  pipes.forEach(p=>{
    ctx.save();
    ctx.shadowColor='#00ff87';ctx.shadowBlur=20;
    const pgrad=ctx.createLinearGradient(p.x,0,p.x+PW,0);
    pgrad.addColorStop(0,'#00c060');pgrad.addColorStop(1,'#00ff87');
    ctx.fillStyle=pgrad;
    ctx.beginPath();ctx.roundRect(p.x,0,PW,p.top-8,4);ctx.fill();
    ctx.beginPath();ctx.roundRect(p.x-5,p.top-18,PW+10,18,[4,4,0,0]);ctx.fill();
    ctx.beginPath();ctx.roundRect(p.x,p.bottom+8,PW,H-p.bottom,4);ctx.fill();
    ctx.beginPath();ctx.roundRect(p.x-5,p.bottom,PW+10,18,[0,0,4,4]);ctx.fill();
    ctx.restore();
  });
  drawBird();
  raf=requestAnimationFrame(spectatorLoop);
}

/* Eigenen Live-Zustand periodisch senden, damit Freunde zuschauen können */
let lastLiveSync=0;
function syncLiveState(){
  if(isSpectator||!rdb||!bird)return;
  const now=Date.now();
  if(now-lastLiveSync<100)return;
  lastLiveSync=now;
  try{
    rdb.ref('liveGames/'+getMyName()).set({
      birdY:Math.round(bird.y),birdRot:Math.round(bird.rot*100)/100,
      pipes:pipes.map(p=>({x:Math.round(p.x),top:Math.round(p.top),bottom:Math.round(p.bottom)})),
      score,ts:now
    });
  }catch(e){}
}
function clearLiveState(){
  if(isSpectator||!rdb)return;
  try{rdb.ref('liveGames/'+getMyName()).remove();}catch(e){}
}
window.addEventListener('beforeunload',clearLiveState);

// Init stars once
for(let i=0;i<80;i++) bgStars.push({x:Math.random(),y:Math.random(),r:.5+Math.random()*1.5,a:.3+Math.random()*.7,sp:.1+Math.random()*.3});

// ===== SCREENS =====
function showMenu(){
  document.getElementById('menuScreen').classList.remove('hidden');
  document.getElementById('gameoverScreen').classList.add('hidden');
  document.getElementById('shopScreen').classList.add('hidden');
  document.getElementById('hud').classList.add('hidden');
  document.getElementById('menuHs').textContent=high;
  document.getElementById('menuCoins').textContent=coins;
  gameState='menu';
  cancelAnimationFrame(raf);
  raf=requestAnimationFrame(bgLoop);
}

function showShop(){
  document.getElementById('menuScreen').classList.add('hidden');
  document.getElementById('shopScreen').classList.remove('hidden');
  document.getElementById('shopCoins').textContent=coins;
  renderShop();
}

function showGameover(){
  document.getElementById('hud').classList.add('hidden');
  const newHs=score>high;
  if(newHs){high=score;save();}
  document.getElementById('gameoverScreen').classList.remove('hidden');
  document.getElementById('goScore').textContent=score;
  document.getElementById('goHs').textContent=high;
  document.getElementById('goCoins').textContent='+'+frameCoins;
  document.getElementById('newHsBadge').classList.toggle('hidden',!newHs);
  gameState='gameover';
  // Firebase save
  saveHighscore(score);
}

function saveHighscore(sc){
  try{
    const mult=parseFloat(localStorage.getItem('mpXpMultiplier')||'1');
    const boosted=Math.round(sc*mult);
    const pr=JSON.parse(localStorage.getItem('mpProfile')||'null');
    const pn=(pr?pr.username:'MYPANEL USER').toUpperCase();
    if(window.parent&&window.parent.fbDB){
      window.parent.fbDB.ref('highscores/'+pn+'_Flappy').transaction(cur=>(cur===null||boosted>cur)?boosted:cur);
    }
    if(mult>1) toast('🎉 '+mult+'x XP! → '+boosted+' PUNKTE','#ffd23f');
  }catch(e){}
}

// ===== SHOP LOGIC =====
function switchTab(t){
  shopTab=t;
  document.getElementById('tabSkins').classList.toggle('active',t==='skins');
  document.getElementById('tabPowerups').classList.toggle('active',t==='powerups');
  renderShop();
}

function renderShop(){
  const grid=document.getElementById('shopGrid');
  grid.innerHTML='';
  if(shopTab==='skins'){
    Object.entries(SKINS).forEach(([id,sk])=>{
      const isOwned=owned.includes(id);
      const isActive=activeSkin===id;
      const div=document.createElement('div');
      div.className='shopCard'+(isOwned?' owned':'')+(isActive?' active-skin':'');
      div.innerHTML=`<div class="icon">${sk.icon}</div>
        <div class="name" style="color:${sk.color}">${sk.name}</div>
        ${isActive?'<div class="active-tag">✔ AUSGEWÄHLT</div>':
          isOwned?'<div class="owned-tag">✔ BESITZEN</div>':
          `<div class="price">💰 ${sk.cost}</div>`}`;
      div.onclick=()=>{
        if(isOwned){activeSkin=id;save();renderShop();}
        else if(coins>=sk.cost){coins-=sk.cost;owned.push(id);activeSkin=id;save();
          document.getElementById('shopCoins').textContent=coins;renderShop();toast('✅ GEKAUFT!','#00ff87');}
        else toast('❌ ZU WENIG COINS','#ff2b6d');
      };
      grid.appendChild(div);
    });
  } else {
    Object.entries(POWERUPS).forEach(([id,pu])=>{
      const qty=(inventory[id]||0);
      const div=document.createElement('div');
      div.className='shopCard';
      div.innerHTML=`<div class="icon">${pu.icon}</div>
        <div class="name">${pu.name}</div>
        <div class="sub" style="font-size:9px;color:rgba(255,255,255,.4);letter-spacing:1px;margin:2px 0;">${pu.desc}</div>
        <div class="price">💰 ${pu.cost}</div>
        <div style="font-size:11px;color:#00e5ff;margin-top:4px;">BESITZ: ${qty}</div>`;
      div.onclick=()=>{
        if(coins>=pu.cost){coins-=pu.cost;inventory[id]=(inventory[id]||0)+1;save();
          document.getElementById('shopCoins').textContent=coins;renderShop();toast('✅ GEKAUFT!','#00ff87');}
        else toast('❌ ZU WENIG COINS','#ff2b6d');
      };
      grid.appendChild(div);
    });
  }
}

// ===== GAME =====
function startGame(){
  document.getElementById('menuScreen').classList.add('hidden');
  document.getElementById('gameoverScreen').classList.add('hidden');
  document.getElementById('shopScreen').classList.add('hidden');
  document.getElementById('hud').classList.remove('hidden');
  document.getElementById('hudCoinVal').textContent=coins;
  document.getElementById('powerBadge').style.display='none';
  gameState='playing';
  score=0;frameCoins=0;
  activePower=null;shieldHp=0;slowActive=false;magnetActive=false;doubleActive=false;
  document.getElementById('hudScore').textContent='0';

  // Pick power-up if owned
  const inv=Object.entries(inventory).filter(([k,v])=>v>0);
  if(inv.length>0){
    // auto-equip first available
    const [pid]=inv[0];
    inventory[pid]--;save();
    activatePower(pid);
  }

  const skin=SKINS[activeSkin]||SKINS.default;
  bird={x:W*0.2,y:H*0.45,vy:0,rot:0,skin};
  pipes=[];coinItems=[];particles=[];
  lastPipe=0;pipeSpeed=W*0.004;

  cancelAnimationFrame(raf);
  last=performance.now();
  raf=requestAnimationFrame(gameLoop);
}

function activatePower(id){
  const badge=document.getElementById('powerBadge');
  badge.style.display='block';
  if(id==='shield'){shieldHp=1;badge.textContent='🛡️ SCHILD';}
  else if(id==='slow'){slowActive=true;badge.textContent='⏱️ ZEITLUPE';setTimeout(()=>{slowActive=false;badge.style.display='none';},30000);}
  else if(id==='magnet'){magnetActive=true;badge.textContent='🧲 MAGNET';setTimeout(()=>{magnetActive=false;badge.style.display='none';},20000);}
  else if(id==='double'){doubleActive=true;badge.textContent='💰 2X COINS';setTimeout(()=>{doubleActive=false;badge.style.display='none';},25000);}
}

let last=0,lastPipe=0,pipeSpeed=3;

function gameLoop(ts){
  if(gameState!=='playing'){return;}
  const rawDt=Math.min((ts-last)/16,3);
  last=ts;
  const dt=slowActive?rawDt*0.4:rawDt;
  const speed=pipeSpeed*(slowActive?0.4:1);

  syncLiveState();

  W=canvas.width;H=canvas.height;
  ctx.clearRect(0,0,W,H);

  // BG
  drawBg();

  // Spawn pipes
  if(ts-lastPipe>1600/(slowActive?0.4:1)){
    lastPipe=ts;
    const gap=Math.max(H*0.22,H*0.3-score*1.5);
    const minTop=H*0.12,maxTop=H-gap-H*0.12;
    const top=minTop+Math.random()*(maxTop-minTop);
    pipes.push({x:W+60,top,bottom:top+gap,passed:false});
    // Coin in gap
    if(Math.random()>0.3) coinItems.push({x:W+60+25,y:top+gap/2+(Math.random()-.5)*gap*0.4,collected:false});
  }

  // Pipes
  const PR=W*0.038,PW=PR*2.4;
  pipes.forEach((p,i)=>{
    p.x-=speed*dt;
    // Glow
    ctx.save();
    ctx.shadowColor='#00ff87';ctx.shadowBlur=20;
    const pgrad=ctx.createLinearGradient(p.x,0,p.x+PW,0);
    pgrad.addColorStop(0,'#00c060');pgrad.addColorStop(1,'#00ff87');
    ctx.fillStyle=pgrad;
    // Top pipe
    ctx.beginPath();ctx.roundRect(p.x,0,PW,p.top-8,4);ctx.fill();
    // Top cap
    ctx.beginPath();ctx.roundRect(p.x-5,p.top-18,PW+10,18,[4,4,0,0]);ctx.fill();
    // Bottom pipe
    ctx.beginPath();ctx.roundRect(p.x,p.bottom+8,PW,H-p.bottom,4);ctx.fill();
    // Bottom cap
    ctx.beginPath();ctx.roundRect(p.x-5,p.bottom,PW+10,18,[0,0,4,4]);ctx.fill();
    ctx.restore();
    if(!p.passed&&p.x+PW<bird.x){p.passed=true;score++;pipeSpeed=W*0.004+score*0.00015;
      document.getElementById('hudScore').textContent=score;showScorePop();}
    if(p.x+PW<-100) pipes.splice(i,1);
    // Collision
    if(bird.x+16>p.x-5&&bird.x-16<p.x+PW+5&&(bird.y-16<p.top||bird.y+16>p.bottom)){
      handleCollision();
    }
  });

  // Coins
  coinItems.forEach((c,i)=>{
    if(c.collected)return;
    c.x-=speed*dt;
    if(magnetActive){
      const dx=bird.x-c.x,dy=bird.y-c.y;
      const d=Math.sqrt(dx*dx+dy*dy);
      if(d<H*0.25){c.x+=dx/d*6;c.y+=dy/d*6;}
    }
    ctx.save();ctx.shadowColor='#ffd23f';ctx.shadowBlur=14;
    const cg=ctx.createRadialGradient(c.x,c.y,0,c.x,c.y,9);
    cg.addColorStop(0,'#fff8d6');cg.addColorStop(1,'#ffd23f');
    ctx.fillStyle=cg;ctx.beginPath();ctx.arc(c.x,c.y,9,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='rgba(0,0,0,.3)';ctx.font='bold 9px Arial';ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.fillText('$',c.x,c.y);
    ctx.restore();
    if(Math.abs(bird.x-c.x)<22&&Math.abs(bird.y-c.y)<22){
      c.collected=true;
      const earned=doubleActive?2:1;
      coins+=earned;frameCoins+=earned;
      document.getElementById('hudCoinVal').textContent=coins;
      spawnParticles(c.x,c.y,'#ffd23f',8);
    }
    if(c.x<-50) coinItems.splice(i,1);
  });

  // Physics
  bird.vy+=0.55*dt;
  bird.y+=bird.vy*dt;
  bird.rot=Math.max(-30,Math.min(90,bird.vy*4));

  // Border
  if(bird.y+18>H||bird.y-18<0) handleCollision();

  // Draw bird
  drawBird();

  // Particles
  updateParticles(dt);

  // Shield glow
  if(shieldHp>0){
    ctx.save();ctx.strokeStyle='rgba(0,229,255,.6)';ctx.shadowColor='#00e5ff';ctx.shadowBlur=20;ctx.lineWidth=2;
    ctx.beginPath();ctx.arc(bird.x,bird.y,26,0,Math.PI*2);ctx.stroke();ctx.restore();
  }

  raf=requestAnimationFrame(gameLoop);
}

function handleCollision(){
  if(shieldHp>0){shieldHp=0;spawnParticles(bird.x,bird.y,'#00e5ff',20);document.getElementById('powerBadge').style.display='none';return;}
  coins+=frameCoins;save();
  clearLiveState();
  spawnParticles(bird.x,bird.y,'#ff2b6d',25);
  gameState='done';
  setTimeout(showGameover,600);
}

function drawBird(){
  const sk=bird.skin;
  ctx.save();
  ctx.translate(bird.x,bird.y);
  ctx.rotate(bird.rot*Math.PI/180);
  // Glow
  ctx.shadowColor=sk.color;ctx.shadowBlur=18;
  // Body
  ctx.fillStyle=sk.color;
  ctx.beginPath();ctx.ellipse(0,0,18,14,0,0,Math.PI*2);ctx.fill();
  // Wing
  const wOff=Math.sin(Date.now()/100)*5;
  ctx.fillStyle=sk.color;ctx.globalAlpha=0.7;
  ctx.beginPath();ctx.ellipse(-6,wOff,10,6,-0.3,0,Math.PI*2);ctx.fill();
  ctx.globalAlpha=1;
  // Eye
  ctx.fillStyle='white';ctx.beginPath();ctx.arc(7,-4,5,0,Math.PI*2);ctx.fill();
  ctx.fillStyle=sk.eye;ctx.beginPath();ctx.arc(8,-4,2.5,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='rgba(255,255,255,.8)';ctx.beginPath();ctx.arc(9,-5,1,0,Math.PI*2);ctx.fill();
  // Beak
  ctx.fillStyle='#fb923c';
  ctx.beginPath();ctx.moveTo(16,-2);ctx.lineTo(23,1);ctx.lineTo(16,5);ctx.closePath();ctx.fill();
  ctx.restore();
}

function drawBg(){
  const bg=ctx.createLinearGradient(0,0,0,H);
  bg.addColorStop(0,'#050a14');bg.addColorStop(1,'#0a1428');
  ctx.fillStyle=bg;ctx.fillRect(0,0,W,H);
  // Stars
  bgStars.forEach(s=>{
    s.x-=s.sp*0.0005;if(s.x<0)s.x=1;
    ctx.fillStyle=`rgba(255,255,255,${s.a})`;
    ctx.beginPath();ctx.arc(s.x*W,s.y*H,s.r,0,Math.PI*2);ctx.fill();
  });
  // Grid lines
  ctx.strokeStyle='rgba(0,229,255,.04)';ctx.lineWidth=1;
  for(let x=0;x<W;x+=W/8){ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,H);ctx.stroke();}
  for(let y=0;y<H;y+=H/10){ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(W,y);ctx.stroke();}
}

// BG loop for menu
function bgLoop(ts){
  if(gameState!=='menu'&&gameState!=='gameover')return;
  W=canvas.width;H=canvas.height;
  ctx.clearRect(0,0,W,H);drawBg();
  raf=requestAnimationFrame(bgLoop);
}

function spawnParticles(x,y,color,count){
  for(let i=0;i<count;i++){
    const ang=Math.random()*Math.PI*2,spd=2+Math.random()*6;
    particles.push({x,y,vx:Math.cos(ang)*spd,vy:Math.sin(ang)*spd-2,life:40,maxLife:40,color,size:3+Math.random()*4});
  }
}

function updateParticles(dt){
  for(let i=particles.length-1;i>=0;i--){
    const p=particles[i];
    p.x+=p.vx*dt;p.y+=p.vy*dt;p.vy+=0.2*dt;p.life-=dt;p.size*=0.97;
    ctx.save();ctx.globalAlpha=p.life/p.maxLife;
    ctx.fillStyle=p.color;ctx.shadowColor=p.color;ctx.shadowBlur=6;
    ctx.beginPath();ctx.arc(p.x,p.y,p.size,0,Math.PI*2);ctx.fill();
    ctx.restore();
    if(p.life<=0)particles.splice(i,1);
  }
}

let popTimeout=null;
function showScorePop(){
  const el=document.getElementById('scorePop');
  el.textContent=score;
  el.style.color=score%10===0&&score>0?'#ffd23f':'rgba(255,255,255,.7)';
  el.style.opacity='1';el.style.transform='translateX(-50%) scale(1.2)';
  clearTimeout(popTimeout);
  popTimeout=setTimeout(()=>{el.style.opacity='0';el.style.transform='translateX(-50%) scale(1)';},500);
}

function toast(msg,color){
  const el=document.createElement('div');
  el.style.cssText=`position:fixed;bottom:100px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,.9);border:1px solid ${color};border-radius:8px;padding:10px 20px;font-family:'Orbitron',sans-serif;font-size:12px;color:${color};letter-spacing:2px;z-index:9999;pointer-events:none;`;
  el.textContent=msg;document.body.appendChild(el);
  setTimeout(()=>el.remove(),2000);
}

// ===== INPUT =====
function doJump(e){
  e.preventDefault();
  if(gameState==='playing'&&bird) bird.vy=-H*0.011;
}
document.addEventListener('touchstart',doJump,{passive:false});
document.addEventListener('mousedown',e=>{if(gameState==='playing')doJump(e);});
document.addEventListener('keydown',e=>{if(e.code==='Space'&&gameState==='playing')doJump(e);});

// ===== ANNOUNCEMENT =====
(function(){
  const DB='https://mypanel-41c90-default-rtdb.europe-west1.firebasedatabase.app';
  let lastTs=0,t=null;
  function show(txt){
    const b=document.getElementById('annBanner'),el=document.getElementById('annText');
    if(!b||!el)return;el.textContent=txt;b.style.display='block';
    clearTimeout(t);t=setTimeout(()=>b.style.display='none',10000);
  }
  function poll(){fetch(DB+'/announcement.json?t='+Date.now()).then(r=>r.json()).then(d=>{if(d&&d.text){const ts=d.timestamp||d.text;if(ts!==lastTs){lastTs=ts;show(d.text);}}}).catch(()=>{});}
  setTimeout(poll,1000);setInterval(poll,3000);
})();

// Init
gameState='menu';
showMenu();
</script>
