<script>
const cv=document.getElementById("cv");
const ctx=cv.getContext("2d");

const W=cv.width;
const H=cv.height;
const ground=380;

let run=false;
let level="leicht";

let speed=4;
let progress=0;
let progressAdd=.1;

let timer=0;
let next=320;
let obs=[];
let frame=0;

/* Zielmodus */
let goalMode=false;
let goalX=W+250;

const p={
x:150,
y:338,
w:42,
h:42,
vy:0,
jump:false,
rot:0
};

let trail=[]; // Partikel-Trail hinter dem Würfel

const gravity=.72;
const jumpPower=-13;

/* ===== 5 SCHWIERIGKEITSSTUFEN ===== */
const STAGES={
  leicht:    {label:'🟢 Leicht',     grad:['#22c55e','#16a34a'], speed:3.6, progressAdd:.08,  next:430, gap:[230,330], h:[30,38], spawnMulti:0.08},
  mittel:    {label:'🟠 Mittel',     grad:['#f59e0b','#ea580c'], speed:4.2, progressAdd:.11,  next:360, gap:[190,270], h:[34,44], spawnMulti:0.15},
  schwer:    {label:'🔴 Schwer',     grad:['#ef4444','#b91c1c'], speed:4.8, progressAdd:.09,  next:325, gap:[175,245], h:[36,46], spawnMulti:0.18},
  extrem:    {label:'🟣 Extrem',     grad:['#a855f7','#7e22ce'], speed:5.6, progressAdd:.095, next:290, gap:[160,225], h:[38,50], spawnMulti:0.24},
  unmoeglich:{label:'⚫ Unmöglich',  grad:['#f43f5e','#1f2937'], speed:6.4, progressAdd:.1,   next:255, gap:[145,205], h:[40,55], spawnMulti:0.3}
};

/* Bestleistung pro Level (lokal gespeichert) */
function getBests(){
  try{return JSON.parse(localStorage.getItem('gdBestPct')||'{}');}catch(e){return{};}
}
function updateBest(lv,pct){
  try{
    const b=getBests();
    if(!b[lv]||pct>b[lv]){b[lv]=Math.floor(pct);localStorage.setItem('gdBestPct',JSON.stringify(b));}
  }catch(e){}
}

/* ===== ZUSCHAUER-MODUS ===== */
const _urlParams=new URLSearchParams(location.search);
const spectateName=_urlParams.get('spectate');
let isSpectator=false;

function startSpectate(name){
  isSpectator=true;
  overlay.classList.add('hide');

  const banner=document.createElement('div');
  banner.id='spectateBanner';
  banner.style.cssText='position:fixed;top:16px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,.75);border:1px solid #22d3ee;padding:8px 22px;border-radius:20px;font-family:Segoe UI;font-size:12px;font-weight:900;letter-spacing:2px;color:#22d3ee;z-index:9999;box-shadow:0 0 20px rgba(34,211,238,.3);';
  banner.textContent='👁️ ZUSCHAUER-MODUS · '+name.toUpperCase();
  document.body.appendChild(banner);

  if(!rdb){banner.textContent='⚠ FIREBASE NICHT VERBUNDEN';banner.style.borderColor='#ff2b6d';banner.style.color='#ff2b6d';return;}

  try{
    const key=getMyName().replace(/[.#$\/\[\]]/g,'_');
    const specRef=rdb.ref('liveGames/'+name+'/spectators/'+key);
    specRef.set(true);
    specRef.onDisconnect().remove();
  }catch(e){}

  const ref=rdb.ref('liveGames/'+name);
  ref.on('value',snap=>{
    if(!snap.exists()){
      banner.textContent='⏹ KEIN LIVE-SPIEL GEFUNDEN';
      banner.style.borderColor='#ff2b6d';banner.style.color='#ff2b6d';
      return;
    }
    const d=snap.val();
    level=d.level||'leicht';
    p.y=d.py;p.rot=d.prot||0;
    obs=d.obs||[];
    frame=d.frame||0;
    percent.innerText=Math.floor(d.progress||0);
    lvl.innerText=(STAGES[level]&&STAGES[level].label.replace(/^\S+\s/,''))||level;
  });
  requestAnimationFrame(loop);
}
if(spectateName)startSpectate(spectateName);

/* Eigenen Live-Zustand periodisch senden, damit Freunde zuschauen können */
let lastLiveSync=0;
function syncLiveState(){
  if(isSpectator||!rdb)return;
  const now=Date.now();
  if(now-lastLiveSync<120)return;
  lastLiveSync=now;
  try{
    rdb.ref('liveGames/'+getMyName()).set({
      level,py:Math.round(p.y),prot:Math.round(p.rot*100)/100,
      obs:obs.map(o=>({x:Math.round(o.x),y:Math.round(o.y),w:o.w,h:o.h})),
      frame,progress,ts:now
    });
  }catch(e){}
}
function clearLiveState(){
  if(isSpectator||!rdb)return;
  try{rdb.ref('liveGames/'+getMyName()).remove();}catch(e){}
}
window.addEventListener('beforeunload',clearLiveState);

/* MENU */
function menu(){
overlay.classList.remove("hide");
const b=getBests();

const buttons=Object.keys(STAGES).map(key=>{
  const s=STAGES[key];
  const bestTxt=b[key]?'<span class="best-tag">🏅 Bestes: '+b[key]+'%</span>':'';
  return `<button class="btn level-btn" style="background:linear-gradient(135deg,${s.grad[0]},${s.grad[1]})" onclick="start('${key}')">${s.label}${bestTxt}</button>`;
}).join('');

popup.innerHTML=`
<h2>⚡ Level wählen</h2>
<p>Wähle Schwierigkeit</p>
${buttons}
`;
}
menu();

/* START */
function start(lv){

level=lv;
run=true;
progress=0;
timer=0;
obs=[];
frame=0;
trail=[];

goalMode=false;
goalX=W+250;

p.y=338;
p.vy=0;
p.jump=false;
p.rot=0;

const cfg=STAGES[level];
speed=cfg.speed;
progressAdd=cfg.progressAdd;
next=cfg.next;

lvl.innerText=STAGES[level].label.replace(/^\S+\s/,'');
percent.innerText="0";

overlay.classList.add("hide");
}

/* random */
function rnd(a,b){
return Math.floor(Math.random()*(b-a+1))+a;
}

/* ===== SOUND ===== */
let actx=null;
function sfx(freq,dur,type,vol){
  try{
    if(!actx)actx=new(window.AudioContext||window.webkitAudioContext)();
    const o=actx.createOscillator(),g=actx.createGain();
    o.type=type||'square';o.frequency.value=freq;
    g.gain.setValueAtTime(0,actx.currentTime);
    g.gain.linearRampToValueAtTime(vol||0.12,actx.currentTime+0.01);
    g.gain.exponentialRampToValueAtTime(0.001,actx.currentTime+dur);
    o.connect(g);g.connect(actx.destination);
    o.start();o.stop(actx.currentTime+dur);
  }catch(e){}
}
function sndJump(){sfx(520,0.1,'square',0.1);}
function sndCrash(){sfx(120,0.35,'sawtooth',0.16);}
function sndWin(){[0,0.12,0.24,0.36].forEach((t,i)=>setTimeout(()=>sfx(500+i*160,0.16,'triangle',0.14),t*1000));}

/* jump */
function jump(){
if(!run) return;

if(!p.jump){
p.vy=jumpPower;
p.jump=true;
sndJump();
}
}

document.addEventListener("keydown",e=>{
if(e.code==="Space"){
e.preventDefault();
jump();
}
});

cv.onclick=jump;
cv.addEventListener("touchstart",e=>{
e.preventDefault();
jump();
},{passive:false});

/* obstacles */
function spawn(){

const cfg=STAGES[level];
const count=Math.random()<cfg.spawnMulti?2:1;
const gap=rnd(cfg.gap[0],cfg.gap[1]);
const h=rnd(cfg.h[0],cfg.h[1]);

for(let i=0;i<count;i++){
obs.push({
x:W+(i*gap),
y:ground-h,
w:34,
h:h
});
}
}

/* over */
function saveGeoScore(pct){
  updateBest(level,pct);
  try{
    if(typeof window.autoSaveScore==='function'){
      window.autoSaveScore('Geometry Dash',pct);
    }
  }catch(e){}
}

function over(){
run=false;
clearLiveState();
sndCrash();
saveGeoScore(Math.floor(progress));
overlay.classList.remove("hide");

popup.innerHTML=`
<h2>💥 Game Over</h2>
<p>${Math.floor(progress)}% geschafft</p>
<button class="btn" onclick="menu()">🔁 Nochmal</button>
`;
}

/* win */
function win(){
run=false;
clearLiveState();
sndWin();
saveGeoScore(100);
overlay.classList.remove("hide");

popup.innerHTML=`
<h2>🏆 Geschafft!</h2>
<p>100% erreicht</p>
<button class="btn" onclick="menu()">▶ Neues Spiel</button>
`;
}

/* draw cube */
function drawPlayer(){

/* Partikel-Trail aktualisieren */
trail.push({x:p.x+21,y:p.y+21,rot:p.rot});
if(trail.length>10)trail.shift();

trail.forEach((t,i)=>{
const a=(i/trail.length)*0.35;
ctx.save();
ctx.globalAlpha=a;
ctx.translate(t.x,t.y);
ctx.rotate(t.rot);
ctx.fillStyle="#facc15";
ctx.fillRect(-16,-16,32,32);
ctx.restore();
});

const stageColor=(STAGES[level]&&STAGES[level].grad[0])||'#facc15';

ctx.save();
ctx.translate(p.x+21,p.y+21);
ctx.rotate(p.rot);

ctx.shadowColor=stageColor;
ctx.shadowBlur=18;

const g=ctx.createLinearGradient(-21,-21,21,21);
g.addColorStop(0,'#fde047');
g.addColorStop(1,'#f59e0b');
ctx.fillStyle=g;
roundRectPath(-21,-21,42,42,8);
ctx.fill();

ctx.shadowBlur=0;
ctx.strokeStyle=stageColor;
ctx.lineWidth=2;
roundRectPath(-21,-21,42,42,8);
ctx.stroke();

ctx.fillStyle="#111";
ctx.fillRect(-10,-7,6,6);
ctx.fillRect(5,-7,6,6);

ctx.restore();
}

function roundRectPath(x,y,w,h,r){
ctx.beginPath();
if(typeof ctx.roundRect==='function'){ctx.roundRect(x,y,w,h,r);return;}
ctx.moveTo(x+r,y);
ctx.arcTo(x+w,y,x+w,y+h,r);
ctx.arcTo(x+w,y+h,x,y+h,r);
ctx.arcTo(x,y+h,x,y,r);
ctx.arcTo(x,y,x+w,y,r);
ctx.closePath();
}

/* loop */
function loop(){

requestAnimationFrame(loop);
ctx.clearRect(0,0,W,H);

/* bg — Neon-Grid statt schlichter Balken, Farbe je nach Stufe */
const stageCol=(STAGES[level]&&STAGES[level].grad[0])||'#38bdf8';
const bgGrad=ctx.createLinearGradient(0,0,0,ground);
bgGrad.addColorStop(0,'#0b1030');
bgGrad.addColorStop(1,'#0f172a');
ctx.fillStyle=bgGrad;
ctx.fillRect(0,0,W,ground);

ctx.save();
ctx.strokeStyle=stageCol;
ctx.globalAlpha=0.12;
ctx.lineWidth=1;
for(let i=-1;i<14;i++){
const x=(i*90)-(frame%90);
ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,ground);ctx.stroke();
}
for(let y=40;y<ground;y+=46){
ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(W,y);ctx.stroke();
}
ctx.restore();

/* schwebende Glow-Blöcke im Hintergrund */
for(let i=0;i<8;i++){
ctx.fillStyle="rgba(255,255,255,.04)";
ctx.fillRect((i*170)-(frame%170*0.6),80,80,190);
}

/* ground */
ctx.fillStyle="#1e293b";
ctx.fillRect(0,ground,W,H-ground);

ctx.fillStyle="#334155";
for(let i=0;i<W;i+=40){
ctx.fillRect(i-(frame%40),ground,22,12);
}

ctx.save();
ctx.shadowColor=stageCol;
ctx.shadowBlur=12;
ctx.fillStyle=stageCol;
ctx.fillRect(0,ground,W,3);
ctx.restore();

/* progress bar */
ctx.fillStyle="rgba(255,255,255,.15)";
ctx.fillRect(20,20,320,16);

const pg=ctx.createLinearGradient(20,0,340,0);
pg.addColorStop(0,stageCol);
pg.addColorStop(1,(STAGES[level]&&STAGES[level].grad[1])||'#16a34a');
ctx.fillStyle=pg;
ctx.fillRect(20,20,progress*3.2,16);

if(run){

frame+=speed;
syncLiveState();

/* NORMAL GAME */
if(!goalMode){

progress+=progressAdd;
if(progress>=100){
progress=100;
goalMode=true;
obs=[];          /* alles frei */
goalX=W+150;     /* Ziel kommt von rechts */
}

percent.innerText=Math.floor(progress);

timer+=speed;
if(timer>=next){
spawn();
timer=0;
const cfg=STAGES[level];
next=rnd(cfg.next,cfg.next+130);
}
}

/* physics */
p.vy+=gravity;
p.y+=p.vy;

if(p.y>=338){
p.y=338;
p.vy=0;
p.jump=false;
p.rot=0;
}else{
p.rot+=0.11;
}

/* obstacles */
for(let i=obs.length-1;i>=0;i--){

let o=obs[i];
o.x-=speed;

ctx.save();
ctx.shadowColor="#f43f5e";
ctx.shadowBlur=14;
ctx.fillStyle="#ef4444";
ctx.beginPath();
ctx.moveTo(o.x,o.y+o.h);
ctx.lineTo(o.x+o.w/2,o.y);
ctx.lineTo(o.x+o.w,o.y+o.h);
ctx.closePath();
ctx.fill();
ctx.shadowBlur=0;
ctx.strokeStyle="#fecaca";
ctx.lineWidth=1.5;
ctx.stroke();
ctx.restore();

if(
p.x<o.x+o.w &&
p.x+p.w>o.x &&
p.y<o.y+o.h &&
p.y+p.h>o.y
){
over();
}

if(o.x+o.w<0) obs.splice(i,1);
}

/* FINAL ZIEL */
if(goalMode){

goalX-=speed; /* JETZT läuft Ziel zu dir */

ctx.save();
ctx.shadowColor="#22c55e";
ctx.shadowBlur=16;
ctx.fillStyle="#22c55e";
ctx.fillRect(goalX,240,18,140);

ctx.fillStyle="#fff";
ctx.fillRect(goalX+18,240,55,34);
ctx.shadowBlur=0;

ctx.fillStyle="#111";
ctx.font="bold 18px Arial";
ctx.fillText("ZIEL",goalX+24,262);
ctx.restore();

/* Sieg */
if(p.x+p.w>=goalX){
win();
}
}
}

drawPlayer();
}

loop();
</script>

<script>
(function(){
  const DB='https://mypanel-41c90-default-rtdb.europe-west1.firebasedatabase.app';
  let lastTs=0,t=null;
  function sound(){try{const ac=new(window.AudioContext||window.webkitAudioContext)();[[0,.08,880,.15],[.1,.08,1100,.1],[.2,.12,660,.12],[.35,.2,880,.08]].forEach(([st,dur,freq,vol])=>{const o=ac.createOscillator(),g=ac.createGain();o.frequency.value=freq;o.type='sine';g.gain.setValueAtTime(0,ac.currentTime+st);g.gain.linearRampToValueAtTime(vol,ac.currentTime+st+.02);g.gain.exponentialRampToValueAtTime(.001,ac.currentTime+st+dur);o.connect(g);g.connect(ac.destination);o.start(ac.currentTime+st);o.stop(ac.currentTime+st+dur);});setTimeout(()=>ac.close(),800);}catch(e){}}
  function show(txt){
    const b=document.getElementById('annBanner'),el=document.getElementById('annBannerText');
    if(!b||!el)return;
    el.textContent=txt;b.style.display='block';
    const inner=b.querySelector('.aInner');
    if(inner){inner.style.animation='none';void inner.offsetWidth;inner.style.animation='';}
    sound();clearTimeout(t);t=setTimeout(()=>b.style.display='none',10000);
  }
  function poll(){fetch(DB+'/announcement.json?t='+Date.now()).then(r=>r.json()).then(d=>{if(d&&d.text){const ts=d.timestamp||d.text;if(ts!==lastTs){lastTs=ts;show(d.text);}}}).catch(()=>{});}
  setTimeout(poll,1000);setInterval(poll,3000);
})();
</script>


<!-- XP MULTIPLIER -->
<script>
(function(){
  const orig=window.autoSaveScore;
  window.autoSaveScore=function(gameName,score){
    const mult=parseFloat(localStorage.getItem('mpXpMultiplier')||'1');
    const boosted=Math.floor(score*mult);
    if(mult>1){
      // Show notification
      const n=document.createElement('div');
      n.style.cssText='position:fixed;top:20px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,.85);border:1px solid #ffd23f;border-radius:6px;padding:10px 20px;font-family:Orbitron,sans-serif;font-size:13px;font-weight:900;color:#ffd23f;letter-spacing:2px;z-index:99999;pointer-events:none;';
      n.textContent='🎉 '+mult+'x XP! '+Math.floor(score)+' → '+boosted+' PUNKTE!';
      document.body.appendChild(n);
      setTimeout(()=>n.remove(),2500);
    }
    if(orig) orig(gameName,boosted);
    else {
      // Fallback: save directly to localStorage
      try{
        const pr=JSON.parse(localStorage.getItem('mpProfile')||'null');
        const pn=(pr?pr.username:'MYPANEL USER').toUpperCase();
        const all=JSON.parse(localStorage.getItem('highscores')||'[]');
        const prev=all.filter(x=>x.player===pn&&x.game===gameName).sort((a,b)=>b.score-a.score);
        const best=prev.length>0?Math.max(prev[0].score,boosted):boosted;
        const f=all.filter(x=>!(x.player===pn&&x.game===gameName));
        f.push({player:pn,game:gameName,score:best,date:new Date().toLocaleDateString('de-DE')});
        localStorage.setItem('highscores',JSON.stringify(f.sort((a,b)=>b.score-a.score).slice(0,50)));
      }catch(e){}
    }
  };
})();
</script>
</body>
</html>
