<style>
body{
margin:0;
background:radial-gradient(circle at 30% 20%,#1e1b4b,#020617 65%);
display:flex;
justify-content:center;
align-items:center;

button{

transform:none;
}
button.owned{
background:linear-gradient(135deg,#22c55e,#16a34a);
}

/* JOYSTICK (mobil, nur im WASD-Modus) */
#joystick{
position:fixed;
bottom:30px;
left:30px;
width:110px;
height:110px;
border-radius:50%;
background:rgba(255,255,255,.08);
border:2px solid rgba(255,255,255,.2);
z-index:50;
touch-action:none;
}
#joystickKnob{
position:absolute;
top:50%;left:50%;
width:46px;height:46px;
border-radius:50%;
background:rgba(99,102,241,.75);
box-shadow:0 0 14px rgba(99,102,241,.6);
transform:translate(-50%,-50%);
pointer-events:none;
}
#shootHint{
position:fixed;
bottom:44px;
right:34px;
font-size:12px;
opacity:.6;
z-index:50;
text-align:center;
}
</style>
</head>

<body>

<div id="hud">

💎 <span id="coins">0</span> |

<script>
const canvas=document.getElementById("game");
const ctx=canvas.getContext("2d");

let player, bullets, zombies, effects;
let keys={};
let hp=5;
let coins=+localStorage.getItem("zcoins")||0;
let upgrades=JSON.parse(localStorage.getItem("zup")||"{}");

let shooting=false;
let game;
let controlMode="wasd";

/* ===== ZUSCHAUER-MODUS ===== */
const _urlParams=new URLSearchParams(location.search);
const spectateName=_urlParams.get('spectate');
let isSpectator=false;
let specData=null;

function startSpectate(name){
  isSpectator=true;
  hideAll();
  canvas.classList.remove('hidden');

  const banner=document.createElement('div');
  banner.id='spectateBanner';
  banner.style.cssText='position:fixed;top:16px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,.75);border:1px solid #6366f1;padding:8px 22px;border-radius:20px;font-family:Segoe UI;font-size:12px;font-weight:900;letter-spacing:2px;color:#a5b4fc;z-index:9999;box-shadow:0 0 20px rgba(99,102,241,.35);';
  banner.textContent='👁️ ZUSCHAUER-MODUS · '+name.toUpperCase();
  document.body.appendChild(banner);

  if(!rdb){banner.textContent='⚠ FIREBASE NICHT VERBUNDEN';banner.style.borderColor='#ff2b6d';banner.style.color='#ff2b6d';return;}

  try{
    const key=getMyName().replace(/[.#$\/\[\]]/g,'_');
    const specRef=rdb.ref('liveGames/'+name+'/spectators/'+key);
    specRef.set(true);
    specRef.onDisconnect().remove();
  }catch(e){}

  const ref=rdb.ref('liveGames/'+name);
  ref.on('value',snap=>{
    if(!snap.exists()){
      banner.textContent='⏹ KEIN LIVE-SPIEL GEFUNDEN';
      banner.style.borderColor='#ff2b6d';banner.style.color='#ff2b6d';
      return;
    }
    specData=snap.val();
    document.getElementById("waveText").innerText=Math.floor(specData.survTime||0);
    document.getElementById("coins").innerText=specData.coins||0;
    const specHp=specData.hp!=null?specData.hp:5;
    const hpEl=document.getElementById('hpLine');
    if(hpEl)hpEl.innerText='❤️'.repeat(Math.max(specHp,0));
  });

  clearInterval(game);
  game=setInterval(drawSpectatorFrame,16);
}
if(spectateName)startSpectate(spectateName);

function drawSpectatorFrame(){
  if(!specData)return;
  ctx.fillStyle="#020617";
  ctx.fillRect(0,0,500,600);
  ctx.save();
  ctx.strokeStyle="rgba(99,102,241,.06)";
  for(let gx=0;gx<=500;gx+=50){ctx.beginPath();ctx.moveTo(gx,0);ctx.lineTo(gx,600);ctx.stroke();}
  for(let gy=0;gy<=600;gy+=50){ctx.beginPath();ctx.moveTo(0,gy);ctx.lineTo(500,gy);ctx.stroke();}
  ctx.restore();

  const p=specData.player||{x:250,y:300};
  ctx.save();
  ctx.shadowColor="#818cf8";ctx.shadowBlur=16;
  const pg=ctx.createRadialGradient(p.x-4,p.y-4,2,p.x,p.y,15);
  pg.addColorStop(0,"#a5b4fc");pg.addColorStop(1,"#6366f1");
  ctx.fillStyle=pg;
  ctx.beginPath();ctx.arc(p.x,p.y,15,0,Math.PI*2);ctx.fill();
  ctx.restore();

  ctx.save();
  ctx.shadowColor="#facc15";ctx.shadowBlur=6;
  ctx.fillStyle="#facc15";
  (specData.bullets||[]).forEach(b=>ctx.fillRect(b.x,b.y,5,5));
  ctx.restore();

  (specData.zombies||[]).forEach(z=>{
    ctx.save();
    ctx.shadowColor="#22c55e";ctx.shadowBlur=10;
    const zg=ctx.createRadialGradient(z.x-4,z.y-4,2,z.x,z.y,z.size||15);
    zg.addColorStop(0,"#4ade80");zg.addColorStop(1,"#15803d");
    ctx.fillStyle=zg;
    ctx.beginPath();ctx.arc(z.x,z.y,z.size||15,0,Math.PI*2);ctx.fill();
    ctx.restore();
  });
}

/* Eigenen Live-Zustand periodisch senden, damit Freunde zuschauen können */
let lastLiveSync=0;
function syncLiveState(){
  if(isSpectator||!rdb||!player)return;
  const now=Date.now();
  if(now-lastLiveSync<120)return;
  lastLiveSync=now;
  try{
    rdb.ref('liveGames/'+getMyName()).set({
      player:{x:Math.round(player.x),y:Math.round(player.y)},
      bullets:bullets.map(b=>({x:Math.round(b.x),y:Math.round(b.y)})),
      zombies:zombies.map(z=>({x:Math.round(z.x),y:Math.round(z.y),size:z.size})),
      hp,coins,survTime,ts:now
    });
  }catch(e){}
}
function clearLiveState(){
  if(isSpectator||!rdb)return;
  try{rdb.ref('liveGames/'+getMyName()).remove();}catch(e){}
}
window.addEventListener('beforeunload',clearLiveState);
let survTime=0; // Sekunden überlebt — treibt die Schwierigkeitskurve
let fireCooldown=0;

let mouse={x:250,y:300};
let joyVec={x:0,y:0}; // Bewegungsvektor vom virtuellen Joystick

/* ===== SOUND ===== */
let actx=null;
function sfx(freq,dur,type,vol){
  try{
    if(!actx)actx=new(window.AudioContext||window.webkitAudioContext)();
    const o=actx.createOscillator(),g=actx.createGain();
    o.type=type||'square';o.frequency.value=freq;
    g.gain.setValueAtTime(0,actx.currentTime);
    g.gain.linearRampToValueAtTime(vol||0.1,actx.currentTime+0.01);
    g.gain.exponentialRampToValueAtTime(0.001,actx.currentTime+dur);
    o.connect(g);g.connect(actx.destination);
    o.start();o.stop(actx.currentTime+dur);
  }catch(e){}
}
function sndShoot(){sfx(760,0.05,'square',0.05);}
function sndHit(){sfx(220,0.06,'square',0.07);}
function sndKill(){sfx(140,0.12,'sawtooth',0.1);}
function sndHurt(){sfx(120,0.22,'sawtooth',0.14);}
function sndBuy(){[0,0.08].forEach((t,i)=>setTimeout(()=>sfx(600+i*260,0.1,'triangle',0.11),t*1000));}
function sndDenied(){sfx(150,0.15,'sawtooth',0.09);}
function sndGameOver(){[0,0.15,0.3].forEach((t,i)=>setTimeout(()=>sfx(300-i*80,0.25,'sawtooth',0.12),t*1000));}

/* SAVE FUNCTION */
function saveCoins(){
localStorage.setItem("zcoins",coins);
}

/* INPUT — Tastatur */
document.addEventListener("keydown",(e)=>keys[e.key.toLowerCase()]=true);
document.addEventListener("keyup",(e)=>keys[e.key.toLowerCase()]=false);

/* INPUT — Maus */
canvas.addEventListener("mousemove",(e)=>{
let r=canvas.getBoundingClientRect();
let scale=canvas.width/r.width;
let mx=(e.clientX-r.left)*scale;
let my=(e.clientY-r.top)*scale;

mouse.x=mx;
mouse.y=my;

if(controlMode==="mouse"){
player.x=mx;
player.y=my;
}
});

canvas.addEventListener("mousedown",()=>shooting=true);
canvas.addEventListener("mouseup",()=>shooting=false);

/* INPUT — Touch auf dem Canvas (Zielen + Schießen, im Maus-Modus auch Bewegen) */
function touchPosOnCanvas(t){
const r=canvas.getBoundingClientRect();
const scale=canvas.width/r.width;
return{x:(t.clientX-r.left)*scale,y:(t.clientY-r.top)*scale};
}
canvas.addEventListener("touchstart",(e)=>{
e.preventDefault();
const p=touchPosOnCanvas(e.touches[0]);
mouse.x=p.x;mouse.y=p.y;
if(controlMode==="mouse"){player.x=p.x;player.y=p.y;}
shooting=true;
},{passive:false});
canvas.addEventListener("touchmove",(e)=>{
e.preventDefault();
const p=touchPosOnCanvas(e.touches[0]);
mouse.x=p.x;mouse.y=p.y;
if(controlMode==="mouse"){player.x=p.x;player.y=p.y;}
},{passive:false});
canvas.addEventListener("touchend",(e)=>{
e.preventDefault();
shooting=false;
},{passive:false});

/* INPUT — virtueller Joystick (nur WASD-Modus, mobile Bewegung) */
const joyEl=document.getElementById('joystick');
const knobEl=document.getElementById('joystickKnob');
let joyActive=false,joyId=null;
function joyReset(){joyVec.x=0;joyVec.y=0;knobEl.style.transform='translate(-50%,-50%)';}
function joyHandle(t){
const r=joyEl.getBoundingClientRect();
const cx=r.left+r.width/2,cy=r.top+r.height/2;
let dx=t.clientX-cx,dy=t.clientY-cy;
const max=r.width/2;
const dist=Math.min(Math.sqrt(dx*dx+dy*dy),max);
const ang=Math.atan2(dy,dx);
dx=Math.cos(ang)*dist;dy=Math.sin(ang)*dist;
joyVec.x=dx/max;joyVec.y=dy/max;
knobEl.style.transform=`translate(${dx-23}px,${dy-23}px)`;
}
joyEl.addEventListener("touchstart",(e)=>{
e.preventDefault();
joyActive=true;joyId=e.changedTouches[0].identifier;
joyHandle(e.changedTouches[0]);
},{passive:false});
joyEl.addEventListener("touchmove",(e)=>{
e.preventDefault();
for(const t of e.changedTouches){if(t.identifier===joyId)joyHandle(t);}
},{passive:false});
joyEl.addEventListener("touchend",(e)=>{
e.preventDefault();
joyActive=false;joyReset();
},{passive:false});

/* Touch-Gerät erkennen, um Joystick/Hinweis nur dort zu zeigen */
const isTouchDevice=('ontouchstart' in window)||navigator.maxTouchPoints>0;

/* MENU */
function chooseMode(){
show("modeSelect");
}

function updateHpHud(){
document.getElementById("hpLine").innerText='❤️'.repeat(Math.max(hp,0));
}

function startGame(mode){

controlMode=mode;

document.getElementById("modeText").innerText =
mode==="mouse" ? "Maus/Touch" : "WASD";

player={x:250,y:300,speed:3};
bullets=[];
zombies=[];
effects=[];
hp=5+(upgrades.hp||0);
survTime=0;
fireCooldown=0;
joyReset();

updateHpHud();
document.getElementById("coins").innerText=coins;
document.getElementById("waveText").innerText="0";

/* Joystick nur im WASD-Modus auf Touch-Geräten anzeigen */
if(mode==="wasd" && isTouchDevice){
joyEl.classList.remove("hidden");
document.getElementById("shootHint").classList.remove("hidden");
}else{
joyEl.classList.add("hidden");
document.getElementById("shootHint").classList.add("hidden");
}

hideAll();

clearInterval(game);
game=setInterval(update,16);
}

/* SHOOT — wird jetzt in update() mit dynamischem Cooldown ausgeführt (siehe fireBullets) */
function fireBullets(){
let dx=mouse.x-player.x;
let dy=mouse.y-player.y;

let dist=Math.sqrt(dx*dx+dy*dy);

if(dist===0){
dx=0;
dy=-1;
}else{
dx/=dist;
dy/=dist;
}

/* BUG-FIX: "multi" bestimmt die Anzahl, "spread" bestimmt jetzt den Fächer-Winkel — beide Upgrades tun jetzt wirklich etwas */
let shots = upgrades.multi ? 5 : (upgrades.spread ? 3 : 1);
let spreadStep = upgrades.spread ? 0.35 : 0.2;

for(let i=0;i<shots;i++){
let spread=(i-(shots-1)/2)*spreadStep;

bullets.push({
x:player.x,
y:player.y,
dx:dx+spread,
dy:dy+spread
});
}

sndShoot();
}

/* UPDATE */
function update(){

syncLiveState();

survTime+=16/1000;
document.getElementById("waveText").innerText=Math.floor(survTime);

/* Hintergrund mit leichtem Vignette statt reinem Clear */
ctx.fillStyle="#020617";
ctx.fillRect(0,0,500,600);
ctx.save();
ctx.strokeStyle="rgba(99,102,241,.06)";
for(let gx=0;gx<=500;gx+=50){ctx.beginPath();ctx.moveTo(gx,0);ctx.lineTo(gx,600);ctx.stroke();}
for(let gy=0;gy<=600;gy+=50){ctx.beginPath();ctx.moveTo(0,gy);ctx.lineTo(500,gy);ctx.stroke();}
ctx.restore();

/* MOVE — Tastatur + virtueller Joystick kombiniert */
if(controlMode==="wasd"){
let mx=0,my=0;
if(keys["w"]) my-=1;
if(keys["s"]) my+=1;
if(keys["a"]) mx-=1;
if(keys["d"]) mx+=1;
if(joyVec.x||joyVec.y){mx+=joyVec.x;my+=joyVec.y;}
const len=Math.sqrt(mx*mx+my*my);
if(len>0){
player.x+=(mx/len)*player.speed;
player.y+=(my/len)*player.speed;
}
}
player.x=Math.max(15,Math.min(485,player.x));
player.y=Math.max(15,Math.min(585,player.y));

/* FEUERRATE — Cooldown statt fester setInterval, "Fire Rate"-Upgrade wirkt jetzt wirklich */
fireCooldown-=16;
if(shooting && fireCooldown<=0){
fireBullets();
fireCooldown = upgrades.firerate ? 70 : 120;
}

/* PLAYER — Glow-Kreis */
ctx.save();
ctx.shadowColor="#818cf8";
ctx.shadowBlur=16;
const pg=ctx.createRadialGradient(player.x-4,player.y-4,2,player.x,player.y,15);
pg.addColorStop(0,"#a5b4fc");
pg.addColorStop(1,"#6366f1");
ctx.fillStyle=pg;
ctx.beginPath();
ctx.arc(player.x,player.y,15,0,Math.PI*2);
ctx.fill();
ctx.restore();

/* BULLETS */
ctx.save();
ctx.shadowColor="#facc15";
ctx.shadowBlur=6;
ctx.fillStyle="#facc15";
bullets.forEach((b,i)=>{
b.x+=b.dx*8;
b.y+=b.dy*8;

ctx.fillRect(b.x,b.y,5,5);

if(b.x<0||b.x>500||b.y<0||b.y>600){
bullets.splice(i,1);
}
});
ctx.restore();

/* SPAWN — Rate steigt mit der Überlebenszeit (Schwierigkeitskurve) */
const spawnChance=Math.min(0.04+survTime*0.0015,0.12);
if(Math.random()<spawnChance){
const tier=Math.floor(survTime/20); // alle 20s wird ein Tick härter
zombies.push({
x:Math.random()*500,
y:0,
hp:2+Math.floor(tier*0.6),
speed:1.5+Math.min(tier*0.12,1.8),
size:15
});
}

/* ZOMBIES */
zombies.forEach((z,i)=>{

let dx=player.x-z.x;
let dy=player.y-z.y;
let dist=Math.sqrt(dx*dx+dy*dy)||1;

z.x+=dx/dist*z.speed;
z.y+=dy/dist*z.speed;

ctx.save();
ctx.shadowColor="#22c55e";
ctx.shadowBlur=10;
const zg=ctx.createRadialGradient(z.x-4,z.y-4,2,z.x,z.y,z.size);
zg.addColorStop(0,"#4ade80");
zg.addColorStop(1,"#15803d");
ctx.fillStyle=zg;
ctx.beginPath();
ctx.arc(z.x,z.y,z.size,0,Math.PI*2);
ctx.fill();
ctx.restore();

/* HIT */
bullets.forEach((b,bi)=>{
if(Math.abs(b.x-z.x)<z.size && Math.abs(b.y-z.y)<z.size){

bullets.splice(bi,1);

let dmg = upgrades.damage ? 2 : 1;
z.hp -= dmg;
sndHit();

effects.push({x:z.x,y:z.y,size:5});

if(z.hp<=0){
zombies.splice(i,1);
coins++;
sndKill();
document.getElementById("coins").innerText=coins;

/* SAVE HERE */
saveCoins();
}
}
});

/* PLAYER HIT */
if(dist<z.size+10){
hp--;
sndHurt();
updateHpHud();
zombies.splice(i,1);

if(hp<=0){
gameOver();
}
}
});

/* EFFECTS */
ctx.save();
ctx.shadowColor="#fb923c";
ctx.shadowBlur=8;
effects.forEach((e,i)=>{
ctx.globalAlpha=Math.max(0,1-e.size/20);
ctx.fillStyle="orange";
ctx.beginPath();
ctx.arc(e.x,e.y,e.size,0,Math.PI*2);
ctx.fill();

e.size+=2;
if(e.size>20) effects.splice(i,1);
});
ctx.restore();
}

/* GAME OVER */
function gameOver(){
clearInterval(game);
clearLiveState();
saveCoins();
localStorage.setItem("zup",JSON.stringify(upgrades));
sndGameOver();

document.getElementById("finalStats").innerText=
`${Math.floor(survTime)}s überlebt · ${coins} 💎 Münzen`;

show("gameOver");

// An MyPanel-Highscoresystem übergeben (nutzt automatisch den XP-Multiplikator + Notification)
try{
  if(typeof window.autoSaveScore==='function'){
    window.autoSaveScore('Zombie Survival',coins);
  }
}catch(e){}
}

/* SHOP */
function openShop(){
show("shop");
updateShopUI();
}
function backMenu(){show("menu");}

const SHOP_ITEMS={
spread:{price:1200,btn:'buySpread',label:'Spread-Schuss'},
damage:{price:1800,btn:'buyDamage',label:'Damage x2'},
firerate:{price:1500,btn:'buyFirerate',label:'Fire Rate ⬆'},
multi:{price:2500,btn:'buyMulti',label:'Multishot'}
};

function buy(type){

/* HP ist stapelbar — beliebig oft kaufbar */
if(type==="hp"){
if(coins>=2000){
coins-=2000;
upgrades.hp=(upgrades.hp||0)+1;
sndBuy();
}else{
sndDenied();
}
document.getElementById("coins").innerText=coins;
saveCoins();
localStorage.setItem("zup",JSON.stringify(upgrades));
updateShopUI();
return;
}

/* BUG-FIX: einmalige Upgrades lassen sich nicht mehr doppelt kaufen */
const item=SHOP_ITEMS[type];
if(!item) return;

if(upgrades[type]){
sndDenied(); // schon gekauft — kein erneuter Abzug
return;
}

if(coins>=item.price){
coins-=item.price;
upgrades[type]=true;
sndBuy();
}else{
sndDenied();
}

document.getElementById("coins").innerText=coins;

/* SAVE AFTER BUY */
saveCoins();

localStorage.setItem("zup",JSON.stringify(upgrades));
updateShopUI();
}

/* Shop-Buttons als "gekauft" markieren + Preis-Anzeige aktuell halten */
function updateShopUI(){
document.getElementById("shopCoins").innerText=coins;

Object.entries(SHOP_ITEMS).forEach(([key,item])=>{
const btn=document.getElementById(item.btn);
if(!btn)return;
if(upgrades[key]){
btn.innerText='✅ '+item.label+' (gekauft)';
btn.classList.add('owned');
btn.disabled=true;
}else{
btn.innerText=item.label+' ('+item.price+')';
btn.classList.remove('owned');
btn.disabled=false;
}
});

const hpBtn=document.getElementById('buyHp');
if(hpBtn)hpBtn.innerText='+1 Leben (2000) · Stufe '+(upgrades.hp||0);
}

/* UI */
function show(id){
hideAll();
document.getElementById(id).classList.remove("hidden");
}

function hideAll(){
document.getElementById("menu").classList.add("hidden");
document.getElementById("modeSelect").classList.add("hidden");
document.getElementById("shop").classList.add("hidden");
document.getElementById("gameOver").classList.add("hidden");
}
</script>

<div id="annBanner">

    <div class="ann-c tl"></div><div class="ann-c tr"></div><div class="ann-c bl"></div><div class="ann-c br"></div>
    <div style="font-family:'Orbitron',sans-serif;font-size:9px;color:rgba(0,229,255,.7);letter-spacing:4px;margin-bottom:5px;">// GLOBAL ANNOUNCEMENT</div>
    <div style="font-family:'Orbitron',sans-serif;font-size:clamp(14px,2.5vw,26px);font-weight:900;color:#fff;text-shadow:0 0 30px rgba(0,229,255,.9);letter-spacing:2px;">📢 <span id="annBannerText"></span></div>
  </div>
</div>
<script>
(function(){
  const DB='https://mypanel-41c90-default-rtdb.europe-west1.firebasedatabase.app';
  let lastTs=0,t=null;
  function sound(){try{const ac=new(window.AudioContext||window.webkitAudioContext)();[[0,.08,880,.15],[.1,.08,1100,.1],[.2,.12,660,.12],[.35,.2,880,.08]].forEach(([st,dur,freq,vol])=>{const o=ac.createOscillator(),g=ac.createGain();o.frequency.value=freq;o.type='sine';g.gain.setValueAtTime(0,ac.currentTime+st);g.gain.linearRampToValueAtTime(vol,ac.currentTime+st+.02);g.gain.exponentialRampToValueAtTime(.001,ac.currentTime+st+dur);o.connect(g);g.connect(ac.destination);o.start(ac.currentTime+st);o.stop(ac.currentTime+st+dur);});setTimeout(()=>ac.close(),800);}catch(e){}}
  function show(txt){
    const b=document.getElementById('annBanner'),el=document.getElementById('annBannerText');
    if(!b||!el)return;
    el.textContent=txt;b.style.display='block';
    const inner=b.querySelector('.aInner');
    if(inner){inner.style.animation='none';void inner.offsetWidth;inner.style.animation='';}
    sound();clearTimeout(t);t=setTimeout(()=>b.style.display='none',10000);
  }
  function poll(){fetch(DB+'/announcement.json?t='+Date.now()).then(r=>r.json()).then(d=>{if(d&&d.text){const ts=d.timestamp||d.text;if(ts!==lastTs){lastTs=ts;show(d.text);}}}).catch(()=>{});}
  setTimeout(poll,1000);setInterval(poll,3000);
})();
</script>


<!-- XP MULTIPLIER -->
<script>
(function(){
  const orig=window.autoSaveScore;
  window.autoSaveScore=function(gameName,score){
    const mult=parseFloat(localStorage.getItem('mpXpMultiplier')||'1');
    const boosted=Math.floor(score*mult);
    if(mult>1){
      // Show notification
      const n=document.createElement('div');
      n.style.cssText='position:fixed;top:20px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,.85);border:1px solid #ffd23f;border-radius:6px;padding:10px 20px;font-family:Orbitron,sans-serif;font-size:13px;font-weight:900;color:#ffd23f;letter-spacing:2px;z-index:99999;pointer-events:none;';
      n.textContent='🎉 '+mult+'x XP! '+Math.floor(score)+' → '+boosted+' PUNKTE!';
      document.body.appendChild(n);
      setTimeout(()=>n.remove(),2500);
    }
    if(orig) orig(gameName,boosted);
    else {
      // Fallback: save directly to localStorage
      try{
        const pr=JSON.parse(localStorage.getItem('mpProfile')||'null');
        const pn=(pr?pr.username:'MYPANEL USER').toUpperCase();
        const all=JSON.parse(localStorage.getItem('highscores')||'[]');
        const prev=all.filter(x=>x.player===pn&&x.game===gameName).sort((a,b)=>b.score-a.score);
        const best=prev.length>0?Math.max(prev[0].score,boosted):boosted;
        const f=all.filter(x=>!(x.player===pn&&x.game===gameName));
        f.push({player:pn,game:gameName,score:best,date:new Date().toLocaleDateString('de-DE')});
        localStorage.setItem('highscores',JSON.stringify(f.sort((a,b)=>b.score-a.score).slice(0,50)));
      }catch(e){}
    }
  };
})();
</script>
