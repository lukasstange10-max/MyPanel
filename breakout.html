<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>Breakout</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Segoe UI;
}

body{
height:100vh;
background:radial-gradient(circle at top,#0f172a,#020617);
color:white;
overflow:hidden;
}

/* SCREENS */
.screen{
position:absolute;
width:100%;
height:100%;
display:none;
justify-content:center;
align-items:center;
}

.active{display:flex;}

/* ===== MENU ===== */
.menu{
flex-direction:column;
text-align:center;
}

/* TITLE */
.title{
font-size:70px;
font-weight:900;
margin-bottom:20px;
background:linear-gradient(90deg,#6366f1,#22c55e);
-webkit-background-clip:text;
color:transparent;
}

/* CARD */
.panel{
background:rgba(255,255,255,0.05);
backdrop-filter:blur(20px);
padding:40px;
border-radius:25px;
box-shadow:0 0 40px rgba(99,102,241,0.3);
}

/* HIGHSCORE */
.high{
font-size:22px;
margin-bottom:20px;
opacity:0.8;
}

/* BUTTON */
.btn{
padding:18px 40px;
border:none;
border-radius:16px;
background:linear-gradient(135deg,#6366f1,#4f46e5);
color:white;
font-size:18px;
font-weight:900;
cursor:pointer;
transition:0.2s;
}

.btn:hover{
transform:scale(1.08);
box-shadow:0 0 20px #6366f1;
}

/* ===== GAME ===== */
.game{
flex-direction:column;
}

/* TOP BAR */
.top{
font-size:20px;
margin-bottom:10px;
}

/* CANVAS */
canvas{
background:#020617;
border-radius:16px;
box-shadow:0 0 30px #6366f1;
max-width:92vw;
max-height:70vh;
touch-action:none;
}

.top{display:flex;gap:28px;align-items:center;justify-content:center;flex-wrap:wrap;}
.lives{letter-spacing:4px;color:#ff4d6d;}

/* OVERLAY */
.overlay{
position:absolute;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.85);
display:none;
justify-content:center;
align-items:center;
flex-direction:column;
}

.overlay h2{
font-size:50px;
margin-bottom:20px;
}
</style>
</head>

<body>

<!-- MENU -->
<div class="screen active menu" id="menu">

<script>
const canvas=document.getElementById("canvas");
const ctx=canvas.getContext("2d");

const scoreEl=document.getElementById("score");
const highEl=document.getElementById("high");
const levelEl=document.getElementById("level");
const livesEl=document.getElementById("lives");

let paddle,balls,bricks,powerups;
let score=0,level=1,lives=3;
let high=localStorage.getItem("breakoutHigh")||0;
let running=false;

highEl.innerText=high;

/* ===== ZUSCHAUER-MODUS ===== */
const _urlParams=new URLSearchParams(location.search);
const spectateName=_urlParams.get('spectate');
let isSpectator=false;

function startSpectate(name){
  isSpectator=true;
  show("gameScreen");

  const banner=document.createElement('div');
  banner.id='spectateBanner';
  banner.style.cssText='position:fixed;top:16px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,.75);border:1px solid #6366f1;padding:8px 22px;border-radius:20px;font-family:Segoe UI;font-size:12px;font-weight:900;letter-spacing:2px;color:#a5b4fc;z-index:9999;box-shadow:0 0 20px rgba(99,102,241,.35);';
  banner.textContent='👁️ ZUSCHAUER-MODUS · '+name.toUpperCase();
  document.body.appendChild(banner);

  if(!rdb){banner.textContent='⚠ FIREBASE NICHT VERBUNDEN';banner.style.borderColor='#ff2b6d';banner.style.color='#ff2b6d';return;}

  try{
    const key=getMyName().replace(/[.#$\/\[\]]/g,'_');
    const specRef=rdb.ref('liveGames/'+name+'/spectators/'+key);
    specRef.set(true);
    specRef.onDisconnect().remove();
  }catch(e){}

  paddle={x:250,y:360,w:100,h:10};
  balls=[];bricks=[];powerups=[];

  const ref=rdb.ref('liveGames/'+name);
  ref.on('value',snap=>{
    if(!snap.exists()){
      banner.textContent='⏹ KEIN LIVE-SPIEL GEFUNDEN';
      banner.style.borderColor='#ff2b6d';banner.style.color='#ff2b6d';
      return;
    }
    const d=snap.val();
    paddle.x=d.paddleX;
    balls=d.balls||[];
    bricks=d.bricks||[];
    powerups=d.powerups||[];
    score=d.score||0;level=d.level||1;lives=d.lives!=null?d.lives:3;
    scoreEl.innerText=score;levelEl.innerText=level;
    livesEl.innerText='❤'.repeat(Math.max(lives,0))+'🖤'.repeat(3-Math.max(lives,0));
    drawSpectatorFrame();
  });
}
if(spectateName)startSpectate(spectateName);

function drawSpectatorFrame(){
  ctx.clearRect(0,0,canvas.width,canvas.height);
  ctx.fillStyle="#6366f1";
  ctx.fillRect(paddle.x,paddle.y,paddle.w,paddle.h);
  balls.forEach(ball=>{
    ctx.beginPath();ctx.arc(ball.x,ball.y,ball.r||8,0,Math.PI*2);
    ctx.fillStyle="#facc15";ctx.fill();
  });
  bricks.forEach(b=>{
    if(!b||b.hit)return;
    ctx.fillStyle=b.color||"#22c55e";
    ctx.fillRect(b.x,b.y,b.w,b.h);
  });
  powerups.forEach(p=>drawPowerup(p));
}

/* Eigenen Live-Zustand periodisch senden, damit Freunde zuschauen können */
let lastLiveSync=0;
function syncLiveState(){
  if(isSpectator||!rdb)return;
  const now=Date.now();
  if(now-lastLiveSync<120)return;
  lastLiveSync=now;
  try{
    rdb.ref('liveGames/'+getMyName()).set({
      paddleX:Math.round(paddle.x),
      balls:balls.map(b=>({x:Math.round(b.x),y:Math.round(b.y),r:b.r})),
      bricks:bricks.filter(b=>b&&!b.hit).map(b=>({x:b.x,y:b.y,w:b.w,h:b.h,color:b.color})),
      powerups:powerups.map(p=>({x:Math.round(p.x),y:Math.round(p.y),w:p.w,h:p.h})),
      score,level,lives,ts:now
    });
  }catch(e){}
}
function clearLiveState(){
  if(isSpectator||!rdb)return;
  try{rdb.ref('liveGames/'+getMyName()).remove();}catch(e){}
}
window.addEventListener('beforeunload',clearLiveState);

/* ===== SOUND ===== */
let actx=null;
function sfx(freq,dur,type,vol){
  try{
    if(!actx)actx=new(window.AudioContext||window.webkitAudioContext)();
    const o=actx.createOscillator(),g=actx.createGain();
    o.type=type||'square';o.frequency.value=freq;
    g.gain.setValueAtTime(0,actx.currentTime);
    g.gain.linearRampToValueAtTime(vol||0.12,actx.currentTime+0.01);
    g.gain.exponentialRampToValueAtTime(0.001,actx.currentTime+dur);
    o.connect(g);g.connect(actx.destination);
    o.start();o.stop(actx.currentTime+dur);
  }catch(e){}
}
function sndBrick(row){sfx(420+row*70,0.1,'square',0.1);}
function sndPaddle(){sfx(220,0.08,'triangle',0.12);}
function sndWall(){sfx(160,0.05,'sine',0.06);}
function sndLifeLost(){sfx(140,0.35,'sawtooth',0.15);}
function sndLevelUp(){[0,0.12,0.24].forEach((t,i)=>setTimeout(()=>sfx(500+i*180,0.15,'triangle',0.13),t*1000));}
function sndGameOver(){[0,0.15,0.3].forEach((t,i)=>setTimeout(()=>sfx(300-i*80,0.25,'sawtooth',0.12),t*1000));}
function sndMulti(){[0,0.08,0.16,0.24].forEach((t,i)=>setTimeout(()=>sfx(600+i*140,0.12,'triangle',0.13),t*1000));}

/* MULTIBALL — klont jeden aktuellen Ball (bis max. 5 gleichzeitig) */
const MAX_BALLS=5;
function triggerMultiball(){
  const snapshot=balls.slice();
  for(const b of snapshot){
    if(balls.length>=MAX_BALLS)break;
    const nd=-b.dx*(0.85+Math.random()*0.35)||(Math.random()<0.5?-1:1)*ballSpeed();
    balls.push({x:b.x,y:b.y,r:b.r,dx:nd,dy:b.dy});
  }
  sndMulti();
}

/* SCREEN */
function show(id){
document.querySelectorAll(".screen").forEach(s=>s.classList.remove("active"));
document.getElementById(id).classList.add("active");
}

/* MENU */
function goMenu(){
running=false;
show("menu");
}

/* START */
function startGame(){
running=false; // stop any existing loop first
document.getElementById("overlay").style.display="none";
document.getElementById("levelOverlay").style.display="none";
show("gameScreen");
score=0;level=1;lives=3;
scoreEl.innerText=0;levelEl.innerText=1;livesEl.innerText='❤❤❤';
initLevel();
running=true;
requestAnimationFrame(loop);
}

/* speed scales gently with level, capped so it never gets unfair */
function ballSpeed(){return Math.min(4+ (level-1)*0.6,9);}

/* INIT LEVEL (Schläger + Ball + Steine neu, Score/Leben bleiben) */
function initLevel(){
paddle={x:250,y:360,w:100,h:10};
const s=ballSpeed();
balls=[{x:300,y:200,dx:(Math.random()<0.5?-1:1)*s,dy:-s,r:8}];
powerups=[];

const rows=Math.min(4+level,8); // ab Level 2 kommen mehr Reihen dazu (bis max 8)
bricks=[];
const rowColors=['#ef4444','#f97316','#facc15','#22c55e','#3b82f6','#8b5cf6','#ec4899','#14b8a6'];
for(let r=0;r<rows;r++){
for(let c=0;c<10;c++){
bricks.push({
x:20+c*56,
y:30+r*22,
w:50,
h:15,
hit:false,
color:rowColors[r%rowColors.length]
});
}
}
}

/* NEXT LEVEL */
function nextLevel(){
level++;
levelEl.innerText=level;
document.getElementById("levelOverlay").style.display="none";
initLevel();
running=true;
requestAnimationFrame(loop);
}

/* CONTROL — Maus */
document.addEventListener("mousemove",(e)=>{
if(!running||!paddle) return;
let rect=canvas.getBoundingClientRect();
const scale=canvas.width/rect.width;
paddle.x=(e.clientX-rect.left)*scale-paddle.w/2;
clampPaddle();
});

/* CONTROL — Touch (mobil) */
canvas.addEventListener("touchmove",(e)=>{
if(!running||!paddle) return;
e.preventDefault();
const rect=canvas.getBoundingClientRect();
const scale=canvas.width/rect.width;
const t=e.touches[0];
paddle.x=(t.clientX-rect.left)*scale-paddle.w/2;
clampPaddle();
},{passive:false});
canvas.addEventListener("touchstart",(e)=>{
if(!running||!paddle)return;
e.preventDefault();
const rect=canvas.getBoundingClientRect();
const scale=canvas.width/rect.width;
const t=e.touches[0];
paddle.x=(t.clientX-rect.left)*scale-paddle.w/2;
clampPaddle();
},{passive:false});

function clampPaddle(){
if(!paddle)return;
paddle.x=Math.max(0,Math.min(canvas.width-paddle.w,paddle.x));
}

/* POWERUP zeichnen */
function drawPowerup(p){
ctx.save();
const g=ctx.createLinearGradient(p.x,p.y,p.x,p.y+p.h);
g.addColorStop(0,'#22d3ee');g.addColorStop(1,'#6366f1');
ctx.fillStyle=g;
ctx.beginPath();
if(typeof ctx.roundRect==='function')ctx.roundRect(p.x,p.y,p.w,p.h,6);
else ctx.rect(p.x,p.y,p.w,p.h);
ctx.fill();
ctx.fillStyle='#fff';
ctx.font='bold 12px Segoe UI';
ctx.textAlign='center';ctx.textBaseline='middle';
ctx.fillText('×2',p.x+p.w/2,p.y+p.h/2+1);
ctx.restore();
}

/* LOOP */
function loop(){
if(!running) return;

syncLiveState();

ctx.clearRect(0,0,canvas.width,canvas.height);

/* PADDLE */
ctx.fillStyle="#6366f1";
ctx.fillRect(paddle.x,paddle.y,paddle.w,paddle.h);

/* BÄLLE */
balls.forEach(ball=>{
ctx.beginPath();
ctx.arc(ball.x,ball.y,ball.r,0,Math.PI*2);
ctx.fillStyle="#facc15";
ctx.fill();
});

/* BRICKS */
let bricksLeft=0;
bricks.forEach(b=>{
if(!b||b.hit) return;
bricksLeft++;
ctx.fillStyle=b.color||"#22c55e";
ctx.fillRect(b.x,b.y,b.w,b.h);
});

/* POWERUPS zeichnen + bewegen */
powerups.forEach(p=>p.y+=p.dy);
powerups.forEach(drawPowerup);

/* BRICK COLLISION — pro Ball, seiten-genaue Reflektion, Chance auf Powerup-Drop */
for(const ball of balls){
for(const b of bricks){
if(!b||b.hit) continue;
if(ball.x+ball.r>b.x && ball.x-ball.r<b.x+b.w &&
   ball.y+ball.r>b.y && ball.y-ball.r<b.y+b.h){
  b.hit=true;
  const overlapX=Math.min(ball.x+ball.r-b.x, b.x+b.w-(ball.x-ball.r));
  const overlapY=Math.min(ball.y+ball.r-b.y, b.y+b.h-(ball.y-ball.r));
  if(overlapX<overlapY) ball.dx*=-1; else ball.dy*=-1;
  const row=Math.round((b.y-30)/22);
  sndBrick(row);
  score+=10*level;
  scoreEl.innerText=score;
  // ~16% Chance auf eine fallende Multiball-Kapsel (nur wenn noch nicht am Limit)
  if(balls.length<MAX_BALLS && Math.random()<0.16){
    powerups.push({x:b.x+b.w/2-12,y:b.y,w:24,h:20,dy:2.4});
  }
  break; // maximal 1 Stein pro Ball pro Frame
}
}
}

/* WALL + PADDLE — pro Ball */
for(const ball of balls){
if(ball.x-ball.r<0){ball.x=ball.r;ball.dx*=-1;sndWall();}
if(ball.x+ball.r>canvas.width){ball.x=canvas.width-ball.r;ball.dx*=-1;sndWall();}
if(ball.y-ball.r<0){ball.y=ball.r;ball.dy*=-1;sndWall();}

/* PADDLE — nur abprallen wenn Ball nach unten fliegt (verhindert Zittern) */
if(
ball.dy>0 &&
ball.x+ball.r>paddle.x &&
ball.x-ball.r<paddle.x+paddle.w &&
ball.y+ball.r>paddle.y &&
ball.y-ball.r<paddle.y+paddle.h
){
// Aufprallwinkel abhängig davon, wo der Ball den Schläger trifft
const hitPos=(ball.x-(paddle.x+paddle.w/2))/(paddle.w/2); // -1..1
const s=ballSpeed();
ball.dx=hitPos*s;
ball.dy=-Math.sqrt(Math.max(s*s-ball.dx*ball.dx,s*0.4));
ball.y=paddle.y-ball.r; // aus dem Schläger rausschieben, kein Steckenbleiben
sndPaddle();
}

/* MOVE */
ball.x+=ball.dx;
ball.y+=ball.dy;
}

/* POWERUP vom Schläger eingefangen? */
powerups=powerups.filter(p=>{
if(p.y+p.h>=paddle.y && p.y<=paddle.y+paddle.h && p.x+p.w>paddle.x && p.x<paddle.x+paddle.w){
  triggerMultiball();
  return false; // eingefangen -> entfernen
}
if(p.y>canvas.height) return false; // durchgefallen -> entfernen
return true;
});

/* LEVEL GESCHAFFT */
if(bricksLeft===0){
running=false;
document.getElementById("levelScoreLine").innerText="Score: "+score+" · weiter zu Level "+(level+1);
document.getElementById("levelOverlay").style.display="flex";
sndLevelUp();
return;
}

/* Bälle, die unten rausgefallen sind, entfernen */
balls=balls.filter(ball=>ball.y-ball.r<=canvas.height);

/* LEBEN VERLOREN — erst wenn ALLE Bälle weg sind */
if(balls.length===0){
lives--;
livesEl.innerText='❤'.repeat(Math.max(lives,0))+'🖤'.repeat(3-Math.max(lives,0));
sndLifeLost();

if(lives<=0){
running=false;
clearLiveState();

if(score>high){
high=score;
localStorage.setItem("breakoutHigh",high);
highEl.innerText=high;
}

sndGameOver();

// Highscore ans MyPanel-System übergeben (nutzt automatisch den XP-Multiplikator)
try{
  if(typeof window.autoSaveScore==='function'){
    window.autoSaveScore('Breakout',score);
  }
}catch(e){}

document.getElementById("finalScoreLine").innerText="Score: "+score+" · Level "+level;
document.getElementById("overlay").style.display="flex";
return; // stop loop immediately
}

// noch Leben übrig: Ball + Schläger neu, Steine bleiben wie sie sind
const s=ballSpeed();
paddle.x=250;
powerups=[];
balls=[{x:300,y:200,dx:(Math.random()<0.5?-1:1)*s,dy:-s,r:8}];
}

requestAnimationFrame(loop);
}
</script>

<style>
#annBanner{display:none;position:fixed;top:0;left:0;right:0;z-index:99999;pointer-events:none;}

<script>
(function(){
  const DB='https://mypanel-41c90-default-rtdb.europe-west1.firebasedatabase.app';
  let lastTs=0,t=null;
  function sound(){try{const ac=new(window.AudioContext||window.webkitAudioContext)();[[0,.08,880,.15],[.1,.08,1100,.1],[.2,.12,660,.12],[.35,.2,880,.08]].forEach(([st,dur,freq,vol])=>{const o=ac.createOscillator(),g=ac.createGain();o.frequency.value=freq;o.type='sine';g.gain.setValueAtTime(0,ac.currentTime+st);g.gain.linearRampToValueAtTime(vol,ac.currentTime+st+.02);g.gain.exponentialRampToValueAtTime(.001,ac.currentTime+st+dur);o.connect(g);g.connect(ac.destination);o.start(ac.currentTime+st);o.stop(ac.currentTime+st+dur);});setTimeout(()=>ac.close(),800);}catch(e){}}
  function show(txt){
    const b=document.getElementById('annBanner'),el=document.getElementById('annBannerText');
    if(!b||!el)return;
    el.textContent=txt;b.style.display='block';
    const inner=b.querySelector('.aInner');
    if(inner){inner.style.animation='none';void inner.offsetWidth;inner.style.animation='';}
    sound();clearTimeout(t);t=setTimeout(()=>b.style.display='none',10000);
  }
  function poll(){fetch(DB+'/announcement.json?t='+Date.now()).then(r=>r.json()).then(d=>{if(d&&d.text){const ts=d.timestamp||d.text;if(ts!==lastTs){lastTs=ts;show(d.text);}}}).catch(()=>{});}
  setTimeout(poll,1000);setInterval(poll,3000);
})();
</script>


<!-- XP MULTIPLIER -->
<script>
(function(){
  const orig=window.autoSaveScore;
  window.autoSaveScore=function(gameName,score){
    const mult=parseFloat(localStorage.getItem('mpXpMultiplier')||'1');
    const boosted=Math.floor(score*mult);
    if(mult>1){
      // Show notification
      const n=document.createElement('div');
      n.style.cssText='position:fixed;top:20px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,.85);border:1px solid #ffd23f;border-radius:6px;padding:10px 20px;font-family:Orbitron,sans-serif;font-size:13px;font-weight:900;color:#ffd23f;letter-spacing:2px;z-index:99999;pointer-events:none;';
      n.textContent='🎉 '+mult+'x XP! '+Math.floor(score)+' → '+boosted+' PUNKTE!';
      document.body.appendChild(n);
      setTimeout(()=>n.remove(),2500);
    }
    if(orig) orig(gameName,boosted);
    else {
      // Fallback: save directly to localStorage
      try{
        const pr=JSON.parse(localStorage.getItem('mpProfile')||'null');
        const pn=(pr?pr.username:'MYPANEL USER').toUpperCase();
        const all=JSON.parse(localStorage.getItem('highscores')||'[]');
        const prev=all.filter(x=>x.player===pn&&x.game===gameName).sort((a,b)=>b.score-a.score);
        const best=prev.length>0?Math.max(prev[0].score,boosted):boosted;
        const f=all.filter(x=>!(x.player===pn&&x.game===gameName));
        f.push({player:pn,game:gameName,score:best,date:new Date().toLocaleDateString('de-DE')});
        localStorage.setItem('highscores',JSON.stringify(f.sort((a,b)=>b.score-a.score).slice(0,50)));
      }catch(e){}
    }
  };
})();
</script>
</body>
</html>
