<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>Breakout</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Segoe UI;
}

body{
height:100vh;
background:radial-gradient(circle at top,#0f172a,#020617);
color:white;
overflow:hidden;
}

/* SCREENS */
.screen{
position:absolute;
width:100%;
height:100%;
display:none;
justify-content:center;
align-items:center;
}

.active{display:flex;}

/* ===== MENU ===== */
.menu{
flex-direction:column;
text-align:center;
}

/* TITLE */
.title{
font-size:70px;
font-weight:900;
margin-bottom:20px;
background:linear-gradient(90deg,#6366f1,#22c55e);
-webkit-background-clip:text;
color:transparent;
}

/* CARD */
.panel{
background:rgba(255,255,255,0.05);
backdrop-filter:blur(20px);
padding:40px;
border-radius:25px;
box-shadow:0 0 40px rgba(99,102,241,0.3);
}

/* HIGHSCORE */
.high{
font-size:22px;
margin-bottom:20px;
opacity:0.8;
}

/* BUTTON */
.btn{
padding:18px 40px;
border:none;
border-radius:16px;
background:linear-gradient(135deg,#6366f1,#4f46e5);
color:white;
font-size:18px;
font-weight:900;
cursor:pointer;
transition:0.2s;
}

.btn:hover{
transform:scale(1.08);
box-shadow:0 0 20px #6366f1;
}

/* ===== GAME ===== */
.game{
flex-direction:column;
}

/* TOP BAR */
.top{
font-size:20px;
margin-bottom:10px;
}

/* CANVAS */
canvas{
background:#020617;
border-radius:16px;
box-shadow:0 0 30px #6366f1;
}

/* OVERLAY */
.overlay{
position:absolute;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.85);
display:none;
justify-content:center;
align-items:center;
flex-direction:column;
}

.overlay h2{
font-size:50px;
margin-bottom:20px;
}
</style>
</head>

<body>

<!-- MENU -->
<div class="screen active menu" id="menu">

<div class="title">🧱 Breakout</div>

<div class="panel">
<div class="high">🏆 Highscore: <span id="high">0</span></div>
<button class="btn" onclick="startGame()">▶ Start Game</button>
</div>

</div>

<!-- GAME -->
<div class="screen game" id="gameScreen">

<div class="top">
Score: <span id="score">0</span>
</div>

<canvas id="canvas" width="600" height="400"></canvas>

<button class="btn" onclick="goMenu()">⬅ Menü</button>

</div>

<!-- GAME OVER -->
<div class="overlay" id="overlay">
<h2>💥 Game Over</h2>
<button class="btn" onclick="startGame()">🔄 Restart</button>
</div>

<script>
const canvas=document.getElementById("canvas");
const ctx=canvas.getContext("2d");

const scoreEl=document.getElementById("score");
const highEl=document.getElementById("high");

let paddle,ball,bricks;
let score=0;
let high=localStorage.getItem("breakoutHigh")||0;
let running=false;

highEl.innerText=high;

/* SCREEN */
function show(id){
document.querySelectorAll(".screen").forEach(s=>s.classList.remove("active"));
document.getElementById(id).classList.add("active");
}

/* MENU */
function goMenu(){
running=false;
show("menu");
}

/* START */
function startGame(){
running=false; // stop any existing loop first
document.getElementById("overlay").style.display="none";
show("gameScreen");
init();
running=true;
requestAnimationFrame(loop);
}

/* INIT */
function init(){
paddle={x:250,y:360,w:100,h:10};
ball={x:300,y:200,dx:4,dy:-4,r:8};

score=0;
scoreEl.innerText=0;

bricks=[];
for(let r=0;r<5;r++){
for(let c=0;c<10;c++){
bricks.push({
x:20+c*56,
y:30+r*25,
w:50,
h:15,
hit:false
});
}
}
}

/* CONTROL */
document.addEventListener("mousemove",(e)=>{
if(!running||!paddle) return;
let rect=canvas.getBoundingClientRect();
paddle.x=e.clientX-rect.left-paddle.w/2;
});

/* LOOP */
function loop(){
if(!running) return;

ctx.clearRect(0,0,canvas.width,canvas.height);

/* PADDLE */
ctx.fillStyle="#6366f1";
ctx.fillRect(paddle.x,paddle.y,paddle.w,paddle.h);

/* BALL */
ctx.beginPath();
ctx.arc(ball.x,ball.y,ball.r,0,Math.PI*2);
ctx.fillStyle="#facc15";
ctx.fill();

/* BRICKS */
bricks.forEach(b=>{
if(!b||b.hit) return;
ctx.fillStyle="#22c55e";
ctx.fillRect(b.x,b.y,b.w,b.h);
});

/* COLLISION */
bricks.forEach(b=>{
if(!b||b.hit) return;
if(ball.x>b.x &&
ball.x<b.x+b.w &&
ball.y>b.y &&
ball.y<b.y+b.h){
b.hit=true;
ball.dy*=-1;
score+=10;
scoreEl.innerText=score;
}
});

/* WALL */
if(ball.x<0||ball.x>canvas.width) ball.dx*=-1;
if(ball.y<0) ball.dy*=-1;

/* PADDLE */
if(
ball.x>paddle.x &&
ball.x<paddle.x+paddle.w &&
ball.y>paddle.y
){
ball.dy*=-1;
}

/* MOVE */
ball.x+=ball.dx;
ball.y+=ball.dy;

/* GAME OVER */
if(ball.y>canvas.height){
running=false;

if(score>high){
high=score;
localStorage.setItem("breakoutHigh",high);
highEl.innerText=high;
}

// Auto-save to MyPanel highscores — only if new personal best
try{
  const profRaw=localStorage.getItem('mpProfile');
  const prof=profRaw?JSON.parse(profRaw):null;
  const player=(prof?prof.username:localStorage.getItem('username')||'MYPANEL USER').toUpperCase();
  const all=JSON.parse(localStorage.getItem('highscores')||'[]');
  const prevBest=all.filter(s=>s.player===player&&s.game==='Breakout').sort((a,b)=>b.score-a.score);
  if(prevBest.length===0||score>prevBest[0].score){
    const filtered=all.filter(s=>!(s.player===player&&s.game==='Breakout'));
    filtered.push({player,game:'Breakout',score:Math.floor(score),date:new Date().toLocaleDateString('de-DE')});
    filtered.sort((a,b)=>b.score-a.score);
    localStorage.setItem('highscores',JSON.stringify(filtered.slice(0,50)));
  }
}catch(e){}

document.getElementById("overlay").style.display="flex";
return; // stop loop immediately
}

requestAnimationFrame(loop);
}
</script>

<!-- ANNOUNCEMENT SYSTEM -->
<style>
#annBanner{display:none;position:fixed;top:0;left:0;right:0;z-index:99999;pointer-events:none;}
#annBanner .aInner{position:relative;background:linear-gradient(135deg,rgba(0,5,15,.96),rgba(0,10,25,.98));padding:18px 60px 22px;text-align:center;border-bottom:3px solid #00e5ff;animation:annSD .5s cubic-bezier(.22,.61,.36,1) both;overflow:hidden;}
#annBanner .aInner::before{content:'';position:absolute;inset:0;background:linear-gradient(90deg,transparent,rgba(0,229,255,.05),transparent);animation:annSW 2s linear infinite;}
@keyframes annSD{from{transform:translateY(-100%);opacity:0;}to{transform:translateY(0);opacity:1;}}
@keyframes annSW{from{transform:translateX(-100%);}to{transform:translateX(100%);}}
.ann-c{position:absolute;width:16px;height:16px;}.ann-c.tl{top:5px;left:8px;border-top:2px solid #00e5ff;border-left:2px solid #00e5ff;}.ann-c.tr{top:5px;right:8px;border-top:2px solid #00e5ff;border-right:2px solid #00e5ff;}.ann-c.bl{bottom:5px;left:8px;border-bottom:2px solid #00ff87;border-left:2px solid #00ff87;}.ann-c.br{bottom:5px;right:8px;border-bottom:2px solid #00ff87;border-right:2px solid #00ff87;}
</style>
<div id="annBanner">
  <div class="aInner">
    <div class="ann-c tl"></div><div class="ann-c tr"></div><div class="ann-c bl"></div><div class="ann-c br"></div>
    <div style="font-family:'Orbitron',sans-serif;font-size:9px;color:rgba(0,229,255,.7);letter-spacing:4px;margin-bottom:5px;">// GLOBAL ANNOUNCEMENT</div>
    <div style="font-family:'Orbitron',sans-serif;font-size:clamp(14px,2.5vw,26px);font-weight:900;color:#fff;text-shadow:0 0 30px rgba(0,229,255,.9);letter-spacing:2px;">📢 <span id="annBannerText"></span></div>
  </div>
</div>
<script>
(function(){
  const DB='https://mypanel-41c90-default-rtdb.europe-west1.firebasedatabase.app';
  let lastTs=0,t=null;
  function sound(){try{const ac=new(window.AudioContext||window.webkitAudioContext)();[[0,.08,880,.15],[.1,.08,1100,.1],[.2,.12,660,.12],[.35,.2,880,.08]].forEach(([st,dur,freq,vol])=>{const o=ac.createOscillator(),g=ac.createGain();o.frequency.value=freq;o.type='sine';g.gain.setValueAtTime(0,ac.currentTime+st);g.gain.linearRampToValueAtTime(vol,ac.currentTime+st+.02);g.gain.exponentialRampToValueAtTime(.001,ac.currentTime+st+dur);o.connect(g);g.connect(ac.destination);o.start(ac.currentTime+st);o.stop(ac.currentTime+st+dur);});setTimeout(()=>ac.close(),800);}catch(e){}}
  function show(txt){
    const b=document.getElementById('annBanner'),el=document.getElementById('annBannerText');
    if(!b||!el)return;
    el.textContent=txt;b.style.display='block';
    const inner=b.querySelector('.aInner');
    if(inner){inner.style.animation='none';void inner.offsetWidth;inner.style.animation='';}
    sound();clearTimeout(t);t=setTimeout(()=>b.style.display='none',10000);
  }
  function poll(){fetch(DB+'/announcement.json?t='+Date.now()).then(r=>r.json()).then(d=>{if(d&&d.text){const ts=d.timestamp||d.text;if(ts!==lastTs){lastTs=ts;show(d.text);}}}).catch(()=>{});}
  setTimeout(poll,1000);setInterval(poll,3000);
})();
</script>


<!-- XP MULTIPLIER -->
<script>
(function(){
  const orig=window.autoSaveScore;
  window.autoSaveScore=function(gameName,score){
    const mult=parseFloat(localStorage.getItem('mpXpMultiplier')||'1');
    const boosted=Math.floor(score*mult);
    if(mult>1){
      // Show notification
      const n=document.createElement('div');
      n.style.cssText='position:fixed;top:20px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,.85);border:1px solid #ffd23f;border-radius:6px;padding:10px 20px;font-family:Orbitron,sans-serif;font-size:13px;font-weight:900;color:#ffd23f;letter-spacing:2px;z-index:99999;pointer-events:none;';
      n.textContent='🎉 '+mult+'x XP! '+Math.floor(score)+' → '+boosted+' PUNKTE!';
      document.body.appendChild(n);
      setTimeout(()=>n.remove(),2500);
    }
    if(orig) orig(gameName,boosted);
    else {
      // Fallback: save directly to localStorage
      try{
        const pr=JSON.parse(localStorage.getItem('mpProfile')||'null');
        const pn=(pr?pr.username:'MYPANEL USER').toUpperCase();
        const all=JSON.parse(localStorage.getItem('highscores')||'[]');
        const prev=all.filter(x=>x.player===pn&&x.game===gameName).sort((a,b)=>b.score-a.score);
        const best=prev.length>0?Math.max(prev[0].score,boosted):boosted;
        const f=all.filter(x=>!(x.player===pn&&x.game===gameName));
        f.push({player:pn,game:gameName,score:best,date:new Date().toLocaleDateString('de-DE')});
        localStorage.setItem('highscores',JSON.stringify(f.sort((a,b)=>b.score-a.score).slice(0,50)));
      }catch(e){}
    }
  };
})();
</script>
</body>
</html>
