<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Arcade Racing Smooth Controls</title>

<style>
html,body{
margin:0;
padding:0;
overflow:hidden;
width:100%;
height:100%;
background:#020617;
font-family:Arial,sans-serif;
}

canvas{
display:block;
width:100vw;
height:100vh;
}

.menu{
position:absolute;
inset:0;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
background:linear-gradient(135deg,#020617,#0f172a);
color:white;
z-index:10;
}

.title{
font-size:80px;
font-weight:bold;
text-shadow:0 0 30px cyan;
margin-bottom:20px;
}

.usernameInput{
padding:16px;
font-size:22px;
border:none;
border-radius:16px;
width:300px;
margin-bottom:20px;
background:#1e293b;
color:white;
}

button{
padding:18px 40px;
font-size:24px;
font-weight:bold;
border:none;
border-radius:18px;
cursor:pointer;
background:linear-gradient(135deg,#06b6d4,#6366f1);
color:white;
margin:10px;
}

.highscores{
margin-top:20px;
width:550px;
padding:25px;
border-radius:25px;
background:rgba(255,255,255,.05);
box-shadow:0 0 30px rgba(0,255,255,.3);
}

.score{
display:flex;
justify-content:space-between;
padding:12px 0;
font-size:22px;
border-bottom:1px solid rgba(255,255,255,.1);
}

.gameOver{
position:absolute;
inset:0;
display:none;
justify-content:center;
align-items:center;
flex-direction:column;
background:rgba(0,0,0,.85);
z-index:20;
color:white;
}
</style>
</head>
<body>

<div class="menu" id="menu">

<div class="title">🏎 Arcade Racing</div>

<input
type="text"
id="usernameInput"
class="usernameInput"
placeholder="Username eingeben..."
>

<button onclick="saveUsername()">USERNAME SPEICHERN</button>

<button onclick="startGame()">SPIEL STARTEN</button>

<div class="highscores">

<h1>🏆 Highscores</h1>

<div id="scoreList"></div>

</div>

</div>

<div class="gameOver" id="gameOver">

<h1 style="font-size:90px;">💥 CRASH</h1>

<button onclick="backToMenu()">MENÜ</button>

</div>

<canvas id="game"></canvas>

<script>

const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

function resizeCanvas(){

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

}

resizeCanvas();

window.addEventListener("resize",resizeCanvas);

/* USERNAME */

let username =
localStorage.getItem("username") || "lukas";

document.getElementById("usernameInput").value = username;

function saveUsername(){

const input =
document.getElementById("usernameInput").value;

if(input.trim() !== ""){

username = input;

localStorage.setItem("username",input);

loadScores();

}

}

/* GAME */

let running = false;

const player = {
x:0,
y:0,
w:70,
h:130,
speed:18
};

function resetPlayer(){

player.x = canvas.width/2 - 35;
player.y = canvas.height - 180;

}

resetPlayer();

let score = 0;
let roadOffset = 0;

let enemyCars = [];

/* SMOOTH CONTROLS */

const keys = {};

document.addEventListener("keydown",(e)=>{

keys[e.key] = true;

});

document.addEventListener("keyup",(e)=>{

keys[e.key] = false;

});

function spawnEnemy(){

enemyCars.push({

x:Math.random()*320 + (canvas.width/2 - 160),
y:-180,
w:70,
h:130,

speed:7+Math.random()*4,

color:[
"#ef4444",
"#f97316",
"#a855f7",
"#e11d48"
][Math.floor(Math.random()*4)]

});

}

setInterval(()=>{

if(running){

spawnEnemy();

}

},850);

/* ROAD */

function drawRoad(){

ctx.fillStyle="#374151";

ctx.fillRect(
canvas.width/2 - 230,
0,
460,
canvas.height
);

/* LINES */

ctx.fillStyle="#9ca3af";

for(let i=0;i<30;i++){

ctx.fillRect(
canvas.width/2 - 6,
i*90 + roadOffset,
12,
55
);

}

roadOffset += 15;

if(roadOffset > 90){
roadOffset = 0;
}

/* GRASS */

ctx.fillStyle="#052e16";

ctx.fillRect(0,0,canvas.width/2 - 230,canvas.height);

ctx.fillRect(
canvas.width/2 + 230,
0,
canvas.width,
canvas.height
);

/* HOUSES */

for(let i=0;i<12;i++){

drawHouse(60,i*180);

drawHouse(canvas.width-240,i*180);

}

}

function drawHouse(x,y){

ctx.fillStyle="#1e293b";
ctx.fillRect(x,y,160,110);

ctx.fillStyle="#334155";
ctx.fillRect(x+10,y+10,140,90);

ctx.fillStyle="#7c2d12";

ctx.beginPath();
ctx.moveTo(x-10,y+10);
ctx.lineTo(x+80,y-40);
ctx.lineTo(x+170,y+10);
ctx.fill();

for(let r=0;r<2;r++){

for(let c=0;c<3;c++){

ctx.fillStyle="yellow";

ctx.fillRect(
x+25+c*35,
y+25+r*35,
20,
20
);

}

}

}

/* PLAYER */

function drawPlayer(){

ctx.save();

ctx.shadowBlur = 30;
ctx.shadowColor = "#22d3ee";

ctx.fillStyle="#06b6d4";

ctx.fillRect(
player.x,
player.y,
player.w,
player.h
);

ctx.fillStyle="white";

ctx.fillRect(
player.x+10,
player.y+20,
50,
25
);

ctx.fillStyle="black";

ctx.fillRect(player.x-6,player.y+15,8,28);
ctx.fillRect(player.x+68,player.y+15,8,28);

ctx.fillRect(player.x-6,player.y+85,8,28);
ctx.fillRect(player.x+68,player.y+85,8,28);

ctx.restore();

}

/* ENEMIES */

function drawEnemies(){

enemyCars.forEach((car,index)=>{

car.y += car.speed;

ctx.save();

ctx.shadowBlur = 20;
ctx.shadowColor = car.color;

ctx.fillStyle = car.color;

ctx.fillRect(car.x,car.y,car.w,car.h);

ctx.fillStyle="white";

ctx.fillRect(car.x+10,car.y+20,50,25);

ctx.fillStyle="black";

ctx.fillRect(car.x-6,car.y+15,8,28);
ctx.fillRect(car.x+68,car.y+15,8,28);

ctx.fillRect(car.x-6,car.y+85,8,28);
ctx.fillRect(car.x+68,car.y+85,8,28);

ctx.restore();

if(
player.x < car.x + car.w &&
player.x + player.w > car.x &&
player.y < car.y + car.h &&
player.y + player.h > car.y
){

crash();

}

if(car.y > canvas.height+200){

enemyCars.splice(index,1);

score++;

}

});

}

function drawHUD(){

ctx.fillStyle="white";
ctx.font="40px Arial";

ctx.fillText("Punkte: " + score,40,60);

ctx.fillText(username,40,110);

}

/* UPDATE */

function update(){

if(!running) return;

ctx.clearRect(0,0,canvas.width,canvas.height);

/* SMOOTH MOVEMENT */

if(keys["ArrowLeft"] || keys["a"]){

player.x -= player.speed;

}

if(keys["ArrowRight"] || keys["d"]){

player.x += player.speed;

}

drawRoad();
drawPlayer();
drawEnemies();
drawHUD();

const leftBorder =
canvas.width/2 - 180;

const rightBorder =
canvas.width/2 + 110;

if(player.x < leftBorder){
player.x = leftBorder;
}

if(player.x > rightBorder){
player.x = rightBorder;
}

requestAnimationFrame(update);

}

/* START */

function startGame(){

document.getElementById("menu").style.display="none";

document.getElementById("gameOver").style.display="none";

running = true;

score = 0;

enemyCars = [];

resetPlayer();

update();

}

/* CRASH */

function crash(){

running = false;

saveHighscore();

document.getElementById("gameOver").style.display="flex";

}

/* BACK */

function backToMenu(){

document.getElementById("gameOver").style.display="none";

document.getElementById("menu").style.display="flex";

loadScores();

}

/* HIGHSCORES */

function saveHighscore(){

let highscores =
JSON.parse(localStorage.getItem("arcadeHighscores") || "[]");

highscores.push({
name:username,
score:score
});

highscores.sort((a,b)=>b.score-a.score);

highscores = highscores.slice(0,10);

localStorage.setItem(
"arcadeHighscores",
JSON.stringify(highscores)
);

}

function loadScores(){

let highscores =
JSON.parse(localStorage.getItem("arcadeHighscores") || "[]");

const list =
document.getElementById("scoreList");

list.innerHTML = "";

if(highscores.length===0){

list.innerHTML = "<p>Keine Highscores</p>";

return;

}

highscores.forEach((entry,index)=>{

list.innerHTML += `
<div class="score">
<span>#${index+1} ${entry.name}</span>
<span>${entry.score} Punkte</span>
</div>
`;

});

}

loadScores();

</script>

</body>
</html>
