<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>NEON PONG — MyPanel</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Rajdhani:wght@500;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
html,body{width:100%;height:100%;overflow:hidden;background:#030608;font-family:'Rajdhani',sans-serif;color:#fff;}
canvas{display:block;}

.screen{position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:20px;}
.screen.hidden{display:none!important;}

.back{position:fixed;top:16px;left:16px;color:#7fe9ff;text-decoration:none;font-family:'Orbitron',sans-serif;font-size:10px;letter-spacing:2px;border:1px solid rgba(0,229,255,.3);padding:7px 14px;border-radius:3px;background:rgba(0,10,14,.6);z-index:99999;}

.logo{font-family:'Orbitron',sans-serif;font-weight:900;font-size:clamp(36px,8vw,72px);letter-spacing:4px;background:linear-gradient(90deg,#00e5ff,#ff2bd6,#00ff87);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;filter:drop-shadow(0 0 20px rgba(0,229,255,.4));}
.sub{color:rgba(255,255,255,.4);font-size:13px;letter-spacing:4px;margin:8px 0 36px;}

.btn{display:inline-block;padding:14px 40px;font-family:'Orbitron',sans-serif;font-size:12px;font-weight:700;letter-spacing:3px;color:#030608;background:linear-gradient(90deg,#00e5ff,#00ff87);border:none;border-radius:3px;cursor:pointer;box-shadow:0 0 24px rgba(0,229,255,.4);clip-path:polygon(0 0,calc(100% - 10px) 0,100% 100%,10px 100%);transition:.15s;margin:6px;}
.btn:hover{box-shadow:0 0 40px rgba(0,229,255,.65);transform:scale(1.04);}
.btn.secondary{background:transparent;color:var(--c,#00e5ff);border:1px solid rgba(0,229,255,.4);clip-path:none;box-shadow:none;}
.btn.secondary:hover{background:rgba(0,229,255,.08);box-shadow:none;transform:none;}

.inp{display:block;width:100%;max-width:280px;padding:12px 16px;background:rgba(255,255,255,.05);border:1px solid rgba(0,229,255,.3);border-radius:3px;color:#fff;font-family:'Share Tech Mono',monospace;font-size:16px;letter-spacing:4px;text-align:center;outline:none;margin:10px auto;}
.inp:focus{border-color:rgba(0,229,255,.6);}

.room-code{font-family:'Orbitron',sans-serif;font-size:48px;font-weight:900;color:#00e5ff;text-shadow:0 0 24px rgba(0,229,255,.6);letter-spacing:8px;margin:16px 0;}
.status-text{font-size:13px;letter-spacing:3px;color:rgba(255,255,255,.5);margin:8px 0;}
.pulse{animation:pulse 1.5s ease-in-out infinite;}
@keyframes pulse{0%,100%{opacity:.4;}50%{opacity:1;}}

/* HUD overlay */
#hud{position:fixed;top:0;left:0;right:0;display:none;justify-content:space-between;align-items:center;padding:14px 28px;pointer-events:none;z-index:5;}
.score-block{text-align:center;}
.score-name{font-family:'Orbitron',sans-serif;font-size:10px;letter-spacing:3px;color:rgba(255,255,255,.4);}
.score-num{font-family:'Orbitron',sans-serif;font-size:42px;font-weight:900;line-height:1;}
.score-num.cyan{color:#00e5ff;text-shadow:0 0 16px rgba(0,229,255,.6);}
.score-num.pink{color:#ff2bd6;text-shadow:0 0 16px rgba(255,43,214,.6);}
.vs{font-family:'Orbitron',sans-serif;font-size:14px;color:rgba(255,255,255,.2);letter-spacing:4px;}

/* Win overlay */
#winOverlay{position:fixed;inset:0;display:none;flex-direction:column;align-items:center;justify-content:center;background:rgba(0,0,0,.85);z-index:100;}
.win-title{font-family:'Orbitron',sans-serif;font-size:clamp(28px,6vw,52px);font-weight:900;letter-spacing:2px;}
.win-score{font-family:'Orbitron',sans-serif;font-size:22px;color:rgba(255,255,255,.5);margin:10px 0 28px;}
</style>
</head>
<body>

<a class="back" href="javascript:history.back()">‹ ZURÜCK</a>

<!-- MENU -->
<div class="screen" id="menuScreen">
  <div class="logo">NEON PONG</div>
  <div class="sub">1v1 ONLINE MULTIPLAYER</div>
  <button class="btn" onclick="createRoom()">🎮 RAUM ERSTELLEN</button>
  <button class="btn secondary" onclick="showJoin()">🔗 RAUM BEITRETEN</button>
  <div style="margin-top:20px;font-size:11px;letter-spacing:2px;color:rgba(255,255,255,.25);">
    🖱️ W/S oder ↑/↓ &nbsp;·&nbsp; 👆 Finger ziehen
  </div>
</div>

<!-- JOIN -->
<div class="screen hidden" id="joinScreen">
  <div class="logo" style="font-size:clamp(24px,5vw,48px);">BEITRETEN</div>
  <div class="sub">CODE EINGEBEN</div>
  <input class="inp" id="joinCode" placeholder="CODE" maxlength="4" oninput="this.value=this.value.toUpperCase()">
  <button class="btn" onclick="joinRoom()">▶ BEITRETEN</button>
  <button class="btn secondary" onclick="showScreen('menuScreen')">‹ ZURÜCK</button>
</div>

<!-- LOBBY -->
<div class="screen hidden" id="lobbyScreen">
  <div class="sub">DEIN RAUMCODE</div>
  <div class="room-code" id="roomCodeDisplay">----</div>
  <div class="status-text pulse" id="lobbyStatus">Warte auf Gegner...</div>
  <div id="lobbyPlayers" style="margin:16px 0;font-size:13px;color:rgba(255,255,255,.5);letter-spacing:2px;"></div>
  <button class="btn secondary" onclick="leaveRoom()">✕ VERLASSEN</button>
</div>

<!-- GAME -->
<canvas id="c" class="hidden"></canvas>
<div id="hud" class="hidden">
  <div class="score-block">
    <div class="score-name" id="p1Name">SPIELER 1</div>
    <div class="score-num cyan" id="p1Score">0</div>
  </div>
  <div class="vs">VS</div>
  <div class="score-block">
    <div class="score-name" id="p2Name">SPIELER 2</div>
    <div class="score-num pink" id="p2Score">0</div>
  </div>
</div>

<!-- WIN -->
<div id="winOverlay">
  <div class="win-title" id="winTitle">GEWONNEN!</div>
  <div class="win-score" id="winScore"></div>
  <button class="btn" onclick="playAgain()">↻ NOCHMAL</button>
  <button class="btn secondary" onclick="leaveRoom()">✕ BEENDEN</button>
</div>

<!-- ANNOUNCEMENT SYSTEM -->
<div id="annBanner" style="display:none;position:fixed;bottom:0;left:0;right:0;z-index:99999;pointer-events:none;">
  <div style="background:rgba(0,0,0,.85);padding:18px 40px 22px;text-align:center;border-top:3px solid #00e5ff;animation:annIn .4s cubic-bezier(.22,.61,.36,1) both;">
    <span style="font-family:Arial,sans-serif;font-size:clamp(16px,3vw,30px);font-weight:900;color:#fff;text-shadow:0 0 20px rgba(0,229,255,.8);letter-spacing:2px;">📢 <span id="annBannerText"></span></span>
  </div>
</div>
<style>@keyframes annIn{from{transform:translateY(100%);opacity:0;}to{transform:translateY(0);opacity:1;}}</style>

<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database-compat.js"></script>
<script>
/* ===== FIREBASE ===== */
firebase.initializeApp({
  apiKey:"AIzaSyDqVPdgGhRx6v__sx7pCe5mOre8XT7xRLg",
  authDomain:"mypanel-41c90.firebaseapp.com",
  databaseURL:"https://mypanel-41c90-default-rtdb.europe-west1.firebasedatabase.app",
  projectId:"mypanel-41c90",
  storageBucket:"mypanel-41c90.firebasestorage.app",
  messagingSenderId:"69361490898",
  appId:"1:69361490898:web:1fcec1264539c8e637060b"
});
const db=firebase.database();

/* ===== STATE ===== */
const canvas=document.getElementById('c');
const ctx=canvas.getContext('2d');
let W,H;
let roomCode=null,myRole=null; // 'p1' or 'p2'
let roomRef=null,listeners=[];
let gameState={ball:{x:0,y:0,vx:0,vy:0},p1:{y:0,score:0},p2:{y:0,score:0},status:'waiting'};
let myPaddleY=0,raf=null;
let keys={},touchY=null;
const PADDLE_H=90,PADDLE_W=12,BALL_R=8,WIN_SCORE=5,SPEED_INC=1.04;
const SYNC_RATE=50; // ms between Firebase writes
let lastSync=0;

function resize(){
  W=canvas.width=window.innerWidth;
  H=canvas.height=window.innerHeight;
}
window.addEventListener('resize',resize);resize();

/* ===== SCREENS ===== */
function showScreen(id){
  document.querySelectorAll('.screen,[id="c"],[id="hud"],[id="winOverlay"]').forEach(el=>{
    el.classList.add('hidden');
    if(el.style)el.style.display='';
  });
  const el=document.getElementById(id);
  if(el){el.classList.remove('hidden');if(el.tagName==='CANVAS'||id==='hud')el.style.display='flex';}
}
function showJoin(){showScreen('joinScreen');document.getElementById('joinCode').value='';document.getElementById('joinCode').focus();}

/* ===== ROOM ===== */
function genCode(){return Math.random().toString(36).substr(2,4).toUpperCase();}
function getMyName(){
  try{const p=JSON.parse(localStorage.getItem('mpProfile')||'null');return p?p.username:'SPIELER';}catch(e){return 'SPIELER';}
}

async function createRoom(){
  const code=genCode();
  roomCode=code;myRole='p1';
  roomRef=db.ref('pongRooms/'+code);
  await roomRef.set({
    p1:{name:getMyName(),y:H/2,score:0,ready:false},
    p2:{name:'',y:H/2,score:0,ready:false},
    ball:{x:W/2,y:H/2,vx:5,vy:3},
    status:'waiting',created:Date.now()
  });
  roomRef.onDisconnect().remove();
  document.getElementById('roomCodeDisplay').textContent=code;
  document.getElementById('lobbyStatus').textContent='Warte auf Gegner...';
  showScreen('lobbyScreen');
  listenRoom();
}

async function joinRoom(){
  const code=document.getElementById('joinCode').value.trim().toUpperCase();
  if(code.length!==4){alert('Bitte 4-stelligen Code eingeben!');return;}
  const snap=await db.ref('pongRooms/'+code).once('value');
  if(!snap.exists()){alert('Raum nicht gefunden!');return;}
  const data=snap.val();
  if(data.status!=='waiting'||data.p2.name){alert('Raum ist voll!');return;}
  roomCode=code;myRole='p2';
  roomRef=db.ref('pongRooms/'+code);
  await roomRef.child('p2').update({name:getMyName(),y:H/2});
  await roomRef.child('status').set('ready');
  document.getElementById('roomCodeDisplay').textContent=code;
  document.getElementById('lobbyStatus').textContent='Verbunden!';
  showScreen('lobbyScreen');
  listenRoom();
}

function listenRoom(){
  const l=roomRef.on('value',snap=>{
    if(!snap.exists()){leaveRoom();return;}
    const d=snap.val();
    gameState=d;
    updateLobbyUI(d);
    if(d.status==='playing'&&canvas.classList.contains('hidden')){
      startGame(d);
    }
    if(d.status==='gameover'){
      showWin(d);
    }
  });
  listeners.push(()=>roomRef.off('value',l));
}

function updateLobbyUI(d){
  const p1=d.p1&&d.p1.name?d.p1.name:'---';
  const p2=d.p2&&d.p2.name?d.p2.name:'Wartet...';
  document.getElementById('lobbyPlayers').innerHTML=
    `<span style="color:#00e5ff">▶ ${p1}</span> &nbsp; VS &nbsp; <span style="color:#ff2bd6">▶ ${p2}</span>`;
  if(d.status==='ready'||d.status==='playing'){
    document.getElementById('lobbyStatus').textContent='Spiel startet...';
    if(myRole==='p1'){
      // Host starts the game
      setTimeout(()=>{
        if(roomRef)roomRef.child('status').set('playing');
      },1000);
    }
  }
}

function leaveRoom(){
  listeners.forEach(fn=>fn());listeners=[];
  if(roomRef){
    if(myRole==='p1')roomRef.remove();
    else roomRef.child('p2').update({name:''});
    roomRef=null;
  }
  if(raf){cancelAnimationFrame(raf);raf=null;}
  roomCode=null;myRole=null;
  document.getElementById('winOverlay').style.display='none';
  showScreen('menuScreen');
}

/* ===== GAME ===== */
function startGame(d){
  resize();
  document.getElementById('p1Name').textContent=d.p1.name||'P1';
  document.getElementById('p2Name').textContent=d.p2.name||'P2';
  canvas.classList.remove('hidden');
  canvas.style.display='block';
  document.getElementById('hud').style.display='flex';
  myPaddleY=H/2;

  if(myRole==='p1'){
    // P1 is host — controls ball physics
    initBall();
  }
  gameLoop();
}

function initBall(side=1){
  const angle=(Math.random()*.6-.3);
  const spd=6+Math.min((gameState.p1&&gameState.p1.score||0)+(gameState.p2&&gameState.p2.score||0),8)*.2;
  const bx={x:W/2,y:H/2,vx:spd*side*Math.cos(angle),vy:spd*Math.sin(angle)};
  if(myRole==='p1')roomRef.child('ball').set(bx);
}

/* ===== INPUT ===== */
window.addEventListener('keydown',e=>{keys[e.code]=true;});
window.addEventListener('keyup',e=>{keys[e.code]=false;});
canvas.addEventListener('touchmove',e=>{
  e.preventDefault();
  // Support both players on same device (split screen touch)
  for(let t of e.touches){
    if(t.clientX<W/2){
      // Left side = P1
      if(myRole==='p1')myPaddleY=t.clientY;
    } else {
      // Right side = P2
      if(myRole==='p2')myPaddleY=t.clientY;
    }
    // Single player: any touch controls their paddle
    if(e.touches.length===1)myPaddleY=t.clientY;
  }
},{passive:false});
canvas.addEventListener('touchstart',e=>{
  e.preventDefault();
  for(let t of e.touches){
    if(t.clientX<W/2&&myRole==='p1')myPaddleY=t.clientY;
    if(t.clientX>=W/2&&myRole==='p2')myPaddleY=t.clientY;
    if(e.touches.length===1)myPaddleY=t.clientY;
  }
},{passive:false});
canvas.addEventListener('touchend',e=>{e.preventDefault();},{passive:false});

let lastFrame=performance.now();
function gameLoop(t=performance.now()){
  if(!roomRef){return;}
  const dt=Math.min((t-lastFrame)/1000,.05);lastFrame=t;
  raf=requestAnimationFrame(gameLoop);

  const d=gameState;
  if(!d||d.status!=='playing')return;

  // Move my paddle
  const SPEED=420;
  if(keys['ArrowUp']||keys['KeyW'])myPaddleY-=SPEED*dt;
  if(keys['ArrowDown']||keys['KeyS'])myPaddleY+=SPEED*dt;
  myPaddleY=Math.max(PADDLE_H/2,Math.min(H-PADDLE_H/2,myPaddleY));

  // Sync paddle position
  const now=Date.now();
  if(now-lastSync>SYNC_RATE){
    lastSync=now;
    roomRef.child(myRole).update({y:myPaddleY});
  }

  // Host: update ball physics
  if(myRole==='p1'&&d.ball){
    let {x,y,vx,vy}=d.ball;
    x+=vx;y+=vy;

    // Wall bounce (top/bottom)
    if(y-BALL_R<=0){y=BALL_R;vy=Math.abs(vy);}
    if(y+BALL_R>=H){y=H-BALL_R;vy=-Math.abs(vy);}

    const p1y=d.p1?d.p1.y:H/2;
    const p2y=d.p2?d.p2.y:H/2;

    // P1 paddle (left)
    if(x-BALL_R<=PADDLE_W+20&&x-BALL_R>=10&&Math.abs(y-p1y)<PADDLE_H/2){
      vx=Math.abs(vx)*SPEED_INC;
      vy+=(y-p1y)*0.1;
      x=PADDLE_W+20+BALL_R;
    }
    // P2 paddle (right)
    if(x+BALL_R>=W-PADDLE_W-20&&x+BALL_R<=W-10&&Math.abs(y-p2y)<PADDLE_H/2){
      vx=-Math.abs(vx)*SPEED_INC;
      vy+=(y-p2y)*0.1;
      x=W-PADDLE_W-20-BALL_R;
    }

    // Score
    let p1score=d.p1?d.p1.score:0;
    let p2score=d.p2?d.p2.score:0;
    if(x-BALL_R<=0){
      p2score++;
      roomRef.child('p2').update({score:p2score});
      document.getElementById('p2Score').textContent=p2score;
      if(p2score>=WIN_SCORE){roomRef.child('status').set('gameover');return;}
      initBall(-1);return;
    }
    if(x+BALL_R>=W){
      p1score++;
      roomRef.child('p1').update({score:p1score});
      document.getElementById('p1Score').textContent=p1score;
      if(p1score>=WIN_SCORE){roomRef.child('status').set('gameover');return;}
      initBall(1);return;
    }

    roomRef.child('ball').set({x,y,vx,vy});
  }

  // Update HUD scores from state
  if(d.p1)document.getElementById('p1Score').textContent=d.p1.score||0;
  if(d.p2)document.getElementById('p2Score').textContent=d.p2.score||0;

  draw(d);
}

function draw(d){
  ctx.fillStyle='rgba(3,6,8,0.35)';
  ctx.fillRect(0,0,W,H);

  // Center line
  ctx.setLineDash([12,12]);
  ctx.strokeStyle='rgba(255,255,255,.08)';
  ctx.lineWidth=2;
  ctx.beginPath();ctx.moveTo(W/2,0);ctx.lineTo(W/2,H);ctx.stroke();
  ctx.setLineDash([]);

  // P1 paddle (left) — cyan
  const p1y=d.p1?d.p1.y:H/2;
  const p2y=d.p2?d.p2.y:H/2;
  drawPaddle(PADDLE_W+10,p1y,'#00e5ff');
  drawPaddle(W-PADDLE_W-10,p2y,'#ff2bd6');

  // Ball
  if(d.ball){
    const glow=ctx.createRadialGradient(d.ball.x,d.ball.y,0,d.ball.x,d.ball.y,BALL_R*3);
    glow.addColorStop(0,'rgba(255,255,255,.9)');
    glow.addColorStop(.4,'rgba(0,229,255,.5)');
    glow.addColorStop(1,'rgba(0,229,255,0)');
    ctx.fillStyle=glow;
    ctx.beginPath();ctx.arc(d.ball.x,d.ball.y,BALL_R*3,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='#ffffff';
    ctx.beginPath();ctx.arc(d.ball.x,d.ball.y,BALL_R,0,Math.PI*2);ctx.fill();
  }
}

function drawPaddle(x,y,color){
  // Glow
  ctx.globalAlpha=.2;
  ctx.fillStyle=color;
  ctx.beginPath();ctx.arc(x,y,PADDLE_W*2.5,0,Math.PI*2);ctx.fill();
  ctx.globalAlpha=1;
  // Paddle
  ctx.fillStyle=color;
  ctx.beginPath();
  ctx.roundRect(x-PADDLE_W/2,y-PADDLE_H/2,PADDLE_W,PADDLE_H,4);
  ctx.fill();
}

/* ===== WIN ===== */
function showWin(d){
  if(raf){cancelAnimationFrame(raf);raf=null;}
  const p1s=d.p1?d.p1.score:0,p2s=d.p2?d.p2.score:0;
  const p1n=d.p1?d.p1.name:'P1',p2n=d.p2?d.p2.name:'P2';
  const myName=getMyName();
  const iWon=(myRole==='p1'&&p1s>=WIN_SCORE)||(myRole==='p2'&&p2s>=WIN_SCORE);
  const ov=document.getElementById('winOverlay');
  document.getElementById('winTitle').textContent=iWon?'🏆 DU GEWINNST!':'💀 VERLOREN!';
  document.getElementById('winTitle').style.color=iWon?'#00ff87':'#ff2b6d';
  document.getElementById('winScore').textContent=`${p1n} ${p1s} : ${p2s} ${p2n}`;
  ov.style.display='flex';

  // Save highscore if won
  if(iWon){
    try{
      const all=JSON.parse(localStorage.getItem('highscores')||'[]');
      const prev=all.filter(s=>s.player===myName&&s.game==='Neon Pong').sort((a,b)=>b.score-a.score);
      const wins=(prev.length>0?prev[0].score:0)+1;
      const filtered=all.filter(s=>!(s.player===myName&&s.game==='Neon Pong'));
      filtered.push({player:myName,game:'Neon Pong',score:wins,date:new Date().toLocaleDateString('de-DE')});
      filtered.sort((a,b)=>b.score-a.score);
      localStorage.setItem('highscores',JSON.stringify(filtered.slice(0,50)));
      // Firebase
      if(db){
        const key=myName.replace(/[.#$\/\[\]]/g,'_')+'__Neon Pong';
        db.ref('highscores/'+key).set({player:myName,game:'Neon Pong',score:wins,date:new Date().toLocaleDateString('de-DE')});
      }
    }catch(e){}
  }
}

function playAgain(){
  document.getElementById('winOverlay').style.display='none';
  if(myRole==='p1'&&roomRef){
    roomRef.update({status:'playing','p1/score':0,'p2/score':0});
    initBall();
    gameLoop();
  }
}

/* ===== ANNOUNCEMENT ===== */
(function(){
  const DB_URL='https://mypanel-41c90-default-rtdb.europe-west1.firebasedatabase.app';
  let lastTs=0,annTimer=null;
  function showAnn(text){
    const b=document.getElementById('annBanner');
    const t=document.getElementById('annBannerText');
    if(!b||!t)return;
    b.style.display='none';void b.offsetWidth;
    t.textContent=text;b.style.display='block';
    clearTimeout(annTimer);
    annTimer=setTimeout(()=>{b.style.display='none';},10000);
  }
  function poll(){
    fetch(DB_URL+'/announcement.json?t='+Date.now())
      .then(r=>r.json())
      .then(d=>{
        if(d&&d.text){const ts=d.timestamp||d.text;if(ts!==lastTs){lastTs=ts;showAnn(d.text);}}
      }).catch(()=>{});
  }
  setTimeout(poll,2000);setInterval(poll,3000);
})();
</script>
</body>
</html>
