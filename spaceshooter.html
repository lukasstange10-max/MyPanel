<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Space Shooter — MyPanel</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Rajdhani:wght@500;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
html,body{width:100%;height:100%;overflow:hidden;background:#030608;font-family:'Rajdhani',sans-serif;}
canvas{display:block;width:100%;height:100%;}

.ui{position:fixed;inset:0;pointer-events:none;z-index:10;}

/* HUD */
.hud{position:absolute;top:16px;left:0;right:0;display:flex;justify-content:space-between;align-items:flex-start;padding:0 20px;}
.hud-score{font-family:'Orbitron',sans-serif;font-size:28px;font-weight:900;color:#00e5ff;text-shadow:0 0 14px rgba(0,229,255,.6);}
.hud-label{font-size:10px;letter-spacing:3px;color:rgba(0,229,255,.5);margin-bottom:2px;}
.hud-lives{display:flex;gap:6px;align-items:center;margin-top:4px;}
.heart{font-size:18px;transition:.2s;}
.hud-level{text-align:right;}
.hud-level-num{font-family:'Orbitron',sans-serif;font-size:22px;font-weight:900;color:#00ff87;text-shadow:0 0 12px rgba(0,255,135,.5);}
.hud-wave{font-size:10px;letter-spacing:3px;color:rgba(0,255,135,.5);}

.back{pointer-events:auto;position:absolute;top:16px;left:50%;transform:translateX(-50%);color:#7fe9ff;text-decoration:none;font-family:'Orbitron',sans-serif;font-size:10px;letter-spacing:2px;border:1px solid rgba(0,229,255,.3);padding:7px 14px;border-radius:3px;background:rgba(0,10,14,.6);}
.back:hover{background:rgba(0,229,255,.1);}

/* CENTER PANELS */
.center{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;}
.panel{pointer-events:auto;text-align:center;padding:40px 48px;border:1px solid rgba(0,229,255,.2);border-radius:6px;background:rgba(3,6,8,.92);}
.ptitle{font-family:'Orbitron',sans-serif;font-size:clamp(32px,7vw,56px);font-weight:900;color:#00e5ff;text-shadow:0 0 28px rgba(0,229,255,.5);letter-spacing:2px;line-height:1;}
.psub{color:rgba(255,255,255,.45);font-size:13px;letter-spacing:3px;margin:10px 0 28px;}
.pbtn{display:inline-block;padding:14px 42px;font-family:'Orbitron',sans-serif;font-size:13px;font-weight:700;letter-spacing:3px;color:#030608;background:linear-gradient(90deg,#00e5ff,#00ff87);border:none;border-radius:3px;cursor:pointer;box-shadow:0 0 24px rgba(0,229,255,.4);clip-path:polygon(0 0,calc(100% - 12px) 0,100% 100%,12px 100%);transition:.15s;}
.pbtn:hover{box-shadow:0 0 40px rgba(0,229,255,.65);transform:scale(1.04);}
.hint{margin-top:18px;color:rgba(255,255,255,.3);font-size:11px;letter-spacing:2px;}
.hint b{color:rgba(0,229,255,.6);}

.score-big{font-family:'Orbitron',sans-serif;font-size:56px;font-weight:900;color:#fff;text-shadow:0 0 24px rgba(0,229,255,.5);margin:12px 0 4px;}
.newbest{color:#ffd23f;font-size:12px;letter-spacing:3px;height:16px;margin-bottom:6px;}
.bestrow{color:rgba(255,255,255,.4);font-size:12px;letter-spacing:2px;margin-bottom:26px;}
.over-title{font-family:'Orbitron',sans-serif;font-size:clamp(28px,6vw,46px);color:#ff2b6d;text-shadow:0 0 26px rgba(255,43,109,.6);letter-spacing:2px;}

.hidden{display:none!important;}

/* wave flash */
.wave-flash{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);font-family:'Orbitron',sans-serif;font-size:clamp(22px,5vw,40px);font-weight:900;color:#00ff87;text-shadow:0 0 24px rgba(0,255,135,.7);letter-spacing:4px;opacity:0;transition:opacity .3s;pointer-events:none;white-space:nowrap;}
.wave-flash.show{opacity:1;}
</style>
</head>
<body>
<canvas id="c"></canvas>

<div class="ui">
  <a class="back" href="javascript:history.back()">‹ ZURÜCK</a>

  <div class="hud" id="hud">
    <div>
      <div class="hud-label">SCORE</div>
      <div class="hud-score" id="hudScore">0</div>
      <div class="hud-lives" id="hudLives">❤️❤️❤️</div>
    </div>
    <div class="hud-level">
      <div class="hud-wave">WELLE</div>
      <div class="hud-level-num" id="hudWave">1</div>
      <div class="hud-label" style="margin-top:2px;">BEST <span id="hudBest">0</span></div>
    </div>
  </div>

  <div class="wave-flash" id="waveFlash">WELLE 1</div>

  <div class="center" id="startPanel">
    <div class="panel">
      <div class="ptitle">SPACE<br>SHOOTER</div>
      <div class="psub">ÜBERLEBE DEN ANGRIFF</div>
      <button class="pbtn" id="startBtn">▶ START</button>
      <div class="hint">Steuerung: <b>A/D</b> oder <b>◀▶</b> &nbsp;·&nbsp; <b>SPACE</b> schießen<br>Touch: links/rechts tippen · Mitte schießen</div>
    </div>
  </div>

  <div class="center hidden" id="overPanel">
    <div class="panel">
      <div class="over-title">ABGESCHOSSEN</div>
      <div class="score-big" id="overScore">0</div>
      <div class="newbest" id="overBest"></div>
      <div class="bestrow">BESTWERT: <span id="overBestVal">0</span></div>
      <button class="pbtn" id="retryBtn">↻ NOCHMAL</button>
    </div>
  </div>
</div>

<script>
/* ===================================================
   SPACE SHOOTER — Cyberpunk Canvas 2D
   No WebGL, no blur filters — GPU-friendly.
=================================================== */
const canvas=document.getElementById('c');
const ctx=canvas.getContext('2d');
let W,H;

const DPR=Math.min(window.devicePixelRatio||1,1);
function resize(){
  W=canvas.width=window.innerWidth*DPR;
  H=canvas.height=window.innerHeight*DPR;
  canvas.style.width=window.innerWidth+'px';
  canvas.style.height=window.innerHeight+'px';
  ctx.setTransform(DPR,0,0,DPR,0,0);
  W=window.innerWidth;H=window.innerHeight;
}
window.addEventListener('resize',resize);resize();

const STORAGE='ssHighscore';
let best=parseInt(localStorage.getItem(STORAGE)||'0');
document.getElementById('hudBest').textContent=best;
document.getElementById('overBestVal').textContent=best;

/* --- state --- */
let state='menu';
let score=0,wave=1,lives=3;
let player,bullets=[],enemies=[],enemyBullets=[],particles=[];
let keys={},touchLeft=false,touchRight=false,touchShoot=false;
let shootCooldown=0,enemySpawnTimer=0,waveTimer=0;
let enemiesKilled=0,waveKillTarget=8;
let showingWaveFlash=false,waveFlashTimer=0;
let bgStars=[];

/* --- input --- */
window.addEventListener('keydown',e=>{
  keys[e.code]=true;
  if((e.code==='Space'||e.code==='ArrowUp')&&state==='playing')e.preventDefault();
  if(e.code==='Space'&&state==='menu')startGame();
  if(e.code==='Space'&&state==='dead')startGame();
});
window.addEventListener('keyup',e=>{ keys[e.code]=false; });

canvas.addEventListener('pointerdown',e=>{
  const x=e.clientX/W;
  if(x<0.35)touchLeft=true;
  else if(x>0.65)touchRight=true;
  else touchShoot=true;
});
canvas.addEventListener('pointerup',e=>{
  const x=e.clientX/W;
  if(x<0.35)touchLeft=false;
  else if(x>0.65)touchRight=false;
  else touchShoot=false;
});
canvas.addEventListener('pointercancel',()=>{touchLeft=false;touchRight=false;touchShoot=false;});

document.getElementById('startBtn').addEventListener('click',startGame);
document.getElementById('retryBtn').addEventListener('click',startGame);

/* --- stars --- */
function initStars(){
  bgStars=[];
  for(let i=0;i<80;i++){
    bgStars.push({x:Math.random()*W,y:Math.random()*H,r:Math.random()*1.2+.3,speed:Math.random()*30+10,alpha:Math.random()*.6+.2});
  }
}
initStars();

/* --- game --- */
function startGame(){
  state='playing';
  score=0;wave=1;lives=3;
  bullets=[];enemies=[];enemyBullets=[];particles=[];
  shootCooldown=0;enemySpawnTimer=0;waveTimer=0;
  enemiesKilled=0;waveKillTarget=8;
  player={x:W/2,y:H-90,w:28,h:36,speed:280,color:'#00e5ff'};
  document.getElementById('startPanel').classList.add('hidden');
  document.getElementById('overPanel').classList.add('hidden');
  document.getElementById('hud').style.opacity='1';
  updateHud();
  showWaveFlash(1);
}

function die(){
  state='dead';
  burst(player.x,player.y,'#ff2b6d',40,200);
  const finalScore=Math.floor(score);
  document.getElementById('overScore').textContent=finalScore;

  // Auto-save — only if new personal best
  try{
    const profRaw=localStorage.getItem('mpProfile');
    const prof=profRaw?JSON.parse(profRaw):null;
    const playerName=(prof?prof.username:localStorage.getItem('username')||'MYPANEL USER').toUpperCase();
    const all=JSON.parse(localStorage.getItem('highscores')||'[]');
    const prevBest=all.filter(s=>s.player===playerName&&s.game==='Space Shooter').sort((a,b)=>b.score-a.score);
    if(prevBest.length===0||finalScore>prevBest[0].score){
      const filtered=all.filter(s=>!(s.player===playerName&&s.game==='Space Shooter'));
      filtered.push({player:playerName,game:'Space Shooter',score:finalScore,date:new Date().toLocaleDateString('de-DE')});
      filtered.sort((a,b)=>b.score-a.score);
      localStorage.setItem('highscores',JSON.stringify(filtered.slice(0,50)));
    }
  }catch(e){}

  let isNew=false;
  if(finalScore>best){best=finalScore;localStorage.setItem(STORAGE,String(best));isNew=true;}
  document.getElementById('overBest').textContent=isNew?'★ NEUER BESTWERT ★':'';
  document.getElementById('overBestVal').textContent=best;
  document.getElementById('hudBest').textContent=best;
  setTimeout(()=>document.getElementById('overPanel').classList.remove('hidden'),700);
}

function updateHud(){
  document.getElementById('hudScore').textContent=Math.floor(score);
  document.getElementById('hudWave').textContent=wave;
  let hearts='';
  for(let i=0;i<3;i++)hearts+=i<lives?'❤️':'🖤';
  document.getElementById('hudLives').textContent=hearts;
}

function showWaveFlash(n){
  const el=document.getElementById('waveFlash');
  el.textContent='WELLE '+n;
  el.classList.add('show');
  showingWaveFlash=true;waveFlashTimer=2;
}

/* --- particles --- */
function burst(x,y,color,n,spd){
  for(let i=0;i<n;i++){
    const a=Math.random()*Math.PI*2;
    const s=Math.random()*spd;
    particles.push({x,y,vx:Math.cos(a)*s,vy:Math.sin(a)*s,life:1,decay:Math.random()*.8+.6,color,size:Math.random()*2.5+1});
  }
}

/* --- spawning --- */
function spawnEnemy(){
  const types=['basic','fast','tank','zigzag'];
  const wt=Math.min(wave-1,3);
  const pool=types.slice(0,Math.max(1,wt+1));
  const type=pool[Math.floor(Math.random()*pool.length)];
  const x=40+Math.random()*(W-80);
  const configs={
    basic:{hp:1,speed:60,size:18,score:10,color:'#ff2b6d',shootRate:2.8},
    fast: {hp:1,speed:120,size:14,score:15,color:'#bf00ff',shootRate:4},
    tank: {hp:3,speed:40,size:26,score:30,color:'#ff6600',shootRate:1.8},
    zigzag:{hp:1,speed:80,size:16,score:20,color:'#00ff87',shootRate:3,zigzag:true},
  };
  const c=configs[type];
  enemies.push({x,y:-30,w:c.size,h:c.size,hp:c.hp,maxHp:c.hp,speed:c.speed,score:c.score,color:c.color,shootTimer:Math.random()*c.shootRate,shootRate:c.shootRate,type,zigzag:c.zigzag||false,zigDir:1,zigTimer:0});
}

/* --- main loop --- */
let lastT=performance.now();
function loop(t){
  const dt=Math.min((t-lastT)/1000,.034);
  lastT=t;
  update(dt);
  render();
  requestAnimationFrame(loop);
}
requestAnimationFrame(loop);

function update(dt){
  // stars always scroll
  bgStars.forEach(s=>{s.y+=s.speed*dt;if(s.y>H){s.y=-4;s.x=Math.random()*W;}});

  if(showingWaveFlash){
    waveFlashTimer-=dt;
    if(waveFlashTimer<=0){
      showingWaveFlash=false;
      document.getElementById('waveFlash').classList.remove('show');
    }
  }

  if(state!=='playing')return;

  score+=dt*2*(wave*.5);

  // player move
  let dx=0;
  if(keys['ArrowLeft']||keys['KeyA']||touchLeft)dx=-1;
  if(keys['ArrowRight']||keys['KeyD']||touchRight)dx=1;
  player.x=Math.max(player.w,Math.min(W-player.w,player.x+dx*player.speed*dt));

  // shoot
  shootCooldown=Math.max(0,shootCooldown-dt);
  if((keys['Space']||touchShoot)&&shootCooldown<=0){
    bullets.push({x:player.x,y:player.y-player.h/2,vy:-520,w:3,h:12,color:'#00e5ff'});
    if(wave>=5)bullets.push({x:player.x-14,y:player.y-player.h/2+6,vy:-480,vx:-40,w:3,h:10,color:'#00ff87'});
    if(wave>=5)bullets.push({x:player.x+14,y:player.y-player.h/2+6,vy:-480,vx:40,w:3,h:10,color:'#00ff87'});
    shootCooldown=.14;
  }

  // enemy spawn
  const spawnInterval=Math.max(.6-wave*.04,.28);
  enemySpawnTimer+=dt;
  if(enemySpawnTimer>=spawnInterval&&enemies.length<12){enemySpawnTimer=0;spawnEnemy();}

  // update bullets
  bullets=bullets.filter(b=>{
    b.x+=(b.vx||0)*dt;b.y+=b.vy*dt;
    return b.y>-20&&b.y<H+20&&b.x>-20&&b.x<W+20;
  });

  // update enemies
  enemies.forEach(e=>{
    e.y+=e.speed*dt;
    if(e.zigzag){
      e.zigTimer-=dt;
      if(e.zigTimer<=0){e.zigDir*=-1;e.zigTimer=.5+Math.random()*.5;}
      e.x+=e.zigDir*120*dt;
    }
    e.x=Math.max(e.w,Math.min(W-e.w,e.x));

    // enemy shoots
    e.shootTimer-=dt;
    if(e.shootTimer<=0){
      e.shootTimer=e.shootRate+Math.random()*.5;
      const angle=Math.atan2(player.y-e.y,player.x-e.x);
      const spd=160+wave*10;
      enemyBullets.push({x:e.x,y:e.y,vx:Math.cos(angle)*spd,vy:Math.sin(angle)*spd,r:4,color:e.color});
    }
  });

  // enemy bullets
  enemyBullets=enemyBullets.filter(b=>{
    b.x+=b.vx*dt;b.y+=b.vy*dt;
    // hit player
    if(Math.abs(b.x-player.x)<player.w&&Math.abs(b.y-player.y)<player.h){
      burst(b.x,b.y,'#ff2b6d',10,100);
      lives--;updateHud();
      if(lives<=0){die();return false;}
      return false;
    }
    return b.y<H+20&&b.y>-20&&b.x>-20&&b.x<W+20;
  });

  // bullet-enemy collisions
  bullets.forEach((b,bi)=>{
    enemies.forEach((e,ei)=>{
      if(Math.abs(b.x-e.x)<e.w+4&&Math.abs(b.y-e.y)<e.h+4){
        b._hit=true;
        e.hp--;
        burst(b.x,b.y,e.color,6,80);
        if(e.hp<=0){
          burst(e.x,e.y,e.color,20,140);
          score+=e.score*wave;
          enemiesKilled++;
          enemies.splice(ei,1);
          updateHud();
          // wave progress
          if(enemiesKilled>=waveKillTarget){
            wave++;waveKillTarget=8+wave*2;enemiesKilled=0;
            enemies=[];enemyBullets=[];
            showWaveFlash(wave);updateHud();
          }
        }
      }
    });
  });
  bullets=bullets.filter(b=>!b._hit);

  // enemy reaches bottom = lose life
  enemies=enemies.filter(e=>{
    if(e.y>H+30){
      lives--;updateHud();burst(e.x,H,e.color,14,100);
      if(lives<=0)die();
      return false;
    }
    return true;
  });

  // particles
  particles.forEach(p=>{p.x+=p.vx*dt;p.y+=p.vy*dt;p.vx*=.94;p.vy*=.94;p.life-=p.decay*dt;});
  particles=particles.filter(p=>p.life>0);
  if(particles.length>200)particles.splice(0,particles.length-200);
}

/* --- rendering --- */
function render(){
  ctx.fillStyle='rgba(3,6,8,0.30)';
  ctx.fillRect(0,0,W,H);

  // stars
  bgStars.forEach(s=>{
    ctx.globalAlpha=s.alpha;
    ctx.fillStyle='#ffffff';
    ctx.fillRect(s.x,s.y,s.r,s.r*2);
  });
  ctx.globalAlpha=1;

  // particles
  particles.forEach(p=>{
    ctx.globalAlpha=Math.max(p.life,0);
    ctx.fillStyle=p.color;
    ctx.beginPath();ctx.arc(p.x,p.y,p.size,0,Math.PI*2);ctx.fill();
  });
  ctx.globalAlpha=1;

  // player bullets
  bullets.forEach(b=>{
    ctx.fillStyle=b.color;
    ctx.fillRect(b.x-(b.w/2),b.y,b.w,b.h);
    // cheap glow: wider softer rect behind
    ctx.globalAlpha=.3;
    ctx.fillRect(b.x-(b.w*2),b.y,b.w*4,b.h);
    ctx.globalAlpha=1;
  });

  // enemy bullets
  enemyBullets.forEach(b=>{
    ctx.fillStyle=b.color;
    ctx.beginPath();ctx.arc(b.x,b.y,b.r,0,Math.PI*2);ctx.fill();
    ctx.globalAlpha=.25;
    ctx.beginPath();ctx.arc(b.x,b.y,b.r*2.5,0,Math.PI*2);ctx.fill();
    ctx.globalAlpha=1;
  });

  // enemies
  enemies.forEach(e=>{
    // body
    ctx.fillStyle=e.color;
    ctx.beginPath();
    ctx.moveTo(e.x,e.y-e.h);
    ctx.lineTo(e.x+e.w*.8,e.y+e.h*.4);
    ctx.lineTo(e.x+e.w*.3,e.y+e.h*.2);
    ctx.lineTo(e.x,e.y+e.h*.6);
    ctx.lineTo(e.x-e.w*.3,e.y+e.h*.2);
    ctx.lineTo(e.x-e.w*.8,e.y+e.h*.4);
    ctx.closePath();
    ctx.fill();
    // HP bar for tanks
    if(e.maxHp>1){
      ctx.fillStyle='rgba(255,255,255,.15)';
      ctx.fillRect(e.x-e.w,e.y-e.h-8,e.w*2,4);
      ctx.fillStyle=e.color;
      ctx.fillRect(e.x-e.w,e.y-e.h-8,e.w*2*(e.hp/e.maxHp),4);
    }
    // glow behind
    ctx.globalAlpha=.18;
    ctx.fillStyle=e.color;
    ctx.beginPath();ctx.arc(e.x,e.y,e.w*1.6,0,Math.PI*2);ctx.fill();
    ctx.globalAlpha=1;
  });

  // player
  if(state==='playing'){
    const px=player.x,py=player.y,pw=player.w,ph=player.h;
    // engine glow
    ctx.globalAlpha=.2;
    ctx.fillStyle='#00ff87';
    ctx.beginPath();ctx.arc(px,py+ph*.6,pw*.8,0,Math.PI*2);ctx.fill();
    ctx.globalAlpha=1;
    // ship body
    ctx.fillStyle='#ffffff';
    ctx.beginPath();
    ctx.moveTo(px,py-ph*.7);
    ctx.lineTo(px+pw*.6,py+ph*.5);
    ctx.lineTo(px+pw*.2,py+ph*.3);
    ctx.lineTo(px,py+ph*.6);
    ctx.lineTo(px-pw*.2,py+ph*.3);
    ctx.lineTo(px-pw*.6,py+ph*.5);
    ctx.closePath();
    ctx.fill();
    // cockpit
    ctx.fillStyle='#00e5ff';
    ctx.beginPath();
    ctx.moveTo(px,py-ph*.4);
    ctx.lineTo(px+pw*.18,py+ph*.1);
    ctx.lineTo(px-pw*.18,py+ph*.1);
    ctx.closePath();
    ctx.fill();
  }
}
</script>
</body>
</html>
