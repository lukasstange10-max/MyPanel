<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Snake</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:Arial,Helvetica,sans-serif;
background:radial-gradient(circle at 25% 15%,#1e1b4b,#020617 65%);
color:#fff;
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
padding:20px;
overflow:hidden;
}

.wrapper{
width:100%;
max-width:760px;
background:rgba(24,37,58,.85);
padding:28px;
border-radius:28px;
box-shadow:0 25px 60px rgba(0,0,0,.5),0 0 90px rgba(99,102,241,.12) inset;
border:1px solid rgba(255,255,255,.06);
text-align:center;
backdrop-filter:blur(10px);
}

h1{
font-size:56px;
font-weight:900;
margin-bottom:12px;
background:linear-gradient(90deg,#22d3ee,#6366f1,#f472b6,#22d3ee);
background-size:300% auto;
-webkit-background-clip:text;
background-clip:text;
color:transparent;
animation:hueFlow 6s linear infinite;
}
@keyframes hueFlow{to{background-position:300% center;}}

.score{
font-size:28px;
font-weight:800;
line-height:1.7;
margin-bottom:16px;
}

.speed-buttons,
.bottom{
display:flex;
justify-content:center;
gap:12px;
flex-wrap:wrap;
margin-top:12px;
}

button{
border:none;
padding:14px 22px;
border-radius:16px;
cursor:pointer;
font-size:16px;
font-weight:800;
color:#fff;
background:linear-gradient(135deg,#6366f1,#4f46e5);
box-shadow:0 10px 24px rgba(79,70,229,.35);
transition:.2s;
}

button:hover{
transform:translateY(-2px);
}

.back-btn{
background:linear-gradient(135deg,#64748b,#475569);
}

.wrap-btn{
background:linear-gradient(135deg,#0891b2,#0e7490);
}
.wrap-btn.on{
background:linear-gradient(135deg,#22c55e,#16a34a);
}

canvas{
background:#000;
border-radius:24px;
box-shadow:0 0 34px rgba(99,102,241,.4);
margin-top:14px;
}

.pad{
margin-top:22px;
display:grid;
grid-template-columns:70px 70px 70px;
grid-template-rows:70px 70px;
gap:12px;
justify-content:center;
}

.pad button{
width:70px;
height:70px;
font-size:28px;
padding:0;
display:flex;
justify-content:center;
align-items:center;
}

.up{grid-column:2;grid-row:1;}
.left{grid-column:1;grid-row:2;}
.down{grid-column:2;grid-row:2;}
.right{grid-column:3;grid-row:2;}

.overlay{
position:fixed;
inset:0;
background:rgba(0,0,0,.78);
display:flex;
justify-content:center;
align-items:center;
padding:20px;
z-index:999;
}

.modal{
background:#18253a;
padding:34px;
border-radius:28px;
max-width:560px;
width:100%;
text-align:center;
box-shadow:0 25px 60px rgba(0,0,0,.45);
}

.modal h2{
font-size:62px;
font-weight:900;
margin-bottom:14px;
}

.modal p{
font-size:20px;
margin-bottom:18px;
opacity:.95;
}

.hidden{
display:none;
}

small{
display:block;
margin-top:10px;
opacity:.75;
font-size:14px;
}

@media(max-width:700px){
h1{font-size:42px;}
.modal h2{font-size:46px;}
canvas{width:100%;height:auto;}
}
</style>
</head>
<body>

<div class="wrapper">

<h1>🐍 Snake</h1>

<div class="score">
Punkte: <span id="score">0</span><br>
🐢 <span id="hsSlow">0</span> |
⚡ <span id="hsMedium">0</span> |
🚀 <span id="hsFast">0</span>
</div>

<canvas id="game" width="520" height="520"></canvas>

<div class="bottom">
<button onclick="restartGame()">🔄 Neustart</button>
<button onclick="pauseGame()" id="pauseBtn">⏸ Pause</button>
<button class="wrap-btn" id="wrapBtn" onclick="toggleWrap()">🌀 Rand: Aus</button>
<button onclick="openSpeedMenu()">🎚️ Tempo</button>


<div class="pad">
<button class="up" onclick="changeDir('UP')">⬆️</button>
<button class="left" onclick="changeDir('LEFT')">⬅️</button>
<button class="down" onclick="changeDir('DOWN')">⬇️</button>
<button class="right" onclick="changeDir('RIGHT')">➡️</button>
</div>

</div>

<!-- Tempo ändern (mitten im Spiel) -->
<div class="overlay hidden" id="speedMenuBox">
<div class="modal">
<h2 style="font-size:38px;">🎚️ Tempo ändern</h2>
<p>Schlange und Punktestand bleiben erhalten</p>
<div class="speed-buttons">
<button onclick="changeSpeed('slow')">🐢 Langsam</button>
<button onclick="changeSpeed('medium')">⚡ Mittel</button>
<button onclick="changeSpeed('fast')">🚀 Schnell</button>
</div>
<div class="speed-buttons" style="margin-top:18px;">
<button class="back-btn" onclick="closeSpeedMenu()">✕ Abbrechen</button>
</div>
</div>
</div>

<!-- Start Overlay -->
<div class="overlay" id="startBox">
<div class="modal">

<h2>Spiel starten</h2>
<p>Welche Geschwindigkeit möchtest du spielen?</p>

<div class="speed-buttons">
<button onclick="startWith('slow')">🐢 Langsam</button>
<button onclick="startWith('medium')">⚡ Mittel</button>
<button onclick="startWith('fast')">🚀 Schnell</button>
</div>

<div class="speed-buttons" style="margin-top:18px;">

</div>
</div>

<!-- Game Over -->
<div class="overlay hidden" id="gameOverBox">
<div class="modal">

<h2>GAME OVER</h2>
<p>Punkte: <span id="endScore">0</span></p>
<p>Welche Geschwindigkeit als Nächstes?</p>

<div class="speed-buttons">
<button onclick="restartWith('slow')">🐢 Langsam</button>
<button onclick="restartWith('medium')">⚡ Mittel</button>
<button onclick="restartWith('fast')">🚀 Schnell</button>
</div>

<div class="speed-buttons" style="margin-top:18px;">
<button class="back-btn" onclick="goHome()">⬅ Zurück zur Startseite</button>
</div>

<small id="recordText"></small>

</div>
</div>

<script>
const canvas=document.getElementById("game");
const ctx=canvas.getContext("2d");

const box=20;
const size=26;

let snake,food,dir,score;
let game;
let paused=false;
let speed=145;
let baseSpeed=145;
let speedMode="medium";
let wrapEnabled=false;
let boostTimeout=null;

let hsSlow=parseInt(localStorage.getItem("hsSlow")||0);
let hsMedium=parseInt(localStorage.getItem("hsMedium")||0);
let hsFast=parseInt(localStorage.getItem("hsFast")||0);

updateHighscores();

/* ===== SOUND ===== */
let actx=null;
function sfx(freq,dur,type,vol){
  try{
    if(!actx)actx=new(window.AudioContext||window.webkitAudioContext)();
    const o=actx.createOscillator(),g=actx.createGain();
    o.type=type||'square';o.frequency.value=freq;
    g.gain.setValueAtTime(0,actx.currentTime);
    g.gain.linearRampToValueAtTime(vol||0.12,actx.currentTime+0.01);
    g.gain.exponentialRampToValueAtTime(0.001,actx.currentTime+dur);
    o.connect(g);g.connect(actx.destination);
    o.start();o.stop(actx.currentTime+dur);
  }catch(e){}
}
function sndEat(){sfx(560,0.09,'square',0.1);}
function sndGold(){[0,0.08,0.16].forEach((t,i)=>setTimeout(()=>sfx(700+i*220,0.13,'triangle',0.13),t*1000));}
function sndGameOver(){[0,0.15,0.3].forEach((t,i)=>setTimeout(()=>sfx(300-i*80,0.25,'sawtooth',0.12),t*1000));}
function sndPause(){sfx(380,0.07,'sine',0.08);}

/* WAND-WRAP TOGGLE */
function toggleWrap(){
wrapEnabled=!wrapEnabled;
const btn=document.getElementById('wrapBtn');
btn.innerText='🌀 Rand: '+(wrapEnabled?'An':'Aus');
btn.classList.toggle('on',wrapEnabled);
}

/* TEMPO MITTEN IM SPIEL ÄNDERN — Schlange/Score bleiben erhalten */
function openSpeedMenu(){
document.getElementById('speedMenuBox').classList.remove('hidden');
}
function closeSpeedMenu(){
document.getElementById('speedMenuBox').classList.add('hidden');
}
function changeSpeed(mode){
speedMode=mode;
if(mode==="slow") baseSpeed=230;
if(mode==="medium") baseSpeed=145;
if(mode==="fast") baseSpeed=85;
speed=baseSpeed;

clearInterval(game);
clearTimeout(boostTimeout);
if(!paused) game=setInterval(draw,speed);

closeSpeedMenu();
}

function init(){
snake=[{x:10*box,y:10*box}];
food=randomFood();
dir="RIGHT";
score=0;
paused=false;
document.getElementById("score").innerText="0";
const pb=document.getElementById('pauseBtn');
if(pb)pb.innerText='⏸ Pause';
}

function randomFood(){
return{
x:Math.floor(Math.random()*size)*box,
y:Math.floor(Math.random()*size)*box,
gold:Math.random()<0.15 // ~15% Chance auf Power-Up-Frucht
};
}

function startWith(mode){
document.getElementById("startBox").classList.add("hidden");
document.getElementById("gameOverBox").classList.add("hidden");

speedMode=mode;

if(mode==="slow") baseSpeed=230;
if(mode==="medium") baseSpeed=145;
if(mode==="fast") baseSpeed=85;
speed=baseSpeed;

restartGame();
}

function restartWith(mode){
startWith(mode);
}

function restartGame(){
clearInterval(game);
clearTimeout(boostTimeout);
speed=baseSpeed;
init();
game=setInterval(draw,speed);
}

function pauseGame(){
paused=!paused;
sndPause();
const btn=document.getElementById('pauseBtn');
if(paused){
clearInterval(game);
btn.innerText='▶ Weiter';
drawPauseOverlay();
}else{
btn.innerText='⏸ Pause';
game=setInterval(draw,speed);
}
}

function drawPauseOverlay(){
ctx.fillStyle='rgba(0,0,0,.55)';
ctx.fillRect(0,0,canvas.width,canvas.height);
ctx.fillStyle='#fff';
ctx.textAlign='center';
ctx.font='bold 42px Arial';
ctx.fillText('⏸ PAUSE',canvas.width/2,canvas.height/2-8);
ctx.font='16px Arial';
ctx.fillStyle='rgba(255,255,255,.7)';
ctx.fillText('Weiter mit dem Pause-Button',canvas.width/2,canvas.height/2+26);
ctx.textAlign='left';
}

function changeDir(newDir){
if(newDir==="LEFT" && dir!=="RIGHT") dir="LEFT";
if(newDir==="RIGHT" && dir!=="LEFT") dir="RIGHT";
if(newDir==="UP" && dir!=="DOWN") dir="UP";
if(newDir==="DOWN" && dir!=="UP") dir="DOWN";
}

document.addEventListener("keydown",e=>{
if(e.key==="ArrowLeft") changeDir("LEFT");
if(e.key==="ArrowRight") changeDir("RIGHT");
if(e.key==="ArrowUp") changeDir("UP");
if(e.key==="ArrowDown") changeDir("DOWN");
});

function draw(){

ctx.fillStyle="#05070d";
ctx.fillRect(0,0,canvas.width,canvas.height);

/* Grid-Hintergrund */
ctx.save();
ctx.strokeStyle="rgba(99,102,241,.08)";
ctx.lineWidth=1;
for(let i=0;i<=size;i++){
ctx.beginPath();ctx.moveTo(i*box,0);ctx.lineTo(i*box,canvas.height);ctx.stroke();
ctx.beginPath();ctx.moveTo(0,i*box);ctx.lineTo(canvas.width,i*box);ctx.stroke();
}
ctx.restore();

/* FUTTER — animiert, gold = Power-Up */
const pulse=Math.sin(Date.now()/180)*1.5;
ctx.save();
if(food.gold){
ctx.shadowColor="#facc15";
ctx.shadowBlur=18;
ctx.fillStyle="#facc15";
ctx.beginPath();
ctx.arc(food.x+10,food.y+10,9+pulse,0,Math.PI*2);
ctx.fill();
}else{
ctx.shadowColor="#ef4444";
ctx.shadowBlur=12;
ctx.fillStyle="#ef4444";
ctx.beginPath();
ctx.arc(food.x+10,food.y+10,8+pulse*0.6,0,Math.PI*2);
ctx.fill();
}
ctx.restore();

/* SCHLANGE — Farbverlauf Kopf zu Schwanz + Glow am Kopf */
for(let i=0;i<snake.length;i++){
ctx.save();
if(i===0){
ctx.shadowColor="#818cf8";
ctx.shadowBlur=14;
ctx.fillStyle="#a5b4fc";
}else{
const t=i/Math.max(snake.length-1,1);
const r=Math.round(99-(99-37)*t),g=Math.round(102-(102-26)*t),b=Math.round(241-(241-110)*t);
ctx.fillStyle=`rgb(${r},${g},${b})`;
}
if(typeof ctx.roundRect==='function'){
ctx.beginPath();ctx.roundRect(snake[i].x,snake[i].y,18,18,5);ctx.fill();
}else{
ctx.fillRect(snake[i].x,snake[i].y,18,18);
}
ctx.restore();
}

if(paused) return;

let headX=snake[0].x;
let headY=snake[0].y;

if(dir==="LEFT") headX-=box;
if(dir==="RIGHT") headX+=box;
if(dir==="UP") headY-=box;
if(dir==="DOWN") headY+=box;

/* WAND-WRAP: durch den Rand teleportieren statt sterben */
if(wrapEnabled){
if(headX<0) headX=canvas.width-box;
else if(headX>=canvas.width) headX=0;
if(headY<0) headY=canvas.height-box;
else if(headY>=canvas.height) headY=0;
}

if(
(!wrapEnabled && (headX<0 || headY<0 || headX>=canvas.width || headY>=canvas.height)) ||
collision(headX,headY,snake)
){
gameOver();
return;
}

if(headX===food.x && headY===food.y){

if(food.gold){
score+=3;
sndGold();
/* kurzer Speed-Boost */
clearTimeout(boostTimeout);
clearInterval(game);
speed=Math.max(50,Math.floor(baseSpeed*0.55));
game=setInterval(draw,speed);
boostTimeout=setTimeout(()=>{
clearInterval(game);
speed=baseSpeed;
game=setInterval(draw,speed);
},3000);
}else{
score++;
sndEat();
}

document.getElementById("score").innerText=score;
saveHighscore();
food=randomFood();

}else{
snake.pop();
}

snake.unshift({x:headX,y:headY});
}

function collision(x,y,array){
for(let i=0;i<array.length;i++){
if(x===array[i].x && y===array[i].y) return true;
}
return false;
}

function saveHighscore(){

if(speedMode==="slow" && score>hsSlow){
hsSlow=score;
localStorage.setItem("hsSlow",hsSlow);
}

if(speedMode==="medium" && score>hsMedium){
hsMedium=score;
localStorage.setItem("hsMedium",hsMedium);
}

if(speedMode==="fast" && score>hsFast){
hsFast=score;
localStorage.setItem("hsFast",hsFast);
}

updateHighscores();
}

function updateHighscores(){
document.getElementById("hsSlow").innerText=hsSlow;
document.getElementById("hsMedium").innerText=hsMedium;
document.getElementById("hsFast").innerText=hsFast;
}

function gameOver(){
clearInterval(game);
clearTimeout(boostTimeout);
speed=baseSpeed;
sndGameOver();
document.getElementById("endScore").innerText=score;
document.getElementById("gameOverBox").classList.remove("hidden");

// An MyPanel-Highscoresystem übergeben (nutzt automatisch den XP-Multiplikator + Notification)
try{
  if(typeof window.autoSaveScore==='function'){
    window.autoSaveScore('Snake',score);
  }
}catch(e){}
}

function goHome(){
window.location.href="index.html";
}
</script>

<!-- ANNOUNCEMENT SYSTEM -->
<style>
#annBanner{display:none;position:fixed;top:0;left:0;right:0;z-index:99999;pointer-events:none;}
#annBanner .aInner{position:relative;background:linear-gradient(135deg,rgba(0,5,15,.96),rgba(0,10,25,.98));padding:18px 60px 22px;text-align:center;border-bottom:3px solid #00e5ff;animation:annSD .5s cubic-bezier(.22,.61,.36,1) both;overflow:hidden;}
#annBanner .aInner::before{content:'';position:absolute;inset:0;background:linear-gradient(90deg,transparent,rgba(0,229,255,.05),transparent);animation:annSW 2s linear infinite;}
@keyframes annSD{from{transform:translateY(-100%);opacity:0;}to{transform:translateY(0);opacity:1;}}
@keyframes annSW{from{transform:translateX(-100%);}to{transform:translateX(100%);}}
.ann-c{position:absolute;width:16px;height:16px;}.ann-c.tl{top:5px;left:8px;border-top:2px solid #00e5ff;border-left:2px solid #00e5ff;}.ann-c.tr{top:5px;right:8px;border-top:2px solid #00e5ff;border-right:2px solid #00e5ff;}.ann-c.bl{bottom:5px;left:8px;border-bottom:2px solid #00ff87;border-left:2px solid #00ff87;}.ann-c.br{bottom:5px;right:8px;border-bottom:2px solid #00ff87;border-right:2px solid #00ff87;}
</style>
<div id="annBanner">
  <div class="aInner">
    <div class="ann-c tl"></div><div class="ann-c tr"></div><div class="ann-c bl"></div><div class="ann-c br"></div>
    <div style="font-family:'Orbitron',sans-serif;font-size:9px;color:rgba(0,229,255,.7);letter-spacing:4px;margin-bottom:5px;">// GLOBAL ANNOUNCEMENT</div>
    <div style="font-family:'Orbitron',sans-serif;font-size:clamp(14px,2.5vw,26px);font-weight:900;color:#fff;text-shadow:0 0 30px rgba(0,229,255,.9);letter-spacing:2px;">📢 <span id="annBannerText"></span></div>
  </div>
</div>
<script>
(function(){
  const DB='https://mypanel-41c90-default-rtdb.europe-west1.firebasedatabase.app';
  let lastTs=0,t=null;
  function sound(){try{const ac=new(window.AudioContext||window.webkitAudioContext)();[[0,.08,880,.15],[.1,.08,1100,.1],[.2,.12,660,.12],[.35,.2,880,.08]].forEach(([st,dur,freq,vol])=>{const o=ac.createOscillator(),g=ac.createGain();o.frequency.value=freq;o.type='sine';g.gain.setValueAtTime(0,ac.currentTime+st);g.gain.linearRampToValueAtTime(vol,ac.currentTime+st+.02);g.gain.exponentialRampToValueAtTime(.001,ac.currentTime+st+dur);o.connect(g);g.connect(ac.destination);o.start(ac.currentTime+st);o.stop(ac.currentTime+st+dur);});setTimeout(()=>ac.close(),800);}catch(e){}}
  function show(txt){
    const b=document.getElementById('annBanner'),el=document.getElementById('annBannerText');
    if(!b||!el)return;
    el.textContent=txt;b.style.display='block';
    const inner=b.querySelector('.aInner');
    if(inner){inner.style.animation='none';void inner.offsetWidth;inner.style.animation='';}
    sound();clearTimeout(t);t=setTimeout(()=>b.style.display='none',10000);
  }
  function poll(){fetch(DB+'/announcement.json?t='+Date.now()).then(r=>r.json()).then(d=>{if(d&&d.text){const ts=d.timestamp||d.text;if(ts!==lastTs){lastTs=ts;show(d.text);}}}).catch(()=>{});}
  setTimeout(poll,1000);setInterval(poll,3000);
})();
</script>


<!-- XP MULTIPLIER -->
<script>
(function(){
  const orig=window.autoSaveScore;
  window.autoSaveScore=function(gameName,score){
    const mult=parseFloat(localStorage.getItem('mpXpMultiplier')||'1');
    const boosted=Math.floor(score*mult);
    if(mult>1){
      // Show notification
      const n=document.createElement('div');
      n.style.cssText='position:fixed;top:20px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,.85);border:1px solid #ffd23f;border-radius:6px;padding:10px 20px;font-family:Orbitron,sans-serif;font-size:13px;font-weight:900;color:#ffd23f;letter-spacing:2px;z-index:99999;pointer-events:none;';
      n.textContent='🎉 '+mult+'x XP! '+Math.floor(score)+' → '+boosted+' PUNKTE!';
      document.body.appendChild(n);
      setTimeout(()=>n.remove(),2500);
    }
    if(orig) orig(gameName,boosted);
    else {
      // Fallback: save directly to localStorage
      try{
        const pr=JSON.parse(localStorage.getItem('mpProfile')||'null');
        const pn=(pr?pr.username:'MYPANEL USER').toUpperCase();
        const all=JSON.parse(localStorage.getItem('highscores')||'[]');
        const prev=all.filter(x=>x.player===pn&&x.game===gameName).sort((a,b)=>b.score-a.score);
        const best=prev.length>0?Math.max(prev[0].score,boosted):boosted;
        const f=all.filter(x=>!(x.player===pn&&x.game===gameName));
        f.push({player:pn,game:gameName,score:best,date:new Date().toLocaleDateString('de-DE')});
        localStorage.setItem('highscores',JSON.stringify(f.sort((a,b)=>b.score-a.score).slice(0,50)));
      }catch(e){}
    }
  };
})();
</script>
</body>
</html>
